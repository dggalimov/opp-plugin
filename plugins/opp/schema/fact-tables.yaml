      нет полей-флагов дефекта и поля «тип решения» (C5/C6); чисел не дублирует (C7), 'нет висячих ссылок (SYS, DEC, INT, INF, ORG, PRC, NSI); двусторонность с SRC', 'накопление, не перезатирание; понижение статуса — со ссылкой
        на источник опровержения']
