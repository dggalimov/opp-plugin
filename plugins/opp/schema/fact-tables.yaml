    - {имя: природа величины, вид: перечисление, обяз: да, словарь: [доказанная, оценочная], смысл: 'двухуровневый ущерб (Р-4, ЗР-0020): оценочная — экспертная величина, в отчёт только как зона доуточнения, не в доказанный ОБЭ'}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника: страница/раздел (документ), регистр+отбор (база), таймкод/реплика (встреча) — точечная перепроверка факта (Р-2, ЗР-0020)'}
    - имя: статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: PRB, поле: проблема, кардинальность: N-1, смысл: ущерб → локализованный дефект (координата ОБЭ)}
    - {к: VP, поле: объём (множитель), кардинальность: N-1, смысл: 'множитель объёма (ссылка, не число)'}
    - {к: VP, поле: частота (множитель), кардинальность: N-1, смысл: множитель частоты (опционально)}
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс ставки и итоговой величины}
    рецепт:
      ведущий_канал: цифровой след множителей — объём из VP × ставка с документальным провенансом
      что_проблема: [ущерб без раскладки на множители, величина без источника ставки, ИТ-сленг или тавтология в формулировке, 'ущерб ниже нижней отсечки, поданный как проблема', задвоение одного ущерба на корень и производную]
      норма_глубины: ОБЭ только для проблем подтверждённого существенного ущерба (20/80); спуск раскладки останавливается на уровне-причине, глубже не дробим; запрет идеализации
      опора: методика р.6 (гейт ОБЭ — определяющий), р.7 (приоритет от тяжести); табличная раскладка — операционализация (C9)
    инструкция: {дефолт: 'Считай ущерб только для уже локализованного дефекта (есть строка в Проблемах). На каждую существенную проблему заведи эффект и ответь: в чём ущерб (на языке бизнеса, без ИТ-сленга и тавтологии), сколько и откуда известно.
        «Сколько» — раскладкой на множители: объём и (если нужно) частоту бери ссылкой из VP, ставку внеси здесь и сошлись на её источник, перемножь по способу расчёта (объём × ставка × частота), зафиксируй величину, единицу и горизонт. Поставь
        категорию ОБЭ (финансовый/экономический/рисковый/стратегический); для рискового — тип «вероятный (риск)», вероятность и ожидаемый ущерб = величина × вероятность; для стратегического без числа — оставь величину пустой и опиши способ оценки
        качественного. Функциональный дефицит меряй как зазор «нужная функция ↔ типовая (эталон)». Нижняя отсечка: ниже порога несущественности — особенность учёта, не проблема. Диагноз и тип решения здесь не ставь — это Проблемы. Суди по методике
        kb-audit, р.6 (гейт ОБЭ) и р.7 (приоритет от тяжести).', правка_пользователя: разрешена}
    целостность: [код эффекта уникален и непуст, 'перечисления — из словарей (категория ОБЭ, тип эффекта, статус доказанности, единица величины, горизонт)', каждый эффект ссылается на существующую строку PRB — нет висячей ссылки и нет эффекта
        без проблемы, у расчётной строки задан источник ставки/итога и существует в SRC — величина без источника недействительна, 'для расчётных: объём ссылается на строку VP, ставка — число, способ расчёта/величина/единица/горизонт заполнены,
        частота (если задана) ссылается на VP', объём не дублируется числом в EFF — единственный источник количества VP, 'для рискового: вероятность задана, ожидаемый ущерб выводим (величина × вероятность), руками не правится', 'для качественного:
        способ оценки качественного заполнен, множители/величина пусты — профили не смешаны', 'нет полей-диагнозов: нет флага дефекта и поля «тип решения»', 'нет задвоения: один ущерб не висит одновременно на корневой и производной проблеме',
      'двусторонность с источником: источник существует и перечисляет этот факт']
    жизненный_цикл:
      ось: доказанность
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (количественная опора проблем), Концепция TO-BE и дорожная карта (тяжесть ОБЭ — вход приоритизации волн)]
    стык:
      даёт: измеримую величину ОБЭ каждой доказанной проблемы (число + категория + раскладка + горизонт; рисковый — вероятность и ожидаемый ущерб; стратегический — способ оценки качественного); тяжесть ОБЭ для приоритета требований и волн; ставку
        и логику расчёта ущерба
      потребляет: [PRB, VP, SRC, 'методика kb-audit (р.6 гейт ОБЭ, р.7 приоритет)', 'сырьё ставок (тарифы, ФОТ, стоимость простоя)', инструкция-промт]
      зависит_от: [reg-facttables]
      где: spec/fact-tables/EFF.md
  TB:
    название: Бизнес-требования
    группа: 'Осмысление: диагностика AS-IS → требования'
    тип: первичная
    уровень: null
    покрытие_методикой: есть
    поля:
    - {имя: код требования, вид: текст, обяз: да, уникально: да}
    - {имя: формулировка, вид: текст, обяз: да}
    - имя: действие (тип)
      вид: перечисление
      обяз: да
      словарь: [Обеспечить, Исключить, Автоматизировать]
    - {имя: объект/функция, вид: текст, обяз: да}
    - {имя: условие/разрез, вид: текст, обяз: нет}
    - {имя: устраняемый ОБЭ, вид: ссылка, обяз: да, цель: EFF}
    - {имя: 'покрывает проблемы (полностью)', вид: ссылки, обяз: условно, цель: PRB, смысл: 'проблемы, которые требование закрывает целиком (экс-TBPR «характер покрытия: полностью», ЗР-0024); хотя бы один из двух списков покрытия непуст'}
    - {имя: 'покрывает проблемы (частично)', вид: ссылки, обяз: условно, цель: PRB, смысл: 'проблемы, которые требование закрывает частично (экс-TBPR, ЗР-0024)'}
    - {имя: критерий приёмки, вид: текст, обяз: да}
    - {имя: бизнес-результат, вид: текст, обяз: да}
    - имя: тип решения
      вид: перечисление
      выводимое: да
      словарь: [методологическое, организационное, технологическое]
    - имя: приоритет
      вид: перечисление
      выводимое: да
      словарь: [высокий, средний, низкий]
    - имя: быстрая победа
      вид: перечисление
      обяз: нет
      словарь: [да, нет]
    - {имя: заявитель, вид: ссылка, обяз: нет, цель: STK}
    - имя: статус требования
      вид: перечисление
      обяз: да
      словарь: [заявлено, подтверждено, согласовано, отклонено]
    - {имя: зависит от требований, вид: ссылки, обяз: нет, цель: TB}
    - {имя: источник заявления, вид: ссылка, обяз: нет, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника: страница/раздел (документ), регистр+отбор (база), таймкод/реплика (встреча) — точечная перепроверка факта (Р-2, ЗР-0020)'}
    рёбра:
    - {к: PRB, поле: 'покрывает проблемы (полностью)', кардинальность: N-M, смысл: 'трассировка требование → проблемы (полное покрытие)'}
    - {к: PRB, поле: 'покрывает проблемы (частично)', кардинальность: N-M, смысл: 'трассировка требование → проблемы (частичное покрытие)'}
    - {к: EFF, поле: устраняемый ОБЭ, кардинальность: N-1, смысл: устраняемый доказанный ущерб}
    - {к: STK, поле: заявитель, кардинальность: N-1, смысл: адресность/провенанс заявления}
    - {к: SRC, поле: источник заявления, кардинальность: N-1, смысл: где/когда заявлено (провенанс)}
    - {к: TB, поле: зависит от требований, кардинальность: N-M, смысл: 'очерёдность (рефлексивная, ацикличная)'}
    рецепт:
      ведущий_канал: доказанная проблема (PRB) с согласованным ОБЭ (EFF) как вход
      что_проблема: [требование без трассировки до проблемы (пожелание), требование без критерия приёмки (двусмысленно), формулировка без «для устранения ОБЭ» (нарушен синтаксис р.7), требование описывает продукт/кнопку вместо бизнес-результата,
        'разрыв замкнутости: согласованная проблема с ОБЭ без требования']
      норма_глубины: под проблемы подтверждённого ущерба (20/80); не плодить требований «на всякий случай»
      опора: методика р.7 (от проблемы к требованию), р.4 (жизненный цикл, две шкалы), р.1 (объект «Требование»), чек-лист р.9
    инструкция: {дефолт: 'Иди от доказанной проблемы: на каждую согласованную проблему с существенным ОБЭ заведи требование-ответ (замкнутость). Формулируй строго: [Обеспечить/Исключить/Автоматизировать] + [объект/функция] + [условие/разрез]
        + [для устранения ОБЭ]; без последнего «для» — это пожелание (найди проблему или статус «отклонено»). Описывай бизнес-результат, не продукт; продукт/доработку/смету сюда не тащи. Задай критерий приёмки. Проставь трассировку: перечисли
        проблемы, которые требование закрывает целиком, в «покрывает проблемы (полностью)», и которые частично — в «покрывает проблемы (частично)» (экс-связка «требование↔проблема», характер покрытия), и устраняемый ОБЭ (EFF). Приоритет и тип решения не выдумывай — выводятся (приоритет от тяжести ОБЭ, тип решения от уровня проблемы). Пометь «быструю победу». Заявитель (STK) и источник заявления (SRC) — если
        требование заявил стейкхолдер. Зависимости — для очерёдности. «Хотелку» без ущерба разбирай «почему» до первопричины: либо проблема, либо «отклонено» с пометкой; отклонённое не затирай молча. Суди по методике kb-audit, р.7, р.4, р.1,
        чек-лист р.9.', правка_пользователя: разрешена}
    целостность: [код требования уникален и непуст; «действие (тип)» и «статус требования» — из словарей, '«формулировка», «объект/функция», «критерий приёмки», «бизнес-результат» непусты', 'синтаксис р.7: заполнены «действие (тип)» + «объект/функция»
        + привязка «устраняемый ОБЭ»', 'трассировка обязательна: ссылки в «покрывает проблемы (полностью)»/«покрывает проблемы (частично)» ведут на существующую PRB; нет висячих ссылок (EFF, STK, SRC)', 'хотя бы один из списков покрытия непуст
        (иначе пожелание, а не требование)', 'код проблемы не стоит в обоих списках покрытия одновременно', 'критерий приёмки непуст (иначе возврат на уточнение, не в «согласовано»)', 'замкнутость в обе стороны: каждая согласованная проблема с
        существенным ОБЭ стоит хотя бы в одном списке покрытия какого-либо TB; согласованное требование привязано к решению (стык
        группы 4)', 'выводимые согласованы: тип решения — с уровнем проблемы (р.6); приоритет — с тяжестью ОБЭ (р.7)', 'бизнес-результат, не продукт: формулировка не называет продукт/модуль/кнопку (мягкое предупреждение)', «зависит от требований»
        ациклична и ссылается на существующие строки TB, отклонённое требование не удаляется и не перезаписывается молча (накопление)]
    жизненный_цикл:
      ось: жизненный цикл требования
      статусы: [заявлено, подтверждено, согласовано, отклонено]
      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (раздел требований), Концепция TO-BE и дорожная карта (вход приоритизации)]
    стык:
      даёт: замкнутый перечень бизнес-требований (ответов на доказанные проблемы) с трассировкой до PRB (полями покрытия «полностью»/«частично»), устраняемым ОБЭ (EFF), критерием приёмки, выводимым приоритетом и типом решения, жизненным циклом; узел представления «Трассировка»;
        обратная сторона для STK «Заявленные требования» и PRB «Требования-ответы»
      потребляет: [PRB, EFF, STK, SRC, 'kb-audit (логика р.7, р.4, р.1)']
      зависит_от: [reg-facttables]
      где: spec/fact-tables/TB.md
