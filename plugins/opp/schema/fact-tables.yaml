        GAP→TB→TS; вход для COV/FIT/DEC и оценки дорожной карты
      потребляет: [TB, SRC (природа «эталон» SRC-KB), KBP, GAP (Ур.8), SOL, SYS (Ур.7), VP, 'навык opp:solutions', kb-nav-1c, kb-audit (границы р.3/р.6/р.7)]
      зависит_от: [reg-facttables, skill-solutions, KBP]
      где: spec/fact-tables/TS.md
