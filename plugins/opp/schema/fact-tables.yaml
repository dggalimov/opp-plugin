    - {к: CR, поле: Закрываемый дефицит / дельта, кардинальность: N-1, смысл: доработка опирается на доказанную дельту (Ур.8)}
    - {к: AV, поле: Вариант архитектуры, кардинальность: N-1, смысл: сырьё сравнения кандидатов (без весов)}
    рецепт:
      ведущий_канал: не каркасный; вход — согласованное требование (TB) × решение/продукт (SOL/TS), COV несёт связывание и замкнутость
      что_проблема: [висящее требование (нет покрытия / степень «не покрыто»), висящий продукт/решение (без требования-основания), неполная триада (только технологическое покрытие), доработка без дельты (нет ссылки на дефицит Ур.8), рассинхрон
          выводимых полей с TB (тип решения / приоритет)]
      норма_глубины: замкнутость на ВСЕ согласованные требования (минимум одно покрытие не «не покрыто»); глубоко — только высокоприоритетные и при выборе платформы (20/80)
      опора: методика р.7 (замкнутость в обе стороны), р.2 (М:М явно), р.9 (условие выдачи); построение — навык opp:solutions (триада, маппинг, шкала C8)
    инструкция: {дефолт: 'Заполняй матрицу как связку «требование × решение/продукт»: требования из TB (только «согласовано»), решения/продукты из SOL/TS — не выдумывай, только ссылайся. На каждое согласованное требование заведи минимум одну
        строку: «Сторона покрытия» (решение/продукт — она же говорит verify, в какую таблицу разрешать ссылку), способ покрытия (триада, можно несколько) и степень по единой шкале покрытия типовой (покрыто типовой/частично/иначе/не покрыто —
        тот же словарь, что у GAP и TS). Закон триады: только технологическое покрытие без методологического и организационного — флаг риска отторжения, верни в выработку. «Не покрыто» легитимно на ранней стадии, но это висящее требование — не
        должно дожить до выдачи. Сначала типовой функцией; доработку — только на доказанную дельту (GAP/CR, Ур.8), иначе «костыль без причины». Обоснование — в терминах бизнес-результата. При выборе платформы заведи покрытие по каждому кандидату
        (AV) как сырьё; веса и вердикт не считай — это FIT. Приоритет и тип решения не выдумывай — наследуются от TB; покрытие не удаляй задним числом, отклонённое помечай статусом «отклонено». Суди по методике kb-audit, р.7, р.2, р.9.', правка_пользователя: разрешена}
    целостность: [код покрытия уникален и непуст, «Требование» и «Решение / продукт» заданы, перечисления (сторона / способ / степень / статус) — из словарей; степень — строго из единой шкалы C8, нет висячих ссылок; полиморфная «Решение / продукт»
        разрешается по «Стороне покрытия» (SOL/TS), 'замкнутость «требование → решение»: каждое согласованное TB имеет покрытие не «не покрыто»', 'обратная замкнутость «решение/продукт → требование»: каждый SOL/TS привязан к требованию', 'закон
        триады — мягкая проверка (флаг риска отторжения), не жёсткий блок', если способ включает «доработка-дельта» — «Закрываемый дефицит / дельта» непуст и ведёт на GAP/CR (Ур.8), «Тип решения» и «Приоритет» согласованы с TB; своих чисел ущерба
        COV не хранит, нет весов выбора платформы в COV (вердикт — в FIT), 'накопление: покрытие с историей не удаляется — выбытие через статус «отклонено» с пометкой', сквозные источник / статус доказанности к строкам COV не предъявляются (C1)]
    жизненный_цикл:
      ось: покрытие (процессный)
      статусы: [предложено, обосновано, согласовано, отклонено]
      доказательная_зрелость: нет
    проекция: [Концепция TO-BE и дорожная карта (раздел «Матрица покрытия»), Сырьё для сравнения кандидатов при выборе платформы (вердикт — в FIT)]
    стык:
      даёт: замкнутая сетка «требование → решение/продукт» (степень по C8 + способ); проверяемая замкнутость в обе стороны; вход для TO-BE по уровням (TLM) и волн; сырьё сравнения кандидатов
      потребляет: ['Бизнес-требования (TB, согласованные)', Решения (SOL), Целевые продукты (TS), 'Функциональный дефицит / Доработки (GAP/CR, Ур.8)', Варианты архитектуры (AV), 'методика р.7 (замкнутость) и р.2 (М:М)', 'навык opp:solutions (триада,
          маппинг, шкала C8)', знание типовых 1С (доменная БЗ через KBP)]
      зависит_от: [reg-facttables, ft-TB, ft-SOL, ft-TS]
      где: spec/fact-tables/COV.md
  FIT:
    название: Соответствие варианта требованиям (зазоры)
    группа: '4. Осмысление: решения и целевое (TO-BE)'
    тип: связка
    уровень: null
    покрытие_методикой: частично
    поля:
    - {имя: код строки, вид: текст, обяз: да, уникально: да}
    - {имя: вариант, вид: ссылка, обяз: да, цель: AV}
    - {имя: требование, вид: ссылка, обяз: да, цель: TB}
    - {имя: целевой продукт, вид: ссылка, обяз: нет, цель: TS}
    - имя: степень покрытия
      вид: перечисление
      обяз: да
      словарь: [полностью типовой, частично (есть зазор), только доработкой, обходным решением, не закрывается]
    - имя: тип зазора
      вид: перечисление
      обяз: условно
      словарь: [нет зазора, доработка конфигурации, интеграция, организационно-методологически, внешний продукт, не закрывается]
    - {имя: описание зазора, вид: текст, обяз: условно}
    - имя: оценка зазора
      вид: перечисление
      обяз: нет
      словарь: [нет, малый, средний, крупный]
    - {имя: риск варианта по требованию, вид: текст, обяз: нет}
    - имя: статус оценки
      вид: перечисление
      обяз: да
      словарь: [заявлено, подтверждено, согласовано]
    - {имя: ссылка на сравнение, вид: ссылка, обяз: нет, цель: SOL}
    - {имя: примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: AV, поле: вариант, кардинальность: N-1, смысл: 'ось связки: оцениваемый вариант архитектуры'}
    - {к: TB, поле: требование, кардинальность: N-1, смысл: 'ось связки: закрываемое бизнес-требование'}
    - {к: TS, поле: целевой продукт, кардинальность: N-1, смысл: чем вариант закрывает требование}
    - {к: SOL, поле: ссылка на сравнение, кардинальность: N-1, смысл: провенанс вердикта (строка решения/сравнения)}
    рецепт:
      ведущий_канал: нет внешнего канала (синтетическая фаза «осмысление»); эталон — типовая функция продукта
      что_проблема: [требование не закрыто ни одним вариантом (сквозной зазор), зазор закрыт обходным решением/теневым ИТ вместо системы, зазор-в-вакууме без требования за ним]
      норма_глубины: гигиенический минимум — вердикт на каждую пару (полнота сетки); глубоко — только зазоры требований подтверждённого крупного ОБЭ (через TB→EFF, 20/80); запрет идеализации
      опора: методика р.6 (дефицит=зазор к эталону), р.5 (заявленное×эталонное), р.7 (замкнутость, приоритет ОБЭ), р.8 (20/80); каркас Ур.8; навык opp:solutions (сравнение по вариантам, единая шкала покрытия)
    инструкция: {дефолт: 'Заполняй FIT только когда вариантов архитектуры два и больше и стоит задача сравнения/выбора платформы; при единственном варианте зазоры веди в GAP, покрытие — в COV. Для каждого варианта пройди по всем согласованным
        требованиям пара за парой: на пару «вариант × требование» заведи строку (целевой продукт, степень покрытия по единой шкале, тип зазора, описание зазора по-человечески как бизнес-результат, категориальный масштаб). Зазор меряй как разрыв
        «требование ↔ типовая функция», а не на глаз. Числа не пиши — они в VP/EFF. Оценивай варианты по одной сетке (замкнутость), не оставляй висящих требований; вердикт помечай процессным статусом заявлено→подтверждено→согласовано. Не задваивай
        дефицит (соотноси с GAP/TS); «тип решения» не ставь — это координата Проблемы (SOL). Суди по методике kb-audit, р.5–8.', правка_пользователя: разрешена}
    целостность: [код строки уникален и непуст; вариант и требование заданы, пара «вариант × требование» не дублируется (одна строка на пару), 'перечисления (степень покрытия, статус оценки, тип зазора, оценка зазора) — из словарей', при степени
        покрытия ≠ «полностью типовой» заполнены тип зазора и описание зазора, 'нет висячих ссылок: AV, TB существуют; TS и ссылка на сравнение (SOL) — если заданы, существуют', 'полнота сетки: каждое сравниваемое TB имеет строку по каждому варианту
        AV (только при AV≥2 и задаче сравнения)', 'без задвоения дефицита: зазор-доработка соотнесён с GAP/TS, своих чисел VP/EFF не дублирует', 'COV согласована с FIT (COV выводится из FIT, руками не правится — только чтение)', сквозные «источник»/«Статус
        доказанности» к FIT не применяются; «тип решения» в FIT отсутствует]
    жизненный_цикл:
      ось: оценка соответствия (процессная)
      статусы: [заявлено, подтверждено, согласовано]
      доказательная_зрелость: нет
    проекция: [Концепция TO-BE и дорожная карта (таблица соответствия вариантов требованиям с зазорами), Обоснование выбора платформы (сравнительная сетка покрытий и зазоров)]
    стык:
      даёт: вердикт соответствия требований по каждому варианту с измеримым зазором (степень покрытия + тип/масштаб/описание); сопоставимая база для выбора платформы (вход DEC); первичные данные зазоров, из которых выводится COV; локализация
        риска выбора для диагностики (фактура, не диагноз)
      потребляет: [TB, AV, TS, SOL, 'GAP (мерило зазора, сверка без задвоения)', методика kb-audit (р.5–8), 'skill-solutions (единая шкала покрытия, механика сравнения по вариантам)']
      зависит_от: [reg-facttables, skill-solutions]
      где: spec/fact-tables/FIT.md
