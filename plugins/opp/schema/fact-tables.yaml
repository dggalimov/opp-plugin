        заинтересованность, отношение к изменению; не знаешь — «неизвестно» + открытый вопрос. Атрибуты роли из Ур.6 не копируй — свяжи с ролью оргструктуры. Заявил требование — заведи его в TB и проставь заявителя. Носителя знания помечай ролью
        «эксперт-носитель», диагноз — в HYP/PRB/на Ур.6. Своих чисел нет: объёмы — в VP, ущерб — в EFF. Выбыл — статус «вне игры», не удаляй. План коммуникаций и стратегию вовлечения сюда не тащи. Суди по методике kb-audit, р.4 + Ур.6.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; должность непуста; «ФИО / обозначение» непусто, 'роль, влияние, заинтересованность, отношение, статус вовлечения — из словарей', 'нет висячих ссылок (привязка → ORG, источник → SRC, заявитель TB → STK)',
      двусторонность «заявленные требования» ↔ «заявитель» (TB) не расходится, стейкхолдер со ссылками не удаляется/не перезаписывается — выбытие через «вне игры», нет полей-флагов дефекта (C5); сквозной провенанс/доказанность не предъявляются
