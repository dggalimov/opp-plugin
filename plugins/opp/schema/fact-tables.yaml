    - {к: GAP, поле: Закрываемый дефицит AS-IS, кардинальность: N-1, смысл: 'закрытие TO-BE дефицита AS-IS (направленно, C12)'}
    - {к: SOL, поле: Реализующее решение, кардинальность: N-1, смысл: продукт выбран в рамках решения; замкнутость TS∪SOL}
    - {к: SYS, поле: Затрагиваемая система, кардинальность: N-1, смысл: 'реализация в элементе ландшафта (направленно, C12)'}
    рецепт:
