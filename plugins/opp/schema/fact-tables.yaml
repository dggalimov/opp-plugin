    инструкция: {дефолт: 'Строй оргструктуру совместно с процессами (Ур.5) — симметричные иерархии. Заводи орг.единицы и роли сверху вниз (направление→департамент→отдел→группа→роль) через «Входит в» и с явным «Уровнем оргструктуры». На каждый
        уровень процесса найди симметричного владельца. Каждую орг.единицу с расходом/доходом привяжи к ЦФО (ЦИ/ЦП/ЦМД/ЦЗ). Матрица полномочий строками связки «орг.элемент↔объект/шаг↔роль полномочия» (ORG_OBJ) — точка роста, не реализовано; сводку
        роли в полномочиях выводит поле «роль в полномочиях (сводка)». Владельцев справочников проставь как роли; пользователей отчётов не вписывай руками (выводятся со стороны REP). Где роль реализуется в системе — заполни «ИТ-профиль» (ссылки
        → SR); RLS — поле SR «Сводка ограничения доступа (RLS)», отдельная связка ORG×SR — точка роста, не реализовано. Единственного носителя помечай «Незаменимость = один носитель». Не
        сглаживай расхождения, но диагноз не ставь — зафиксируй фактуру и отметку «заявлено ≠ фактически», дефект заводи кандидатом в «Проблемах». Количества — в «Объёмные параметры». Суди по методике kb-audit, каркас Ур.6 + Часть II Ур.6 + раздел
        «Целостность 5↔6», р.6.', правка_пользователя: разрешена}
