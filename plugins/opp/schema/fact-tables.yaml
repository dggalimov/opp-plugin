    - {имя: Целевой продукт, вид: ссылки, обяз: условно, выводимое: да, цель: TS}
    - {имя: Дельта-доработка, вид: ссылки, обяз: нет, выводимое: да, цель: TS}
    - имя: Вертикальная согласованность
