    целостность: [код термина уникален и непуст, 'термин заказчика, категория, определение заказчика, статус сверки — заполнены', категория и статус сверки — из своих словарей, 'канон продукта, если задан, — из reference/glossary либо «нет соответствия»',
      под-поля привязки заполнены вместе (оба пусты или оба заданы); уровень 1–11; код строки — существующая строка таблицы этого уровня, 'нет висячих ссылок: «где впервые встречен» и привязка указывают на существующие строки', 'без дублей-двойников:
        пара термин+категория уникальна (мягко); варианты — в «Синонимы»', сквозные «источник»/«статус доказанности» не применяются (C1); флагов дефекта нет (C5)]
    жизненный_цикл:
