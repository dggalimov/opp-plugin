    - {имя: Связан с (сущности), вид: ссылки, обяз: нет, цель: TDM}
    - имя: Тип связи
      вид: перечисление
      обяз: условно
      словарь: [один-ко-многим, многие-ко-многим, ссылка-аналитика, родитель-потомок (иерархия)]
