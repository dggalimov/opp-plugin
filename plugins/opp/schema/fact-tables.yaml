      что_проблема: ['требование без целевого закрытия (нет ни TS, ни SOL)', дельта без закрываемого требования, «не покрыто»/«покрыто иначе» при отсутствии дельты, выбор продукта без подключённого эталона]
      норма_глубины: 20/80 и приоритет ОБЭ; детально дельту и оценку — только под существенные требования, по малым — гигиенический маппинг
