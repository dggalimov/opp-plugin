    - {к: AM, поле: учётная модель, кардинальность: N-1, смысл: правило алгоритмизирует модель Ур.2}
    - {к: REP, поле: влияет на метрику, кардинальность: N-1, смысл: правило формирует метрику Ур.1 (фактически N-M; точка роста)}
    - {к: CR, поле: реализация в доработке, кардинальность: N-1, смысл: правило живёт в доработке Ур.8}
    - {к: ORG, поле: владелец-методолог, кардинальность: N-1, смысл: роль-владелец правила Ур.6}
    рецепт:
      ведущий_канал: регламенты/алгоритмы + фактический расчёт в базе (паспорт Ур.3); цифровой след перевешивает слова
      что_проблема: [заявлено ≠ фактически (политика ≠ расчёт системы), неверные алгоритмы, политика не зафиксирована, горизонт планирования не покрывает горизонт решений Ур.1, правило без метрики]
      норма_глубины: до правила, влияющего на метрику; точную формулу/множители раскапывать только под подтверждённый ущерб (20/80), прочее — гигиенический минимум
      опора: framework Ур.3; методика Часть II (паспорт Ур.3); р.5 (перекрёстная сверка); р.4 (лестница статусов)
    инструкция: {дефолт: 'Заведи строку на каждое бизнес-правило — распределение, элиминацию, метод оценки, учётную политику, горизонт/периодичность планирования. Зафиксируй «Заявлено (норма)» (как в регламенте/учётной политике) и «Фактический
        расчёт» (как реально считает система — типовая логика плюс доработка), сверь их и проставь «Совпадение норма ↔ расчёт»: ведущий канал — фактический расчёт в базе, цифровой след перевешивает слова. При расхождении ставь «расходится», заведи
        запись-кандидат в проблему в Гипотезах/Проблемах со ссылкой на правило и не сглаживай факт под слова (таблица несёт факт, не диагноз). По возможности связывай правило с метрикой Ур.1; правило без метрики помечай кандидатом. Для планирования
        проверь, покрывает ли горизонт планирования горизонт решений Ур.1; горизонт — текстовый атрибут, количества не дублируй (они в VP). Тип решения не проставляй — он выводится у Проблемы. Каждый факт — со ссылкой на источник; статус подними
        до «цифрового следа» только при опоре на данные системы. Суди по методике kb-audit, framework Ур.3, Часть II (паспорт Ур.3), р.4–5. ИТЕРАЦИЯ ГЕЙТА Ф1: дроби — одно правило источника = одна строка (три вида СЗ = три строки); отдельно вылавливай регламентные сроки, пороги/допуски, органы и лестницы утверждения, запреты («нет X — нет Y») — это самостоятельные правила, в больших узлах ищи их в сносках/примечаниях/листах «вопросы».', правка_пользователя: разрешена}
    целостность: [код правила уникален и непуст; название непусто, 'вид правила, признак совпадения, статус доказанности — из словарей', источник обязателен и существует — факт без источника недействителен, 'нет висячих ссылок: учётная модель
        (AM) / метрика (REP) / доработка (CR) / роль-владелец (ORG) существуют, если заданы', 'поле «Совпадение норма ↔ расчёт» заполнено; при значении «расходится» — «Заявлено (норма)» и «Фактический расчёт» оба непусты, ожидается связанная
        запись-кандидат в диагностике (HYP/OQ/PRB → BR)', статус ≥ «цифровой след» допустим только при источнике природы «данные системы», 'флагов дефекта в BR нет (политика C5); накопление: новый канал дополняет строку, гипотеза не затирается']
    жизненный_цикл:
      ось: доказанность
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел «Бизнес-правила и учётные политики (Ур.3)»), Протокол встречи]
    стык:
      даёт: доказанные бизнес-правила Ур.3 с разметкой «заявлено ↔ фактически»; расхождения «политика ≠ расчёт» как ссылки-кандидаты для диагностики; привязку правил к моделям (AM), метрикам (REP), доработкам (CR), ролям-владельцам (ORG)
      потребляет: [Источники (SRC), 'методика (framework Ур.3, Часть II паспорт Ур.3, разделы 4–5)', 'доменная БЗ структуры конфигурации (эталон типовой логики — опционально, через контракт SRC)', 'сырьё (учётная политика, регламенты, расчёт
          из базы, интервью методолога)', инструкция-промт]
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables/BR.md
