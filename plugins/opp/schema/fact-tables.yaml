    рёбра:
    - {к: TS, поле: Целевой продукт, кардинальность: N-1, смысл: где реализована сущность}
    - {к: TS, поле: Мастер-система, кардинальность: N-1, смысл: источник истины (методика р.5)}
    - {к: TDM, поле: Связан с (сущности), кардинальность: N-M, смысл: связи модели данных (рефлексивно)}
    - {к: SOL, поле: ←Решение, кардинальность: N-M, смысл: 'трассировка: решение породило сущность'}
    - {к: TB, поле: ←Требование, кардинальность: N-M, смысл: 'трассировка: требование обеспечивается'}
    - {к: TLM, поле: Обеспечивает целевой отчёт, кардинальность: N-M, смысл: чем обеспечен целевой отчёт Ур.1}
    - {к: AM, поле: Источник-прообраз AS-IS, кардинальность: N-M, смысл: симметрия TO-BE↔AS-IS (прообраз)}
    - {к: NSI, поле: Источник-прообраз AS-IS, кардинальность: N-M, смысл: симметрия TO-BE↔AS-IS (прообраз НСИ)}
    - {к: VP, поле: Объёмы сущности, кардинальность: N-M, смысл: количества — в VP (C7)}
    рецепт:
      ведущий_канал: 'вне методики — ведущий вход: выбранная архитектура + целевые требования (навык target-architecture); точка отсчёта — целевые отчёты Ур.1 и целевая НСИ Ур.4'
      что_проблема: [сущность без трассировки до требования/решения (данные «на всякий случай»), целевой отчёт Ур.1 без обеспечивающего разреза/факта (отчёт без данных), справочник без мастер-системы при нескольких продуктах (нет источника истины
          — риск рассинхрона), дублирование одной сущности в разных продуктах без интеграции]
      норма_глубины: по навыку (C13) — сущности + ключевые атрибуты + связи + мастер-система (20/80); полная логическая/физическая модель — за границей OPP (Этап 2)
      опора: 'навык opp:target-architecture — основная логика; методика косвенно: р.5 (мастер-система определяется явно), р.7 (замкнутость трассировки), р.0 (граница); каркас Ур.1/2/4 (симметрия TO-BE)'
    инструкция: {дефолт: 'Спроектируй целевую модель данных по выбранной архитектуре и составу продуктов (DEC, TS). Иди от выхода назад: на каждый целевой отчёт Ур.1 (to-be/TLM) и каждое требование заведи сущности данных (объекты, справочники-НСИ,
        измерения, факты, документы-операции, регистры). На каждую укажи вид, назначение, ключевые атрибуты (не полный состав — Этап 2 за границей), целевой продукт и мастер-систему (источник истины определяется ЗДЕСЬ: при нескольких претендентах
        — ровно один). Свяжи сущности («Связан с» + «Тип связи»). Обязательно протрассируй до решения (←Решение) и/или требования (←Требование) — сирот без первопричины быть не должно. Покажи симметрию с AS-IS; при «преобразована» сошлись на
        прообраз в AM/NSI. Числа не пиши значениями — заводи в VP, ссылайся «Объёмы сущности». Статус ставь честно: предложена → проработана → согласована (в «согласована» — только акцептованное владельцем). Доказательную лестницу гипотез не
        применяй: у TDM процессный статус, доказанность наследуется через TB/SOL. Суди по методике kb-audit, р.5 и р.7.', правка_пользователя: разрешена}
    целостность: [код сущности уникален и непуст; назначение и ключевые атрибуты непусты, 'перечисления (вид элемента, тип связи, симметрия, статус проектирования) — из словарей', 'трассировка обязательна: задана хотя бы одна ссылка ←Решение
        или ←Требование (нет сироты); SOL/TB существуют', целевой продукт задан и существует (нет висячей ссылки на TS), 'инвариант мастер-системы: для объекта/справочника «Мастер-система» задана; при нескольких продуктах — ровно одна; признак
        «определена» выводим, не правится руками', 'нет висячих ссылок: SOL/TB/TS/прообраз AS-IS (AM,NSI)/целевой отчёт (TLM)/объёмы (VP) существуют, если заданы', 'самосвязи замкнуты и ацикличны: «Связан с» указывает на существующую строку TDM;
        при связи задан «Тип связи»; иерархии без циклов', 'симметрия: при «преобразована из AS-IS» задан «Источник-прообраз AS-IS» (существующая строка AM/NSI)', 'обеспеченность выхода: каждый целевой отчёт Ур.1 (TLM) обеспечен хотя бы одной
        сущностью TDM', 'своих чисел и сквозных нет (C1,C7): полей объёма/частоты/ёмкости и источник/статус доказанности в строке быть не должно', 'нет флага дефекта и «тип решения» (C5,C6): TDM несёт проектное решение, не диагноз']
    жизненный_цикл:
      ось: проектирование
      статусы: [предложена, проработана, согласована]
      доказательная_зрелость: нет
    проекция: [Концепция TO-BE и дорожная карта (раздел «Данные целевой системы»), Сводная картина TO-BE (раздел «Учётные модели и НСИ целевого состояния»), Схема связей сущностей (вход для генератора диаграмм)]
    стык:
      даёт: целевую модель данных (сущности · ключевые атрибуты · мастер-системы · связи); ответ «чем обеспечен каждый целевой отчёт» (направленно в to-be/TLM); вход для целевых интеграций НСИ Ур.9 (источник истины, направленно, C12); вход для
        оценки в дорожной карте; симметрию TO-BE↔AS-IS (прообраз в AM/NSI)
      потребляет: [SOL, TB, TS, DEC, TLM, AM, NSI, VP, 'skill-target-arch (логика проектирования, C13)', 'kb-audit (косвенно: р.5 мастер-система, р.7 трассировка)']
      зависит_от: [reg-facttables, skill-target-arch]
      где: spec/fact-tables/TDM.md
