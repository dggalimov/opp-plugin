      ведущий_канал: не применяется (MTG не несёт факт уровня); тип встречи задаёт ведущий канал суждения у рождённых фактов
      что_проблема: [обязательный по сценарию канал без проведённой встречи (гейт закрыт), отменённый критичный канал без замены (стоп-сигнал перед синтезом)]
      норма_глубины: полнота — все запланированные и проведённые встречи учтены (гигиенический минимум для гейта); глубину разбора задаёт навык opp:analyze-meeting
      опора: методика р.8 (гейт готовности разведки), р.10 (тип встречи ↔ ведущий канал); навык opp:analyze-meeting; этап 0 (сценарий эксплуатации)
    инструкция: {дефолт: 'Заведи на каждую встречу строку: код, тему, тип, статус (запланирована → проведена → отменена), планируемую дату. Сверяйся со сценарием эксплуатации (этап 0): запланируй встречи на все обязательные каналы людей — незапланированный
        канал держит разведку открытой. Когда встреча состоялась — статус «проведена», обязательно фактическая дата и участники (ссылки на STK). Одна встреча может породить несколько источников. Обработку (тип, протокол, мёрж) ведёт навык opp:analyze-meeting;
        здесь — учесть событие и связать источники. Сорвалась — статус «отменена» + обязательно причина. Суди по методике kb-audit, р.8, р.10.', правка_пользователя: разрешена}
    целостность: [код встречи уникален и непуст; тема непуста, тип встречи и статус — из словарей; планируемая дата непуста, при статусе «проведена» — заполнена фактическая дата, при статусе «отменена» — заполнена причина отмены, 'нет висячих
        ссылок: участники (STK) и источники (SRC) существуют', 'у проведённой встречи, давшей фактуру, есть хотя бы один источник (нет «проведена» без следа)', 'обязательный канал сценария без проведённой встречи — открытый пробел разведки, не
        сглаживается', 'проведённая встреча, на которую ссылаются источники, не удаляется и не перезаписывается (отмена — статус, не удаление)']
    жизненный_цикл:
      ось: процессный статус
