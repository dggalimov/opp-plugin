        Ур.9)
      потребляет: [SRC, действующая отчётность и интервью руководства, методика (каркас Ур.1 + Часть II Ур.1), asis-levels, 'NSI (Ур.4; связка «отчёт ↔ разрез» REP×AN — точка роста, не реализовано)', 'TB (поля покрытия проблем)', инструкция-промт]
      зависит_от: [reg-facttables]
      где: spec/fact-tables/REP.md
  AM:
