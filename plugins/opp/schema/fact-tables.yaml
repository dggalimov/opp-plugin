        проблем уровня (картина не пересчитывает); доказанные — только PRB с гейтом ОБЭ, 'дефект не в картине: Расхождения и Доказанные проблемы — агрегаты ссылок на HYP/PRB', перечень сверок уровня совпадает с перекрёстные_сверки этого уровня
        в framework.yaml, 'детерминированность: повторная пересборка из тех же реестров даёт идентичную картину']
