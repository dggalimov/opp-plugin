    инструкция: {дефолт: 'На каждое согласованное требование (TB) с доказанной проблемой (PRB) заведи решение — замкнутость р.7. Обе ссылки (устраняемая проблема, закрываемое требование) обязательны и одиночные. Тип решения не указывай руками
        — он выводится из уровня устранения (Ур.1–3 → методологическое; Ур.4–6 → организационное; Ур.7–11 → технологическое). Комплекс типов — несколько строк SOL на проблему; дефект «средствами другого уровня» — второе решение на смежном уровне,
        не подмена типа. Формулируй как бизнес-результат, не как кнопку/продукт. Обоснование держи лёгким (портфель — в DEC). Подбор продукта, дельту, выбор платформы делает навык opp:solutions. Своих чисел не пиши. Суди по методике kb-audit,
        р.6–7.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; формулировка непуста, 'тип решения, уровень устранения, статус проработки — из словарей', 'тип решения согласован с уровнем устранения (выводимый, проверка жёсткая)', 'у каждого решения заполнены устраняемая
        проблема (→PRB) и закрываемое требование (→TB), обе одиночные', 'замкнутость: каждое согласованное TB имеет хотя бы одно решение', нет висячих ссылок (PRB / TB / GAP / TS / SOL), решение «согласовано» не ссылается на проблему/требование
        ниже статуса «согласовано», нет циклов в зависимостях решение→решение, 'делегированные поля «целевой продукт» и «обоснование выбора» на verify не обязательны (гейт навыка opp:solutions)']
    жизненный_цикл:
      ось: проработка
      статусы: [предложено, проработано, согласовано, отклонено]
