# schema/fact-tables.yaml — единый контракт таблиц фактов (silver).
# Машинная проекция паспортов (spec/fact-tables/<КОД>.md). 39 таблиц, reg-facttables.
# Цели рёбер: код таблицы | * (любая) | <по-уровню> (полиморфно по полю «уровень») | @внешн.
версия: 1

# Профиль пилота (Р-1, ЗР-0020): несущее ядро — обязательный контур наполнения на пилоте.
# Хвост схемы остаётся контрактом, но на пилоте не обязателен (20/80). Гейт готовности и
# воркспейс-линт считают готовность по этому профилю.
профиль_пилота: [SRC, MAT, VP, KBP, HYP, OQ, PRB, EFF, TB,
                 REP, AM, BR, NSI, PRC, ORG, SYS, CR, GAP, INT]

# Конвейер заполнения (ЗР-0024, п.4): последовательность синтеза — каждая таблица ровно в одной
# стадии. Правило направления (политика C14): не-выводимое поле-ссылка стадии N целится только
# в стадии ≤N или в сквозные; обратные связи — только выводимыми полями (проверяет schema.lint).
конвейер:
  сквозные-управляющие: [SRC, MAT, KBP, MTG, STK, TSK, GLO, AGD]
  1-разведка: [VP, REP, AM, BR, NSI, PRC, PSK, ORG, SYS, CR, GAP, INT, SR, INF, RACI, HYP, OQ]
  2-диагноз: [PRB, EFF, TB]
  3-осмысление: [SOL, AV, TS, FIT, COV, DEC]
  4-целевая: [TDM, RM]
  представления: [asis-levels, asis-traceability, TLM]
таблицы:
  SRC:
    название: Источники
    группа: 1. Вход и обвязка → провенанс
    тип: первичная
    уровень: null
    покрытие_методикой: есть
    поля:
    - {имя: код источника, вид: текст, обяз: да, уникально: да}
    - {имя: название, вид: текст, обяз: да}
    - имя: тип канала
      вид: перечисление
      обяз: да
      словарь: [Люди, Документы, База данных]
    - {имя: дата, вид: дата, обяз: да}
    - имя: способ получения
      вид: перечисление
      обяз: да
      словарь: [самостоятельно получено и перепроверено, самостоятельно получено, предоставлено заказчиком]
    - имя: природа доказательства
      вид: перечисление
      обяз: да
      словарь: [данные системы, документ, устное, пересказ]
    - имя: надёжность
      вид: перечисление
      обяз: да
      словарь: [высокая, средняя, низкая]
    - имя: статус обработки
      вид: перечисление
      обяз: да
      словарь: [зарегистрирован, частично разобран, разобран]
    - {имя: ссылка на материал, вид: ссылка, обяз: нет, цель: MAT}
    - {имя: ссылка на встречу, вид: ссылка, обяз: нет, цель: MTG}
    - {имя: ответственный заказчика, вид: текст, обяз: нет}
    - {имя: факты из источника, вид: ссылки, выводимое: да, источник: '*.источник'}
    рёбра:
    - {к: '*', поле: факты из источника, кардинальность: 1-N, смысл: провенанс}
    - {к: MAT, поле: ссылка на материал, кардинальность: N-1}
    - {к: MTG, поле: ссылка на встречу, кардинальность: N-1}
    рецепт:
      ведущий_канал: поток входа (сквозная)
      что_проблема: [материал без источника, источник без надёжности, несколько источников на факте без мастер-системы]
      норма_глубины: полнота входа — гигиенический минимум; глубоко — только источники подтверждённого ущерба (20/80)
      опора: методика р.3 (провенанс), р.4 (надёжность)
    инструкция: {дефолт: 'На каждый принятый материал, встречу или выгрузку заведи источник: устойчивый код, тип канала, дату, способ получения и природу доказательства (→ надёжность), статус обработки. Не пропускай ни один первичный материал
        — даже неразобранный регистрируй (полнота входа). Свяжи источник с материалом или встречей. Никогда не перезаписывай источник — при другом канале заведи новый. Суди по методике kb-audit, р.3–4.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; дата непуста, перечисления — из словаря, 'полнота входа: каждый материал имеет источник', нет висячих ссылок (материал/встреча существуют), 'двусторонность: факт ссылается — источник существует', источник
        со ссылками не удаляется и не перезаписывается]
    жизненный_цикл:
      ось: статус обработки
      статусы: [зарегистрирован, частично разобран, разобран]
      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (раздел Источники), Протокол аудита материалов]
    стык:
      даёт: устойчивый код источника + надёжность + тип канала; двусторонняя связь факт↔источник
      потребляет: [Источники/приём, MAT, MTG, kb-audit (логика р.3)]
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables.md
  MAT:
    название: Реестр материалов
    группа: вход/провенанс
    тип: первичная
    уровень: null
    покрытие_методикой: частично
    поля:
    - {имя: код материала, вид: текст, обяз: да, уникально: да}
    - {имя: название, вид: текст, обяз: да}
    - имя: тип материала
      вид: перечисление
      обяз: да
      словарь: [учётная политика, методология учёта/отчётности, регламент процесса, должностная инструкция, Excel-модель, форма планирования, управленческая отчётность, выгрузка 1С, запись встречи, переписка, прочее]
    - имя: формат
      вид: перечисление
      обяз: да
      словарь: [документ (Word/PDF), таблица (Excel), презентация, изображение/скан, аудио/видео, архив, ссылка, прочее]
    - имя: канал поступления
      вид: перечисление
      обяз: да
      словарь: [папка входящих, облачная ссылка, почта, мессенджер, передан на встрече, выгрузка из системы]
    - {имя: дата поступления, вид: дата, обяз: да}
    - имя: статус разбора
      вид: перечисление
      обяз: да
      словарь: [зарегистрирован, в разборе, частично разобран, разобран, не поддаётся разбору]  # «частично разобран» — гейт Ф1: большие узлы и потери конвертации; формулировка едина с SRC
    - {имя: 'опись сущностей', вид: текст, обяз: нет, смысл: 'YAML-словарь «таблица: число» — сколько сущностей каких таблиц заявляет материал (проход-1 разбора, ДО извлечения); линт сверяет с фактически извлечённым (спека 08 §4)'}
    - {имя: ссылка на источник, вид: ссылка, обяз: нет, цель: SRC}
    - {имя: ответственный заказчика, вид: текст, обяз: нет}
    - {имя: примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: SRC, поле: ссылка на источник, кардинальность: N-1, смысл: материал → источник (двусторонняя)}
    рецепт:
      ведущий_канал: поток входа
      что_проблема: [материал не зарегистрирован (потерян), материал не разобран без причины, 'формат не поддаётся — фиксируем как открытый вопрос, не пропускаем молча', 'выборочное чтение без описи (брак трёхтактного протокола, спека 08 §4)']
      норма_глубины: полнота — все материалы зарегистрированы; глубина разбора — по приоритету и риску (20/80)
      опора: методика р.3 (полнота входа); навык opp:analyze-materials; спека 08 §4 (трёхтактный протокол)
    инструкция: {дефолт: 'Зарегистрируй каждый входящий материал: код, название, тип, формат, канал поступления, дату. Ничего не пропускай — даже неоткрывшееся/неразобранное заведи со статусом «зарегистрирован» или «не поддаётся разбору». Разбор
        веди трёхтактным протоколом (спека 08 §4): (1) опись — ДО извлечения посчитай сущности по структуре/шапкам/спискам материала (дёшево даже для больших узлов) и запиши в «Опись сущностей» YAML-словарём «таблица: число» (например {REP: 70,
        PRC: 12, BR: 5}); (2) извлечение — заведи источник (ссылка на «Источники») и разбери материал в строки таблиц фактов; (3) счётная сверка — сверь число извлечённых строк с описью: расхождение чини (дочитай) или зафиксируй честно («частично
        разобран» + открытый вопрос на дочитку с числом остатка). Статус «частично разобран» без описи и без вопроса на дочитку — брак протокола, не допускается. Выборочное чтение без описи — тоже брак. Архив с разными документами разбей на отдельные
        материалы: один материал — один источник. Суди по методике kb-audit, р.3, спека 08 §4.', правка_пользователя: разрешена}
    целостность: ['код уникален; тип, формат, канал, статус разбора — из словарей; дата непуста', 'полнота: у каждого материала есть статус разбора; у разобранного — ссылка на источник', нет висячих ссылок (источник существует), ни один материал
        не удаляется молча (полнота входа)]
    жизненный_цикл:
      ось: статус разбора
      статусы: [зарегистрирован, в разборе, частично разобран, разобран, не поддаётся разбору]
      доказательная_зрелость: нет
    проекция: [Протокол аудита материалов, Отчёт об обследовании AS-IS (Перечень материалов)]
    стык:
      даёт: полный типизированный перечень входа; гарантия полноты; материал → источник
      потребляет: [Источники/приём (поток входа), kb-audit (логика р.3), 'opp:analyze-materials', инструкция-промт]
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables.md
  VP:
    название: Объёмные параметры
    группа: вход/провенанс
    тип: первичная
    уровень: null
    покрытие_методикой: частично
    поля:
    - {имя: Код параметра, вид: текст, обяз: да, уникально: да}
    - {имя: Показатель, вид: текст, обяз: да}
    - {имя: Значение, вид: число, обяз: да}
    - {имя: Единица, вид: текст, обяз: да}
    - имя: Тип значения
      вид: перечисление
      обяз: да
      словарь: [среднее, пиковое, минимальное, точное (разовое)]
    - имя: Период
      вид: перечисление
      обяз: да
      словарь: [в месяц, в год, на дату]
    - имя: Объект привязки
      вид: перечисление
      обяз: да
      словарь: [бизнес в целом, система, процесс, подразделение]
    - {имя: Дата актуальности, вид: дата, обяз: да}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - имя: Статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс (обязательно)}
    - {к: EFF, поле: Объект привязки, кардинальность: 1-N, смысл: объём → множитель расчёта ущерба}
    - {к: SYS, поле: Объект привязки, кардинальность: N-1, смысл: объём как нагрузка системы (Ур.7)}
    - {к: PRC, поле: Объект привязки, кардинальность: N-1, смысл: привязка к процессу}
    - {к: ORG, поле: Объект привязки, кардинальность: N-1, смысл: привязка к подразделению}
    - {к: INF, поле: Объект привязки, кардинальность: 1-N, смысл: объём как требование к мощности (Ур.11)}
    - {к: RM, поле: Объект привязки, кардинальность: 1-N, смысл: объёмы → оценка трудоёмкости и волн}
    рецепт:
      ведущий_канал: данные системы (выгрузки, счётчики) — цифровой след сильнее слов
      что_проблема: [величина без источника недействительна (не идёт в ОБЭ), расхождение заявленного объёма с системным следом → кандидат в проблему]
      норма_глубины: объёмы под ОБЭ подтверждённого ущерба и под оценку нагрузки — не всё подряд
      опора: методика р.6 («сколько» = объём × ставка × частота); паспорта Ур.7 / Ур.11
    инструкция: {дефолт: 'Зафиксируй каждый объёмный показатель: что измеряем, значение, единицу, тип значения (среднее/пик/…), период, дату актуальности, к чему относится (бизнес/система/процесс/подразделение). Приоритетно бери цифровой след
        (выгрузки, счётчики); заявленные на словах помечай «гипотеза» до подтверждения. Каждый показатель — со ссылкой на источник; величина без источника недействительна. Объём — только количество; стоимость единицы и расчёт ущерба — в «Эффектах».
        Суди по методике kb-audit, р.6.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст, значение — число; тип значения и период из словарей, дата актуальности непуста; объект привязки задан, величина без источника недействительна (источник обязателен — методика р.6), нет висячих ссылок (источник
        / система / процесс существуют), 'расхождение заявленного и системного объёма зафиксировано, не сглажено']
    жизненный_цикл:
      ось: доказанность
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (количественная опора проблем и эффектов), Концепция TO-BE и дорожная карта (объёмы для оценки и проверки мощности), Протокол аудита материалов, Протокол встречи]
    стык:
      даёт: измеримые объёмы как множители ОБЭ и нагрузку систем/инфраструктуры
      потребляет: [Источники, методика (раздел 6), сырьё (выгрузки/счётчики/отчётность), инструкция-промт]
      зависит_от: [reg-facttables]
      где: spec/fact-tables.md
  KBP:
    название: Базы знаний проекта (эталоны)
    группа: вход/провенанс
    тип: первичная
    уровень: null
    покрытие_методикой: частично
    поля:
    - {имя: Код подключения, вид: текст, обяз: да, уникально: да}
    - {имя: Ссылка на БЗ (kb-id), вид: ссылка, обяз: да, цель: '@kb-03', смысл: 'продуктовая БЗ (компонент 03), референс не копия'}
    - имя: Роль БЗ
      вид: перечисление
      обяз: да
      словарь: [методика-логика, доменная-структура, доменная-методика, навигатор]
    - {имя: Домен / продукт, вид: текст, обяз: условно, смысл: для доменных ролей; пусто для методики-логики / навигатора}
    - {имя: Покрываемый уровень — номер, вид: число, обяз: условно, смысл: 'уровень каркаса 1–11 (полиморфная ссылка, C4)'}
    - {имя: Покрываемый уровень — строка, вид: ссылка, обяз: нет, цель: <по-уровню>, смысл: 'конкретная строка уровня по номеру (полиморфная ссылка, C4)'}
    - {имя: Привязка (полоса/назначение), вид: текст, обяз: да, смысл: полоса покрытия или сквозное назначение}
    - имя: Статус подключения
      вид: перечисление
      обяз: да
      словарь: [кандидат, активна, отключена]
    - имя: Происхождение подключения
      вид: перечисление
      обяз: да
      словарь: [выведено из профиля проекта, выведено из профиля сбора, добавлено вручную]
    - {имя: Версия / релиз эталона, вид: текст, обяз: нет, смысл: для доменных ролей; мягкая сверка при активации}
    - {имя: Профиль проекта, вид: ссылка, обяз: нет, цель: '@reg-profiles'}
    - {имя: Профиль сбора, вид: ссылка, обяз: нет, смысл: → профиль сбора capabilities/extract/profiles/*.yaml (поле база_знаний), цель: '@профиль-сбора'}
    - {имя: Примечание, вид: текст, обяз: нет}
    - {имя: Источники-эталоны из подключения, вид: ссылки, выводимое: да, источник: SRC (природа эталон → KBP)}
    рёбра:
    - {к: SRC, поле: Источники-эталоны из подключения, кардинальность: 1-N, смысл: обратная выводимая связь; контракт эталон на стороне SRC (C10)}
    - {к: <по-уровню>, поле: Покрываемый уровень — строка, кардинальность: N-1, смысл: полиморфная привязка к строке каркаса (Ур.7/Ур.8 косвенно через SRC)}
    рецепт:
      ведущий_канал: профиль проекта (reg-profiles) и профиль сбора (состав набора); нет ведущего уровня каркаса
      что_проблема: ['продукт в профиле без подходящего эталона нужной роли (сигнал на Ур.7→Ур.8, не флаг в KBP)', версия эталона не совпадает с версией системы заказчика (Ур.7) — повод уточнить подключение]
      норма_глубины: минимум — методика-логика подключена всегда + на каждый продукт профиля хотя бы доменная-структура; глубоко (доменная-методика + версия) — только под системы с подтверждённым дефицитом (20/80)
      опора: методика р.3 (эталон как особый источник), р.6 (функциональный дефицит = зазор к типовой); состав ролей и выведение из профилей — вне методики (компонент 03 / reg-profiles / профиль сбора, политики C9, C13)
    инструкция: {дефолт: 'Подключи к проекту базы знаний по профилю. По профилю проекта и профилю сбора (поле база_знаний) на каждый продукт заведи строку-подключение: сошлись на kb-id в продуктовом реестре БЗ (компонент 03), не копируй содержимое
        БЗ. Проставь роль (доменная-структура / доменная-методика / навигатор; методика-логика kb-audit ставится авто, руками не заводи). Для доменных ролей укажи домен/продукт, покрываемый уровень каркаса (1–11; точечно — строку уровня), привязку
        и, если известно, версию/релиз эталона. Помечай происхождение (профиль проекта / профиль сбора / вручную); неточную конфигурацию определи навигатором и держи строку кандидатом до подтверждения. Никогда не дублируй содержимое БЗ, своих
        чисел и флагов дефекта не заводи. При переводе доменной строки в активна сверь версию эталона с версией системы (Ур.7). Связь с источником-эталоном живёт на стороне SRC — в KBP она обратная выводимая, руками не правь. Суди по методике
        kb-audit, р.3 и р.6.', правка_пользователя: разрешена}
    целостность: [код подключения уникален и непуст, 'роль, статус подключения, происхождение подключения — из словарей', kb-id непуст и существует в продуктовом реестре БЗ (компонент 03); строка не копирует содержимое БЗ, 'для доменных ролей
        домен/продукт и привязка заданы; номер уровня в диапазоне 1–11; если задана строка уровня — она существует (полиморфная ссылка, C4)', 'методика-логика подключена ровно одной активной строкой (заводится авто, руками не создаётся)', если
        профиль проекта задан — каждый продукт профиля имеет хотя бы одно подключение, профиль проекта и профиль сбора (если указаны) существуют — нет висячих ссылок, 'мягкая сверка версии (предупреждение): доменная активна без версии при наличии
        источника-эталона; несовпадение версии с Ур.7', 'нет дубля: одна БЗ в одной роли подключается к проекту один раз', 'отключённая БЗ не удаляется молча, если на неё ссылаются источники-эталоны SRC']
    жизненный_цикл:
      ось: подключение
      статусы: [кандидат, активна, отключена]
      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (косвенно — раздел/приложение Источники и формулировки дефицита), Служебная шапка/паспорт проекта отчёта (перечень подключённых продуктов и эталонов), Концепция TO-BE и дорожная карта (косвенно — типовая
        функция для дельты)]
    стык:
      даёт: набор продуктовых БЗ проекта с ролью, покрываемым уровнем и статусом подключения; ссылку kb-id на компонент 03 (референс, не копия); точку привязки для источников-эталонов SRC (контракт эталон — на стороне SRC)
      потребляет: [reg-profiles (профиль проекта), 'профиль сбора (capabilities/extract/profiles/*.yaml, поле база_знаний)', продуктовый реестр БЗ (компонент 03) — справочник kb-id, 'методика kb-audit (р.3, р.6)', навигатор по продуктам (kb-nav-1c),
        '@kb-03', '@reg-profiles']
      зависит_от: [reg-facttables, kb-nav-1c, kb-audit]
      где: spec/fact-tables/KBP.md
