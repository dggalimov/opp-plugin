        заданы — их ≥2 и «выбранный вариант» входит в их множество (≥2 — мягкое для безальтернативного предмета); AV/FIT — условно (спека 06-d, вне периметра продукта)', 'если «покрытие требований выбранным» задано — ссылается на существующую
        FIT/COV; вывод не противоречит матрице без записи в «компромиссы»', на каждый отклонённый
        вариант (рассмотренные \ выбранный) есть причина в «отклонённые варианты — почему», '«целевые продукты выбора» = продукты выбранного варианта (VAR → TS, выводимое); «критерии сравнения» ≥1; «итог по критериям» задан', 'никаких собственных
        чисел (объём/частота/ставка/смета — ссылки в VP/EFF, не в DEC)', статус «согласовано» — только при заполненном «акцепт владельца», 'нет висячих ссылок (VAR, FIT/COV, CRIT, TB, TS, STK, SRC, DEC)', 'накопление, не перезапись: новое решение
        — новая строка со ссылкой «пересматривает», прежнее → «пересмотрено»', рефлексивная связь «пересматривает» ациклична]
    жизненный_цикл:
      ось: решение
      статусы: [черновик, предложено, согласовано, пересмотрено]
      доказательная_зрелость: нет
    проекция: [Концепция TO-BE и дорожная карта (раздел «Обоснование выбора платформы / целевой архитектуры»), Отчёт об обследовании AS-IS (как правило не идёт; при совмещении — кратко мостом)]
    стык:
      даёт: обоснованный выбор целевой платформы / варианта архитектуры (что, из каких альтернатив, по каким критериям, с какой ценой и отклонёнными ветвями) с жизненным циклом решения и акцептом; одна точка правды для целевой модели и дорожной
        карты; трассировка выбор→TB и выбор→TS
      потребляет: [VAR, FIT, связка вариант × критерий, CRIT, TB, TS, STK, SRC, 'opp:solutions (логика выбора)', 'kb-audit (сквозные принципы р.1, р.6, р.9)']
      зависит_от: [reg-facttables, skl-solutions]
      где: spec/fact-tables/DEC.md
  TDM:
    название: Целевая модель данных
    группа: '4. Осмысление: решения и целевое (TO-BE)'
    тип: первичная
    уровень: null
    покрытие_методикой: делегировано навыку opp:target-architecture (C13)
    поля:
    - {имя: Код сущности, вид: текст, обяз: да, уникально: да}
