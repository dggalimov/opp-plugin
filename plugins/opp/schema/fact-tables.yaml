  RM:
    название: Дорожная карта
    группа: '4. Осмысление: решения и целевое (TO-BE)'
    тип: первичная
    уровень: null
    покрытие_методикой: частично
    поля:
    - {имя: Код элемента карты, вид: текст, обяз: да, уникально: да}
    - {имя: Название, вид: текст, обяз: да}
    - имя: Уровень планирования
