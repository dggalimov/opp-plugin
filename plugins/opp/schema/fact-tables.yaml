    - {к: SRC, поле: источник-эталон, кардинальность: N-1, смысл: 'провенанс эталона (SRC-KB → KBP, контракт C10)'}
    - {к: SYS, поле: система, кардинальность: N-1, смысл: носитель типовой (Ур.7)}
    - {к: CR, поле: закрывающая доработка, кардинальность: N-1, смысл: способ закрытия (причина GAP ↔ следствие CR)}
    - {к: BR, поле: реализуемое правило/требование, кардинальность: N-1, смысл: основная трасса потребности (BR/TB)}
    - {к: REP, поле: происхождение потребности — строка, кардинальность: N-1, смысл: 'полиморфное происхождение потребности (по уровню, C4)'}
    рецепт:
      ведущий_канал: конфигурация — метаданные и сравнение с типовой (цифровой след, Ур.8)
      что_проблема: [зазор закрыт теневым ИТ / обходным решением, зазор не закрыт при доказанной потребности, 'закрыт доработкой, блокирующей обновления (разрыв с типовой)']
      норма_глубины: до доработки и закрываемого ею дефицита; глубоко — только дефициты с подтверждённым ущербом (20/80), запрет идеализации
      опора: каркас Ур.8; методика р.6 (дефицит = зазор к типовой), р.3 (эталон как источник), р.5 (плоскость заявленное×фактическое×эталонное), Часть II Ур.8
    инструкция: {дефолт: 'Меряй дефицит зазором к типовой, а не на глаз. На каждую нужную бизнесу функцию, не покрытую (или покрытую не так) типовой, заведи строку: что за функция (бизнес-результат, не «кнопка»), в какой системе меряем (SYS Ур.7),
        как ту же потребность закрывает типовая функция продукта — формулировку бери из подключённой доменной БЗ через KBP, сошлись на источник-эталон (SRC-KB → KBP). Без источника-эталона зазор недействителен. Проставь степень покрытия по единой
        шкале и опиши зазор. Зафиксируй, чем закрыт сейчас: доработкой (→ CR), обходным решением / теневым ИТ, не закрыт совсем. За нужной функцией — правило Ур.3 (BR) или БТ (основная трасса); по возможности привяжи происхождение потребности
        парой «уровень (1–5) + строка» (REP/AM/BR/NSI/PRC). Рвёт с типовой и мешает обновлениям — отметь. Количеств не пиши: объём/частота — в VP, ставка/ущерб — в EFF. Каждый зазор — со ссылкой на источник; без источника недействителен. Сам
        зазор — не диагноз: кандидат в проблему заводи в PRB со ссылкой, флагов дефекта в строку не ставь. Суди по методике kb-audit, р.3, р.5, р.6, Часть II Ур.8.', правка_пользователя: разрешена}
    целостность: [код дефицита уникален и непуст, нужная функция и эталон (типовая функция) непусты, 'перечисления (степень покрытия, чем закрыт сейчас, влияние на обновляемость, статус доказанности) — из словарей', 'оба провенанса обязательны:
        источник (наблюдение) и источник-эталон (типовая функция); без источника-эталона запись недействительна', 'источник-эталон ссылается на источник природы «эталон» (SRC-KB), привязанный к KBP — мягкая проверка (поле эталон→KBP проверяется
        на стороне SRC)', 'нет висячих ссылок: источник, источник-эталон, система, закрывающая доработка, реализуемое правило/требование существуют', 'полиморфное «происхождение потребности»: если задано — уровень в 1–5, строка существует в таблице
        по уровню; уровень и строка задаются вместе', 'условная обязательность: степень покрытия ≠ «покрыто типовой» → описание зазора заполнено; чем закрыт = «доработкой» → закрывающая доработка заполнена и существует в CR', 'версия эталона
        (KBP) согласуется с версией системы (SYS, Ур.7) — мягкая проверка-предупреждение, направленно', 'флагов дефекта в строке нет (политика C5): дефект-кандидат — в PRB/HYP/OQ со ссылкой на строку GAP', 'своих количеств строка не несёт (C7):
        числовых полей объёма/частоты/ставки нет — нет дублирования чисел VP/EFF', 'двусторонность с источником: источник существует и перечисляет этот факт (накопление, не перезапись)']
    жизненный_цикл:
      ось: доказанность
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: ['Отчёт об обследовании AS-IS (раздел архитектуры/доработок, Ур.8)', Концепция TO-BE и дорожная карта (основа дельты БТ → типовая функция → доработка), Протокол встречи]
    стык:
      даёт: доказанная картина функционального дефицита AS-IS (зазоры «нужная функция ↔ типовая функция (эталон)» с источником-эталоном SRC-KB→KBP, степенью покрытия по единой шкале, способом закрытия); локализация дефектов Ур.8 (фактура, не
        диагноз); разведение причины (GAP) и следствия (CR); основа дельты TO-BE
      потребляет: [SRC, KBP, SYS, CR, BR, REP, AM, NSI, PRC, конфигурация и сравнение с типовой (сырьё), методика kb-audit (каркас Ур.8 + р.6 + р.3 + р.5 + Часть II Ур.8), 'единая шкала покрытия (навык opp:solutions)']
      зависит_от: [reg-facttables]
      где: spec/fact-tables/GAP.md
