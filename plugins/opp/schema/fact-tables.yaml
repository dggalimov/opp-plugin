    - {имя: Зависимости перехода, вид: ссылки, обяз: нет, выводимое: да, цель: TLM}
    - имя: Статус целевой проработки уровня
      вид: перечисление
      обяз: да
      выводимое: да
      словарь: [не спроектирован, в проектировании, спроектирован, согласован]
    - {имя: Делегировано навыку, вид: текст, обяз: нет}
    рёбра:
    - {к: asis-levels, поле: Зеркало AS-IS, кардинальность: 1-1, смысл: зеркало по ключу уровня}
    - {к: SOL, поле: Решение-источник, кардинальность: 1-N, смысл: целевой элемент порождён решением (замкнутость р.7)}
    - {к: TS, поле: Целевой продукт, кардинальность: 1-N, смысл: продукт/функция (Ур.7–11)}
    - {к: AV, поле: TO-BE-таблицы уровня, кардинальность: N-1, смысл: раскладка выбранного варианта}
    - {к: DEC, поле: TO-BE-таблицы уровня, кардинальность: N-1, смысл: по итогам выбора платформы}
    - {к: TDM, поле: Целевые элементы уровня, кардинальность: 1-N, смысл: Ур.2/Ур.4 — ссылка на структуру данных}
    - {к: TB, поле: Закрываемые требования, кардинальность: 1-N, смысл: 'замкнутость TO-BE: требование имеет место'}
    - {к: PRB, поле: Устраняемые проблемы / ОБЭ, кардинальность: 1-N, смысл: устраняемый доказанный ущерб (ссылками)}
    - {к: EFF, поле: Устраняемые проблемы / ОБЭ, кардинальность: 1-N, смысл: 'ОБЭ через PRB→EFF, только ссылки'}
    - {к: TLM, поле: Зависимости перехода, кардинальность: N-M, смысл: рефлексивные зависимости перехода (ацикличны)}
    рецепт:
      ведущий_канал: собственного нет — симметричная проекция по оси уровней (TO-BE проектируют, не наблюдают)
      что_проблема: [разрыв замкнутости (согласованное требование без места в TO-BE), целевой элемент без решения (TO-BE из воздуха), вертикальный разрыв TO-BE (целевые уровни не согласованы)]
      норма_глубины: TO-BE проектируется глубоко только там, где AS-IS нёс подтверждённый ущерб (20/80, р.8); не ровным слоем
      опора: методика р.9 (проекция), р.2 (ось уровней), р.7 (замкнутость), р.6 (тип решения), р.5 (вертикальная сверка), р.8 (20/80); каркас framework.yaml; состав артефактов/формула статуса — навык opp:target-architecture (C13)
    инструкция: {дефолт: 'Не заполняй TLM руками — это выводимое представление (зеркало asis-levels на целевой стороне), оно пересобирается из TO-BE-реестров. Спроектируй TO-BE симметрично AS-IS (навык opp:target-architecture): пройди по всем
        11 уровням, для каждого возьми строку «Картины по уровням» и спроектируй целевое состояние (Ур.1 отчёты, Ур.2 модели, Ур.4 НСИ, Ур.5 процессы, Ур.6 оргструктура, Ур.7–11 ИТ-ландшафт/доработки/интеграции/роли/инфраструктура). Для Ур.2/Ур.4
        держи раскладку и связь с решением, за структурой данных ссылайся на TDM. На каждый целевой элемент — обязательная связь с решением (←SOL), через него с требованием (←TB) и проблемой (←PRB). Показывай отличие от AS-IS; уровень без изменений
        — явное «без изменений относительно AS-IS». Для Ур.7–11 укажи целевой продукт (←TS) и дельту-доработку; степень покрытия — по единой шкале (словарь opp:solutions). Читай картину как гейт замкнутости TO-BE: каждое согласованное требование
        имеет место хотя бы на одном уровне, каждый целевой элемент привязан к решению, целевые сверки замкнуты. Разрыв — сигнал довести нижние TO-BE-таблицы и завести кандидата в Открытых вопросах/Проблемах, не дописывать строку и не ставить
        флаг дефекта. Чисел не вводи: объёмы — из VP, ущерб — из EFF, тут ссылки. Уровень «спроектирован» только при одновременном выполнении всех условий (вариант AV выбран + вердикт DEC). Суди по методике kb-audit, р.9, р.2, р.7, р.6, р.5,
        р.8.', правка_пользователя: разрешена}
    целостность: ['ровно 11 строк — по одной на уровень (1–11), без пропусков и дублей; набор совпадает с asis-levels/framework.yaml', 'полоса строки соответствует каркасу (1–6 Бизнес, 7–11 ИТ)', ни одно поле не введено руками; запись не выводима
        из SOL/TS/AV/DEC/TDM — ошибка (representation read-only), 'своих чисел нет: объёмы/ущерб — только ссылки на VP/EFF', 'замкнутость TO-BE: каждое согласованное требование (TB) присутствует ≥1 уровня через решение', каждый целевой элемент
