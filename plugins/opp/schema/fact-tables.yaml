      норма_глубины: вне методики; фиксируем реально встречающиеся термины; уточняем/согласуем только те, от которых зависит верность реестров и читаемость отчёта
      опора: канон reference/glossary; дисциплина повторяемости (методика не привлекается)
    инструкция: {дефолт: 'Веди словарь терминов заказчика: как только он называет объект своим словом или аббревиатурой — заведи код термина, термин, категорию, определение его словами. Сопоставь с каноном reference/glossary (иначе «нет соответствия»).
        Если термин указывает на сущность реестра — проставь привязку: уровень (1–11) + код строки. Варианты/жаргон одного объекта — в «Синонимы», без дублей. Не выдумывай терминов; по возможности укажи, где впервые встречен. Важный смысл — «уточняется»
