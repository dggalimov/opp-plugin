    - {имя: примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: STK, поле: стейкхолдер заказчика, кардинальность: N-1, смысл: 'провенанс: от кого ждём вход / с кем согласовать'}
    - {к: MTG, поле: связанная встреча, кардинальность: N-1, смысл: 'провенанс: родилась из встречи / готовит к ней'}
