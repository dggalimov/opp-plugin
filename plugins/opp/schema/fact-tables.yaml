      словарь: [инициатор = контролёр, инициатор = согласующий, исполнитель = ревизор, единоличный полный цикл, иное]
    - {имя: Правило SoD (эталон), вид: ссылка, обяз: условно, цель: KBP}
    - имя: ЦФО
      вид: перечисление
      обяз: нет
      словарь: [ЦИ (центр инвестиций), ЦП (центр прибыли), ЦМД (центр маржинального дохода), ЦЗ (центр затрат), нет]
    - {имя: Связанная проблема, вид: ссылки, выводимое: да, источник: PRB}
    - имя: Статус назначения
      вид: перечисление
      обяз: да
      словарь: [заявлено (по документам), подтверждено (носителем/журналом), сверено (номинал × факт), согласовано]
    - {имя: Примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: ORG, поле: Роль / орг.единица, кардинальность: N-1, смысл: первая сторона проекции; к кому привязана ответственность}
    - {к: PRC, поле: Элемент процесса, кардинальность: N-1, смысл: вторая сторона проекции; симметрия владения Ур.5↔Ур.6}
    - {к: KBP, поле: Правило SoD (эталон), кардинальность: N-1, смысл: сменный эталон правил разделения полномочий}
    - {к: SR, поле: Фактический исполнитель (по журналам), кардинальность: N-1, смысл: реальный исполнитель по цифровому следу для сверки номинал × факт}
    - {к: PRB, поле: Связанная проблема, кардинальность: 1-N, смысл: структурный сигнал становится диагнозом на Ур.6}
    рецепт:
      ведущий_канал: для номинала — документы (штатка/положения/должностные/матрица заказчика); для факта — журналы и реальные исполнители; при расхождении перевешивает фактическое
      что_проблема: [размытая ответственность (нет владельца / нет инициатора / висит на всех), конфликт полномочий (SoD) — недопустимое совмещение видов, номинальное ≠ фактическое (теневое распределение), расход без ответственного ЦФО, незаменимый
          сотрудник (концентрация цепочки на одной роли)]
      норма_глубины: '20/80: владельцы и инициаторы на функциях и процессах + SoD по ключевым финансовым цепочкам; глубоко (подпроцесс/шаг) — только в процессах подтверждённого ущерба'
      опора: методика «Целостность процессов и оргструктуры (Ур.5 ↔ 6)» (матрица полномочий, симметрия владения, зеркало ЦФО, разделение полномочий, номинальное × фактическое); раздел 5; каркас Ур.6; эталон правил SoD через KBP; навык формирования
        оргструктуры / синтеза (расчёт тяжести делегирован)
    инструкция: {дефолт: 'Заполняй как связку «роль × элемент процесса»: роли бери из Оргструктуры (Ур.6), элементы — из Процессов (Ур.5), здесь не выдумывай, только ссылайся. На каждую пару проставь вид ответственности (инициатор/контролёр/согласующий/владелец)
        и источник назначения; сначала фиксируй номинал (статус «заявлено»). Затем сверь с фактом по журналам: ссылка «Фактический исполнитель» + выводимое «Совпадение»; сырьё журнала не копируй (живёт на Ур.5/Ур.10), расхождение не сглаживай
        — пометь «расходится» и заведи кандидата в проблему. Проверь SoD: несовместимые виды на одной роли/цепочке — пометь «Признак конфликта» и «Тип конфликта», «подтверждён» только при ссылке на правило эталона из KBP; иначе — «подозрение»,
        порог не решай сам. Привяжи элемент к ЦФО; расход без ЦФО — кандидат в проблему. Своих чисел не заводи (объём — в VP, ставка/ОБЭ — в EFF/PRB). Назначение задним числом не удаляй — переводи статус. Суди по методике kb-audit, раздел «Целостность
        процессов и оргструктуры (Ур.5 ↔ 6)» и раздел 5.', правка_пользователя: разрешена}
    целостность: [код назначения уникален и непуст; «Роль / орг.единица» и «Элемент процесса» заданы, 'перечисления (вид ответственности, источник назначения, совпадение, признак конфликта, статус назначения) — из словарей', 'нет висячих ссылок:
        ORG, PRC, SR/ORG (если задан), KBP (если задано), PRB', 'симметрия владения Ур.5↔Ур.6: у элементов верхних уровней (функция, процесс) есть назначение «владелец»; элемент без владельца → гипотеза/открытый вопрос; каждая роль ORG имеет
        ≥1 назначение', 'SoD: несовместимые виды на одной паре/цепочке ⇒ «Признак конфликта» ≠ «нет»; «подтверждён» только при ссылке «Правило SoD (эталон)» на KBP; без эталона — не выше «подозрение»', 'зеркало ЦФО: элемент-расход не может иметь
        ЦФО «нет» без заведённого открытого вопроса', 'согласованность сверки: «Фактический исполнитель» задан и не совпадает с ролью ⇒ «Совпадение» = «расходится»', 'глубина SoD по «Уровню элемента»: обязательна на подпроцесс/шаг в процессах
        подтверждённого ущерба и ключевых финансовых цепочках', 'накопление: назначение со ссылками не удаляется/не перезаписывается задним числом — выбытие через статус', своих чисел нет (объём/ставка/ущерб — по ссылке в VP/EFF через PRB), сквозные
        источник / статус доказанности к строкам RACI не предъявляются (таблица-связка)]
    жизненный_цикл:
      ось: статус назначения
      статусы: [заявлено (по документам), подтверждено (носителем/журналом), сверено (номинал × факт), согласовано]
      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (раздел «Оргструктура и ответственность»), опора под проблемами Ур.6, 'Концепция TO-BE и дорожная карта (косвенно, через target-architecture)', BPMN-готовое описание процесса (Ур.5)]
    стык:
      даёт: 'сетку ответственности «роль × элемент процесса» (виды: инициатор/контролёр/согласующий/владелец); нейтральные пометки конфликтов SoD и зон размытой ответственности; результат сверки «номинальное × фактическое»; привязку элементов
        к ЦФО — структурные сигналы для «Проблем» Ур.6 (без чисел и без диагноза)'
      потребляет: [ORG, PRC, KBP, SR, журналы (фактический исполнитель), методика (Целостность 5 ↔ 6; раздел 5), инструкция-промт, VP/EFF через PRB (множители ущерба)]
      зависит_от: [reg-facttables, ft-ORG, ft-PRC, ft-KBP]
      где: spec/fact-tables/RACI.md
  SYS:
    название: Системы
    группа: Факты по каркасу (AS-IS) → полоса «ИТ», Уровень 7
    тип: первичная
    уровень: 7
    покрытие_методикой: есть
    поля:
    - {имя: код системы, вид: текст, обяз: да, уникально: да}
    - {имя: название, вид: текст, обяз: да}
    - имя: класс системы
      вид: перечисление
      обяз: да
      словарь: [учётная (ERP/УПП/Бухгалтерия), 'специализированная учётная (ЗУП, БИТ.Финанс и т. п.)', CRM, склад/WMS, документооборот, BI/отчётность, самописная, теневое ИТ, прочая]
    - {имя: назначение, вид: текст, обяз: да}
    - имя: тип развёртывания
      вид: перечисление
      обяз: нет
      словарь: [локально (on-prem), облако (SaaS), гибрид, неизвестно]
    - {имя: вендор / основа, вид: текст, обяз: нет}
    - {имя: версия платформы, вид: текст, обяз: нет, значимость: полнота}
    - {имя: релиз конфигурации, вид: текст, обяз: нет}
    - имя: признак типовой
      вид: перечисление
      обяз: нет
      словарь: [типовая, типовая с доработками, снята с поддержки, самописная, неизвестно]
    - имя: заявлено ≠ фактически
      вид: перечисление
      обяз: нет
      словарь: [нет расхождения, заявленная версия ≠ фактическая, 'заявлена в ландшафте, не используется', 'нагрузка заявлена, не подтверждена']
    - {имя: владелец (бизнес), вид: текст, обяз: нет, значимость: полнота}
    - {имя: администратор, вид: текст, обяз: нет}
    - имя: статус эксплуатации
      вид: перечисление
      обяз: да
      словарь: [в промышленной эксплуатации, в опытной эксплуатации, во внедрении, выводится из эксплуатации, не используется]
      значимость: полнота
    - {имя: объёмы (нагрузка), вид: ссылки, обяз: нет, цель: VP}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - имя: статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    - {имя: примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс (сквозное)}
    - {к: VP, поле: объёмы (нагрузка), кардинальность: 1-N, смысл: 'нагрузка; числа в VP, здесь ссылки'}
    - {к: REP, поле: null, кардинальность: N-1, смысл: 'входящая REP→SYS: место формирования отчёта (Ур.1)'}
    - {к: AM, поле: null, кардинальность: N-1, смысл: 'входящая AM→SYS: где живёт модель (Ур.2)'}
    - {к: NSI, поле: null, кардинальность: N-1, смысл: 'входящая NSI→SYS: мастер-система НСИ (Ур.4)'}
    - {к: PRC, поле: null, кардинальность: N-1, смысл: 'входящая PRC→SYS: система операции (Ур.5)'}
    - {к: CR, поле: null, кардинальность: N-1, смысл: 'входящая CR→SYS: доработка к системе и релизу (Ур.8)'}
    - {к: INT, поле: null, кардинальность: N-1, смысл: 'входящая INT→SYS: концы потока источник/приёмник (Ур.9)'}
    - {к: SR, поле: null, кардинальность: N-1, смысл: 'входящая SR→SYS: системная роль в системе (Ур.10)'}
    - {к: INF, поле: null, кардинальность: N-1, смысл: 'входящая INF→SYS: узел инфраструктуры (Ур.11)'}
    - {к: ORG, поле: владелец (бизнес), кардинальность: N-1, смысл: 'мягкая сверка на синтезе (Ур.6), не ссылка'}
    - {к: HYP, поле: null, кардинальность: N-1, смысл: 'входящая HYP/PRB→SYS, полиморфная: уровень 7 + код строки SYS'}
    рецепт:
      ведущий_канал: интервью ИТ + инвентаризация ландшафта (методика Ч.II Ур.7; акцент источника — База данных, Люди)
      что_проблема: [зоопарк систем, нет единого учётного ядра, система без бизнес-нагрузки, устаревшие версии/релизы, система без владельца]
      норма_глубины: до системы и её нагрузки; гигиенический минимум — все системы инвентаризованы (вкл. теневое ИТ с нагрузкой); глубоко — только источники подтверждённого ущерба (20/80)
      опора: каркас Ур.7 (что_в_нём/что_выясняем/дефекты/перекрёстные_сверки); методика Ч.II Ур.7; р.10 (канал→потолок статуса), р.5 (сверки), р.3 (провенанс)
    инструкция: {дефолт: 'Проведи инвентаризацию ИТ-ландшафта: строка на каждую систему — код, название, класс, назначение (какую бизнес-нагрузку несёт), тип развёртывания, вендор/основу, версию платформы и релиз конфигурации, признак типовой,
        статус эксплуатации. Ведущий канал — интервью ИТ + инвентаризация (ПО, лицензии, базы 1С, схема); упомянутую только бизнес-пользователем держи не выше «интервью». Версии/релизы бери из системы (цифровой след), заявленные на словах — «гипотеза»;
        расхождение фактической с заявленной помечай мягкой отметкой «заявленная ≠ фактическая», не сглаживай. Теневое ИТ заводи строкой только при самостоятельной учётной нагрузке (Р1). Укажи владельца (бизнес, текст) и администратора; нет владельца/нагрузки
        — поле пусто + открытый вопрос (кандидат в проблему). Признак типовой ставь грубо, детальный разбор — в DEC (Р3). Числа нагрузки не вписывай — заведи в VP и сошлись (C7). Каждая строка со ссылкой на источник; «зоопарк» не сглаживай. Суди
        по методике kb-audit, каркас Ур.7, Ч.II Ур.7, р.3, р.5, р.10.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; название и назначение непусты, 'класс и статус эксплуатации — из словарей; признак типовой, тип развёртывания, «Заявлено ≠ фактически» — из словарей (если заданы)', у каждой системы есть источник; статус
        доказанности — из словаря, 'нет висячих ссылок: источник (SRC) существует; каждый показатель «Объёмов» существует в VP с объектом привязки «система» = эта строка', 'пустой владелец — мягкий сигнал «нет владельца» (не ERROR, не блокирует),
        должен быть закрыт или иметь открытый вопрос', 'нет полей-флагов дефекта и «тип решения» (C5, C6); диагноз — в HYP/PRB', 'теневое ИТ не растворено и не размножено: строка класса «теневое ИТ» — только при самостоятельной учётной нагрузке
        (Р1)', чисел объёмов SYS не дублирует (C7); только ссылки на VP, полиморфная входящая ссылка HYP/PRB → SYS проверяется по уровню = 7 → строка SYS (C4), 'двусторонность с SRC: источник существует и перечисляет эту систему; система с входящими
        ссылками не удаляется']
    жизненный_цикл:
      ось: зрелость факта
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел ИТ-ландшафт), Концепция TO-BE и дорожная карта (текущий ландшафт как отправная точка), Протокол встречи]
    стык:
      даёт: паспорт каждой системы Ур.7 (назначение · версия/релиз · владелец · статус) как субъект полосы «ИТ» — концы для входящих привязок REP/AM/NSI/PRC/DEC/INT(2 ссылки)/SR/INF; грубый «Признак типовой» как вход для Ур.8; ссылки система→объёмы
        (VP); сигнал «система без владельца/нагрузки» как фактура для HYP/PRB
      потребляет: [SRC, VP, интервью ИТ + инвентаризация ландшафта, 'методика kb-audit (каркас Ур.7, Ч.II Ур.7, р.10, р.5, р.3)', доменная БЗ структуры конфигурации]
      зависит_от: [reg-facttables, reg-framework, cap-ingest]
      где: spec/fact-tables/SYS.md
