        / «ручная досверка/правка» влечёт связанную запись в диагностике; «не проверено» — только до выхода из разведки, 'нет висячих ссылок (SYS, мастер-система, SR, ORG, INF, NSI, REP, AM, PRC)', 'числа не дублируются (C7): нет числовых полей;
        «объёмы потока» существуют в VP с привязкой «интеграция» = эта строка; ущерб — через EFF', 'нет флагов диагноза (C5/C6): нет поля «тип решения» и булевых флагов дефекта; дефект — в PRB/HYP/OQ со ссылкой на INT', статус ≥ «цифровой след»
        — только при источнике природы «данные системы» (журнал/настройки обмена)]
