    - {к: SYS, поле: Мастер-система, кардинальность: N-1, смысл: источник истины справочника}
    - {к: SYS, поле: Точки ввода/ведения, кардинальность: N-M, смысл: где реально заводят и правят}
    - {к: REP, поле: Разрез нужен отчёту, кардинальность: N-M, смысл: разрез ↔ отчёт-потребитель}
    - {к: AM, поле: Покрывает измерение модели, кардинальность: N-M, смысл: справочник обеспечивает измерение модели}
    - {к: PRC, поле: Процесс ведения, кардинальность: N-1, смысл: процесс ведения НСИ}
    - {к: ORG, поле: Владелец, кардинальность: N-1, смысл: роль-владелец справочника}
    - {к: SR, поле: Кто вправе менять, кардинальность: N-M, смысл: системная роль с правом правки}
    рецепт:
      ведущий_канал: справочники базы + регламенты ведения (паспорт Ур.4, Часть II); цифровой след перевешивает заявленное
      что_проблема: [нет мастер-системы при нескольких точках ввода, грязь/дубли, ведение в теневом ИТ, нет владельца, лишний разрез (без отчёта-потребителя), нет нормализации/гармонизации НСИ между системами, неавторизованное/автоматическое
          изменение справочника]
      норма_глубины: до спорной сущности; глубоко — только справочники без мастер-системы, с дублями/рассинхроном или теневым ведением (20/80); прочее — гигиенический минимум
      опора: каркас Ур.4; методика Часть II (паспорт Ур.4); р.5 (перекрёстная сверка, мастер-система); р.4 (лестница статусов); р.6 (координаты проблемы — производны, в PRB)
    инструкция: {дефолт: 'Заведи строку на каждый значимый справочник и аналитический разрез (план счетов, статьи, номенклатуру, контрагентов, ЦФО, организации, договоры). Ведущий канал — сами справочники в базе (состав, объём, дубли, заполненность).
        Установи точки ввода/ведения; если их больше одной — обязательно определи мастер-систему ссылкой, иначе признак «Мастер-система определена» = «не определена» и это самостоятельный кандидат в проблему (заведи запись в HYP/OQ со ссылкой
        на строку НСИ). Проверь теневое ведение, сам носитель зарегистрируй в MAT и SRC. Сверь значения между системами (дубли, грязь, рассинхрон). Свяжи разрез с отчётом Ур.1 (REP), измерение модели (AM), владельца (ORG), процесс ведения (PRC),
        кто вправе менять (SR). Количества (объём, дубли, частота) — не сюда, они в VP. Диагноз и тип решения — в PRB. Каждый факт со ссылкой на источник; статус ≥ «цифровой след» только на данных системы. Глубоко разбирай только спорные сущности
        (20/80). Суди по методике kb-audit, Часть II паспорт Ур.4, разделы 4–6.', правка_пользователя: разрешена}
    целостность: [код НСИ уникален и непуст; название непусто, 'перечисления (вид НСИ, статус доказанности, поля состояния) — из словарей', источник обязателен и существует — факт без источника недействителен (C1), 'инвариант мастер-системы:
        при точках ввода > 1 признак «определена» (с заполненной ссылкой) либо «не определена (несколько точек ввода)» + обязательна связанная запись HYP/OQ/PRB на эту строку', 'признак «Мастер-система определена» выводим, не правится руками
        (сверяется с числом точек ввода и заполненностью «Мастер-системы»)', 'нет висячих ссылок: мастер-система/точки ввода (SYS), отчёты (REP), измерения (AM), процесс (PRC), владелец (ORG), системные роли (SR)', 'сверка зафиксирована, не сглажена:
        «рассинхрон/дубли», «грязь/незаполнено», «теневое ИТ = да/частично» влекут запись в диагностике (HYP/OQ/PRB), флага диагноза в NSI нет (C5)', 'разрез без потребителя: пустой «Разрез нужен отчёту» → обязана быть запись HYP «лишний разрез»',
      статус ≥ «цифровой след» только при источнике природы «данные системы», 'своих количеств нет (C7): числовых полей объёма/дублей/частоты в строке быть не должно — они в VP', 'накопление: новый канал дополняет строку, прежняя гипотеза не
        затирается']
    жизненный_цикл:
      ось: зрелость
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел «НСИ и аналитики (Ур.4)»), 'Учётные модели (AM, Ур.2 — измерения)', 'Ценность (REP, Ур.1 — разрезы)', 'Интеграции (INT, Ур.9)', Целевая модель данных TO-BE (TDM), Протокол встречи]
    стык:
      даёт: доказанный реестр справочников/разрезов Ур.4 с явно определённой мастер-системой для спорных сущностей (вход в интеграцию НСИ, INT Ур.9 — направленно); точки ввода/ведения; отметки теневого ведения, дублей/рассинхрона, лишних разрезов
        как фактуру для кандидатов в проблемы (диагноз — в HYP/OQ/PRB, не в NSI); привязку разрезов к отчётам (REP) и измерениям моделей (AM); вход для сверки «кто вправе менять» (SR)
      потребляет: [SRC, KBP, 'методика kb-audit (каркас Ур.4, Часть II паспорт Ур.4, разделы 4–6)', 'сырьё (справочники из базы, регламенты ведения, учётная политика, интервью владельца НСИ)', инструкция-промт]
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables/NSI.md
  PRC:
    название: Процессы
    группа: Факты по каркасу (AS-IS) → полоса «Бизнес», Уровень 5 «Процессы»
    тип: первичная
    уровень: 5
    покрытие_методикой: есть
    поля:
    - {имя: Код узла, вид: текст, обяз: да, уникально: да}
    - имя: Уровень декомпозиции
