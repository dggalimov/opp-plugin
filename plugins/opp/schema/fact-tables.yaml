      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (приложение «Перечень проведённых встреч / интервью»), 'Управляющие виды (статус разведки, доска проекта)', Протокол встречи, 'Повестка встречи', 'План встреч']
    стык:
