      обяз: да
      словарь: [функция, процесс, подпроцесс, шаг (операция)]
    - {имя: Название, вид: текст, обяз: да}
    - {имя: Родитель, вид: ссылка, обяз: условно, цель: PRC, значимость: полнота}
    - {имя: Владелец, вид: ссылка, обяз: да, цель: ORG, значимость: полнота}
    - {имя: Вход, вид: текст, обяз: условно, значимость: полнота}
    - {имя: Действие, вид: текст, обяз: условно, значимость: полнота}
    - {имя: Выход, вид: текст, обяз: условно, значимость: полнота}
    - {имя: Система, вид: ссылка, обяз: условно, цель: SYS}
    - {имя: Время работы, вид: ссылка, обяз: нет, цель: VP}
    - {имя: Время прохождения, вид: ссылка, обяз: нет, цель: VP}
    - {имя: Доля годного с первого раза, вид: ссылка, обяз: нет, цель: VP}
    - {имя: Порядок в потоке, вид: число, обяз: нет, значимость: полнота}
    - имя: Тип шага по исполнителю
      вид: перечисление
      обяз: нет
      словарь: [человек в системе, человек без системы, автомат (робот / регламентное задание), отправка наружу, ожидание извне]
    - {имя: Стартовое событие, вид: текст, обяз: нет}
    - {имя: Финальный результат, вид: текст, обяз: нет}
    - имя: Точка решения
      вид: перечисление
      обяз: нет
      словарь: [линейный шаг, точка решения]
      значимость: полнота
    - {имя: Внешний пул (Интеграция), вид: ссылка, обяз: нет, цель: INT}
    - {имя: Ведёт/потребляет НСИ, вид: ссылки, обяз: нет, цель: NSI}
    - {имя: Регистрирует в модели, вид: ссылки, обяз: нет, цель: AM}
    - имя: Полнота описания
      вид: перечисление
      обяз: да
      словарь: [скелет (топология не подтверждена), поток подтверждён]
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника: страница/раздел (документ), регистр+отбор (база), таймкод/реплика (встреча) — точечная перепроверка факта (Р-2, ЗР-0020)'}
    - имя: Статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: 'провенанс (сквозное, C1)'}
    - {к: PRC, поле: Родитель, кардинальность: N-1, смысл: рефлексивная иерархия декомпозиции (родитель ровно на уровень выше)}
    - {к: ORG, поле: Владелец, кардинальность: N-1, смысл: владелец узла (симметрия Ур.5↔Ур.6)}
    - {к: SYS, поле: Система, кардинальность: N-1, смысл: система шага (Ур.7)}
    - {к: VP, поле: Время работы, кардинальность: N-1, смысл: 'измеритель карточки шага (Р2, C7)'}
    - {к: VP, поле: Время прохождения, кардинальность: N-1, смысл: 'измеритель карточки шага (Р2, C7)'}
    - {к: VP, поле: Доля годного с первого раза, кардинальность: N-1, смысл: 'измеритель карточки шага (Р2, C7)'}
    - {к: INT, поле: Внешний пул (Интеграция), кардинальность: N-1, смысл: 'граница пула, направленная (Ур.9, Р5, C12)'}
    - {к: NSI, поле: Ведёт/потребляет НСИ, кардинальность: N-M, смысл: 'ведёт/потребляет справочники (Ур.4, список ссылок, C2)'}
    - {к: AM, поле: Регистрирует в модели, кардинальность: N-M, смысл: 'связь Ур.5 ↔ Ур.2: процесс регистрирует факты в учётной модели'}
    рецепт:
      ведущий_канал: углублённые интервью носителей + журналы (фактический ход по журналам перевешивает заявленный регламент)
      что_проблема: [разрыв конвейера, двойной ввод, теневые операции, поздняя фиксация факта, шаг без владельца или без системы, высокое время прохождения при малом времени работы (ожидание/очередь), низкая доля годного с первого раза (переделки),
        расхождение заявлено (регламент) ≠ фактически (журнал)]
      норма_глубины: функция → операция, по 20/80; полная декомпозиция, карточка шага и поток — только у процессов с подтверждённым ущербом; запрет идеализации; достаточность — право сформулировать ОБЭ
      опора: каркас Ур.5; методика Часть II Ур.5; раздел «Целостность Ур.5 ↔ Ур.6»; разделы 4–5; навык opp:analyze-meeting
    инструкция: {дефолт: 'Строй сверху вниз в периметре одной таблицей: функции → процессы → подпроцессы → шаги; у каждого узла укажи уровень декомпозиции и родителя (рефлексивно, ровно на уровень выше; функция — корень). Владельца укажи у КАЖДОГО
        узла на всех уровнях (симметрично уровню оргструктуры Ур.6). На каждом шаге зафиксируй полную карточку операции: вход·действие·выход·система (на верхних узлах — опционально, агрегатом); граница шага — смена исполнителя или системы; шаг
        вне системы — «без системы / теневое ИТ». Ведущий канал — углублённые интервью + журналы: реконструируй фактический ход по журналам и сверь с регламентом, расхождение «заявлено ≠ фактически» фиксируй отметкой сверки, диагноз не пиши —
        заводи кандидат в проблему в Гипотезы/Проблемы со ссылкой на узел. На шаги источников подтверждённого ущерба заполни карточку измерителей ссылками в Объёмные параметры (VP): время работы, время прохождения, доля годного — своих чисел
        в PRC не держи. Для подтверждённых процессов готовь связный поток (под внешний генератор схем): стартовое событие → шаги по порядку → финальный результат; развилки — точкой решения, варианты веди текстом поля «Выход» узла-шлюза (структурная
        таблица переходов «предшественник→преемник + условие ветви» — точка роста, не реализовано); внешний участник — отдельный пул (тип шага «отправка наружу»/«ожидание извне» + ссылка на Интеграции Ур.9). Пока материал неполон — оставляй скелет (линейная цепочка). Каждый узел — со ссылкой на источник; запись без
        источника недействительна. Глубоко детализируй только процессы с подтверждённым ущербом (20/80). Суди по методике kb-audit, каркас Ур.5 + Часть II Ур.5 + раздел «Целостность Ур.5 ↔ Ур.6», разделы 4–5. ИТЕРАЦИЯ ГЕЙТА Ф1: институциональные атрибуты процесса (периодичность, сроки шагов, органы утверждения) не растворяй в описании — сроки/пороги выноси отдельными строками BR со ссылкой на процесс.', правка_пользователя: разрешена}
    целостность: [код узла уникален и непуст; название непусто, '«Уровень декомпозиции», «Статус доказанности», «Полнота описания» — из словарей', 'иерархия валидна: у каждого узла, кроме «функции», есть «Родитель» ровно на уровень выше; нет
        циклов; «функция» родителя не имеет', 'каждый узел несёт источник (сквозное обязательное, C1); запись без источника недействительна', владелец заполнен на ВСЕХ уровнях (Р3); полная карточка операции (вход·действие·выход·система) обязательна
        у шага, 'собственных числовых полей измерителей у строки PRC нет — их наличие есть ошибка модели (Р2, C7)', 'нет висячих ссылок: источник, родитель, владелец, система, НСИ, строки VP, внешний пул существуют; отдельная таблица переходов —
        точка роста, не реализовано', 'замыкание
        Ур.5 ↔ Ур.6: у каждого уровня процесса есть владелец на симметричном уровне; каждая роль участвует хотя бы в одном узле; белые пятна → гипотеза/открытый вопрос', 'расхождение «заявлено ≠ фактически» зафиксировано отметкой сверки, не сглажено',
      'признаков/флагов дефекта в строке PRC нет — наличие есть ошибка модели (Р6, C5)', 'BPMN-готовность согласована с полнотой: при «поток подтверждён» задан порядок и тип шага, стартовое событие и финальный результат; ветвления фиксируются
        текстом узла-шлюза (поле «Выход») — отдельная таблица переходов не заводится (точка роста, не реализовано); при «скелет» — топология линейная', статус ≥ «цифровой след» допустим только при опоре на источник природы «данные системы» (журнал/выгрузка), 'накопление: новый канал дополняет строку узла, прежняя гипотеза не затирается']
    жизненный_цикл:
      ось: доказанность + полнота описания
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел «Процессы (Ур.5)»), 'Схема процесса (BPMN-готовая, внешний генератор)', Концепция TO-BE и дорожная карта, Протокол встречи]
    стык:
      даёт: доказанную декомпозицию процессов AS-IS (функция→процесс→подпроцесс→шаг, одной таблицей с рефлексивной иерархией) с владельцем на всех уровнях и полной карточкой операции на шаге; локализацию узлов для диагностики дефектов Ур.5; симметрию
        владения для замыкания Ур.5↔Ур.6; связный поток (под внешний генератор схем) с ветвлениями, зафиксированными текстом узла-шлюза (структурная таблица переходов — точка роста, не реализовано); привязки шагов к системам (Ур.7), НСИ (Ур.4), внешним пулам-интеграциям (Ур.9, направленно), объёмам (VP, ссылками)
      потребляет: [Источники (SRC), 'Оргструктура (AM, Ур.6)', 'Системы (TLM, Ур.7)', 'НСИ (REF, Ур.4)', Объёмные параметры (VP), 'Интеграции (INT, Ур.9)', 'методика kb-audit (каркас Ур.5 + Часть II Ур.5 + раздел «Целостность Ур.5↔Ур.6», разделы
          4–5)', 'сырьё (регламенты, журналы, углублённые интервью, скелет из opp:analyze-materials)', 'навык opp:analyze-meeting']
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables/PRC.md
