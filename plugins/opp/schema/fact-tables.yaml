    инструкция: {дефолт: 'Проведи инвентаризацию инфраструктуры — фундамента ИТ-ландшафта. Заведи строку на каждый узел (серверы приложений/кластер 1С, серверы СУБД, терминальные серверы, хранилища, сеть/каналы, виртуализация, облако, контур
        резервного копирования): код, название, тип узла, назначение (какие системы Ур.7, каналы Ур.9, ресурс ролей Ур.10 несёт), тип размещения, платформу и версию, статус эксплуатации. Ведущий канал — интервью ИТ + инвентаризация платформы;
        узел только со слов бизнес-пользователя держи не выше статуса «интервью». Версию, мощность, дату окончания поддержки бери из узла/у вендора (цифровой след), не со слов; расхождение фиксируй мягкой отметкой «Заявлено ≠ фактически», не
        сглаживай. Свяжи узел с системами (ссылка со стороны SYS→узел, связь м:м); узел без несомой системы — открытый вопрос. Фиксируй три сигнала Ур.11 явно (фактура, не диагноз): производительность (числа — в VP, ссылка в «Мощность»), резервирование
        («нет резервирования» оставляй как есть), устаревание (дата окончания поддержки; «устарела/нет» выводится сравнением с текущей). Администратора — не выдумывай: пусто = сигнал «нет администратора» + открытый вопрос. Каждая строка — со
        ссылкой на источник; узел без источника недействителен. Идеальную инфраструктуру не описывай — лови дефект. Суди по методике kb-audit, каркас Ур.11 и Ч.II Ур.11, р.10, р.5, р.4, р.3, р.8.', правка_пользователя: разрешена}
    целостность: [код узла уникален и непуст; название и назначение непусты, 'тип узла, статус эксплуатации — из словарей; тип размещения, схема резервирования, «Заявлено ≠ фактически» (если заданы) — из словарей', окончание поддержки (если задано)
        — корректная дата, у каждого узла есть источник; статус доказанности — из словаря, 'нет висячих ссылок: источник (SRC) существует; каждый показатель «Мощности» существует в VP с объектом привязки «узел»/«система» = эта строка; каждая
        система в «Несомых системах» существует в SYS и её связь указывает на этот узел', 'узел без несомой системы — сигнал (несомая система либо открытый вопрос), не ошибка целостности', 'пустой администратор / «нет резервирования» / дата окончания
        поддержки в прошлом — незакрытые кандидаты в проблему (сигналы, не ошибки)', 'в INF нет полей-флагов дефекта и «тип решения»; дефекты хранятся фактурой, диагноз — в HYP/PRB', «устарела/нет» не хранится флагом — выводится сравнением даты
        окончания поддержки с текущей, полей-значений мощности/ёмкости в INF нет; только ссылки в VP; словесная мощность — лишь в «Примечании», 'накопление, не перезатирание: новый канал дополняет, расхождение фиксируется мягкой отметкой; понижение
        статуса — со ссылкой на источник опровержения', полиморфная входящая ссылка HYP/PRB→INF проверяется на стороне источника (уровень = 11 → код строки INF), связи с Ур.9/Ур.10 словесные (кодов нет) — verify пока не проверяет]
    жизненный_цикл:
      ось: зрелость факта
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: ['Отчёт об обследовании AS-IS (раздел «ИТ-ландшафт», подраздел «Инфраструктура»)', Концепция TO-BE и дорожная карта (текущая инфраструктура как отправная точка)]
    стык:
      даёт: паспорт каждого узла Ур.11 (платформа · мощность через VP · резервирование · администратор) как фундамент полосы «ИТ»; концы для входящих привязок Ур.7 (SYS, м:м), Ур.9 (Интеграции, словесно), Ур.10 (Системные роли, словесно); выводимая
        ссылка узел→мощность (VP); три сигнала-кандидата в рисковую проблему + «нет администратора» как фактура для HYP/PRB
      потребляет: ['Источники (SRC, в т. ч. природа «эталон» SRC-KB → KBP)', Системы (SYS), Объёмные параметры (VP), 'сырьё (интервью ИТ, инвентаризация платформы, версии/мониторинг из узлов, системные требования вендора)', 'методика (каркас
          Ур.11, Ч.II Ур.11, р.10, р.5, р.4, р.3, р.8)', доменная БЗ структуры конфигурации (по роли), инструкция-промт]
