      ведущий_канал: не применяется (не факт AS-IS, а проектное компонование); опора — доказанные требования TB и выработанные решения SOL / продукты TS
      что_проблема: [вариант не закрывает согласованное требование с существенным ОБЭ (незамкнутость требование→решение), вариант собран из решений без трассировки до доказанной проблемы (решение-«хотелка»), единственный вариант при стоящей задаче
          выбора (нет предмета выбора), 'отвергнутый вариант удалён, а не зафиксирован с вердиктом (потеря обоснования)']
      норма_глубины: 'вне явного текста методики — задаёт навык; прагматично (р.8): глубоко прорабатываются немногие реалистичные варианты (2–3), детально сравниваются дошедшие до «на сравнении»; запрет идеализации'
      опора: навык opp:target-architecture (логика вариантов и выбора), навык opp:solutions (выработка решений, владелец шкалы покрытия C8); методика р.7 (замкнутость), р.1 (повторяемость), р.6 (фиксация отвергнутого), р.9 (проекция); framework
        (11 уровней через TLM)
    инструкция: {дефолт: 'Собери варианты целевой архитектуры (TO-BE) как сопоставимые объекты выбора под одни и те же доказанные проблемы (PRB) и бизнес-требования (TB). Сначала определи, стоит ли задача выбора платформы: стоит → сформулируй
        минимум 2–3 принципиально разных варианта (единое ядро; двухсистемный; доработка существующего); предопределена → допусти единственный вариант, но запиши основание отсутствия выбора. Каждый вариант компонуй из уже выработанных блоков
        — ссылайся на решения (SOL) и целевые продукты (TS), не выдумывай новые решения здесь. Укажи тип варианта и платформу-ядро. Покрытие требований руками не вводи — детальное «вариант×требование» ведёт FIT, «Полнота покрытия» выводится из
        FIT (сверь с COV). Дай грубые ориентиры для выбора: стоимость, срок, риски, сохранность инвестиций; рабочую смету и волны ведёт RM, не дублируй. Держи процессный статус честным: черновик → проработан → на сравнении → выбран/отклонён.
        Отвергнутый вариант не удаляй — поставь «отклонён» и запиши вердикт. Итоговый выбор — Заключение (DEC). Суди по методике kb-audit, р.7 (замкнутость), р.1, р.6, р.9.', правка_пользователя: разрешена}
    целостность: [код варианта уникален и непуст; название и краткое описание непусты, 'перечисления — из словарей (тип варианта, статус проработки, задача выбора платформы, полнота покрытия)', платформа-ядро задана и существует (TS), 'состав
        непуст: хотя бы одно решение (SOL) и хотя бы один целевой продукт (TS)', нет висячих ссылок (SOL / TS / TB / COV / FIT / DEC / TLM), 'замкнутость требование→решение (р.7): каждое согласованное требование с существенным ОБЭ закрыто решением
        хотя бы одного варианта', '«Полнота покрытия» выводима из FIT (исходно COV), руками не правится', 'трассируемость состава: каждое решение варианта имеет трассировку до проблемы (проверка на стороне SOL)', 'наличие альтернатив (условное):
        «стоит» → ≥2 вариантов «на сравнении»; «не стоит» → заполнено «Основание отсутствия выбора»', 'фиксация отвергнутого (р.6): «отклонён» не удаляется и несёт «Вердикт выбора»; ровно один «выбран» (с DEC)', 'без дубля сметы: детальная смета
        и волны не в AV (в RM); расхождение ориентир AV↔RM допустимо, фиксируется', 'источник/статус доказанности у строки варианта не требуются (C1, управляющая таблица)']
    жизненный_цикл:
      ось: проработка
      статусы: [черновик, проработан, на сравнении, выбран, отклонён]
      доказательная_зрелость: нет
    проекция: [Концепция TO-BE и дорожная карта (раздел «Варианты целевой архитектуры»), Целевая архитектура по уровням (через TLM), Дорожная карта (RM)]
    стык:
      даёт: набор сопоставимых вариантов целевой архитектуры (решения SOL + продукты TS + платформа-ядро); агрегированная полнота покрытия (выводимая из FIT) и грубые ориентиры стоимости/срока/рисков для выбора; вход для FIT, DEC, TLM, RM
      потребляет: [TB, PRB, SOL, TS, COV, FIT, VP, SYS, INF, 'opp:target-architecture', 'opp:solutions', 'методика (р.7 замкнутость, р.1, р.6, р.9; framework через TLM)']
      зависит_от: [reg-facttables, skill-target-architecture, skill-solutions]
      где: spec/fact-tables/AV.md
