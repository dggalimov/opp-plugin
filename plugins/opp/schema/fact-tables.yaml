      ведущий_канал: нет (приходит из любого из трёх каналов); правило р.10 — неведущий канал не выше «интервью»
      что_проблема: [гипотеза без источника, гипотеза без плана перепроверки (что проверить пусто), «вечная» гипотеза за гейтом готовности разведки, опровержение без зафиксированного основания]
      норма_глубины: гипотезы по всему контуру как гигиенический минимум; углублять перепроверку — только ведущих к подтверждённому ущербу (20/80)
      опора: методика р.4 (лестница статусов), р.8 (ведущая гипотеза + поиск опровержения, гейт), р.3 (провенанс/накопление), р.10 (неведущий канал), «Целостность Ур.5↔Ур.6»
    инструкция: {дефолт: 'Дихотомия перед заведением строки (одним правилом во всех навыках, спека 08 §5): утверждение, которое МОЖЕМ ПРОВЕРИТЬ САМИ по источникам → гипотеза (код, проверяемая формулировка, уровень каркаса 1–11, канал Люди/Документы/База
        данных, источник — без него недействительно); незнание, ответить на которое может ТОЛЬКО ЗАКАЗЧИК → открытый вопрос (OQ), не гипотеза. «Белое пятно» — это всегда открытый вопрос, не вид гипотезы (заводи в OQ, не здесь). Три вида гипотезы:
        «наблюдение из одного канала» (первичное наблюдение до перепроверки), «ведущая гипотеза ущерба» (кандидат в подтверждённый ущерб — «поиск опровержения» обязателен), «эскиз по отраслевым практикам» — проактивный эскиз комплексного процесса/контура
        из трёх оснований, в порядке опоры (спека 08 §3а.2): (а) лучшие практики построения методологии/процессов для отрасли и вида деятельности заказчика (провенанс — источник природы «эталон», SRC-KB → KBP; нет подключённой БЗ — общеотраслевое
        знание с явной пометкой); (б) уже сформированный контекст каркаса заказчика (материалы/встречи); (в) рамки и цели проекта (паспорт). Эскиз утверждает, КАК ДОЛЖЕН быть устроен контур у такого заказчика («судя по отрасли, контур бюджетирования
        включает планирование → исполнение → контроль; проверить состав и владельцев»), идёт в повестку встречи своей стадии на подтверждение/опровержение. Статус доказанности всегда «гипотеза» — в отчёт как факт не идёт. Запиши «что проверить»
        и при каждой проверке намеренно ищи опровержение. Гранулярность гипотезы пропорциональна знанию (спека 08 §3а.3): большое белое пятно (уровень/контур почти не покрыт) → гипотеза УКРУПНЁННАЯ (состав контура, ключевые процессы, владельцы —
        без операционных деталей, они слишком гипотетичны); зона со сформированным контекстом → детальная гипотеза (конкретный шаг, правило, стык); уход в детали на большом пятне — брак гипотезирования. Новый источник добавляй, не перезатирая.
        Дозрело — перенеси строку в каркасную таблицу уровня, поставь «подтверждена» и заполни «куда повышена». Ложно — «опровергнута» + основание (источник опровержения); строку не удаляй. Суди по методике kb-audit, р.3, р.4, р.8, р.10, спека
        08 §3а, §5.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; формулировка непуста; дата фиксации непуста, 'перечисления (уровень, канал, вид, статус проверки) — из словарей', нет гипотезы без источника, статус доказанности на входе = «гипотеза» (строка выше зрелостью
        переносится в каркас), 'при «подтверждена» — оба под-поля «куда повышена» заполнены, ссылка существует, уровень совпадает с уровнем гипотезы', при «опровергнута» — заполнено основание закрытия с источником опровержения, 'накопление, а
        не перезатирание: новый источник не стирает исходный источник и формулировку', нет висячих ссылок (источник; строка-приёмник; OQ; PRB; подтверждающие источники), 'гейт готовности: нет открытой гипотезы по обязательному каналу без OQ /
        допущения']
    жизненный_цикл:
      ось: зрелость
      статусы: [открыта, перепроверяется, подтверждена, опровергнута]
      доказательная_зрелость: да
