      что_проблема: [проблема с существенным ОБЭ без требования, требование без трассировки («хотелка»), проблема без источника, требование без критерия приёмки, согласованное требование без привязки к решению]
      норма_глубины: замкнутость требуется в первую очередь по существенным проблемам; ниже нижней отсечки замыкания по требованию не требуют; идеализацию не строим (20/80)
      опора: методика р.2 (цепочка, явные связи м:м), р.7 (замкнутость в обе стороны; критерий приёмки), р.3 (двусторонность провенанса), р.9 (проекция; возврат); привязка требование→решение — навык opp:solutions
    инструкция: {дефолт: 'Не заполняй вручную — пересобери из PRB, TB, EFF, SRC. Построй сквозную цепочку Источник → Проблема (с ОБЭ) → Требование; на каждую пару «проблема↔требование» заведи строку (связь м:м — разверни все пары). Подтяни выводимые
        поля: уровень и источники — из проблемы, тяжесть — из эффекта, зрелости — каждую со своей шкалы, решение — из привязки требования. Проверь замкнутость в обе стороны и вынеси разрывы, не сглаживая: проблема с существенным ОБЭ без требования;
        требование без проблемы («хотелка»); проблема без источника; требование без решения/критерия приёмки. Проблему ниже нижней отсечки разрывом не считай. Чини в реестрах-источниках, карта только показывает. Суди по методике kb-audit, р.2,
        р.7, р.3, р.9.', правка_пользователя: разрешена}
    целостность: [каждое содержательное поле совпадает с источником вывода (рассинхрон = ошибка пересборки), 'нет висячих ссылок (TB, PRB, EFF, SRC, Решение существуют); полупара — только как зафиксированный разрыв с заполненным «Видом разрыва»',
      'замкнутость снизу: согласованная проблема с существенным ОБЭ имеет требование, иначе полупара «проблема без требования»', 'замкнутость сверху: каждое требование трассируется до проблемы, иначе полупара «требование без проблемы»', 'провенанс:
        у каждой проблемы есть источник, иначе разрыв «проблема без источника»', критерий приёмки у требования (мягкая проверка), 'дальний конец: согласованное требование привязано к решению (мягкая проверка)', проблема ниже нижней отсечки без
        требования разрывом не помечается, 'read-only: строки не редактируются вручную; verify сигналит при расхождении с пересборкой', 'гейт приёмки: любой незакрытый существенный разрыв блокирует выдачу документа']
    жизненный_цикл:
      ось: замкнутость
      статусы: [замкнута, разрыв]
      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (несущий скелет доказательности), Приложение «Трассировка требований», Концепция TO-BE и дорожная карта (вход замыкания требование→решение)]
    стык:
      даёт: сквозную карту доказательной цепочки (Источник → Проблема(ОБЭ) → Требование → Решение) + машинно-проверяемую замкнутость в обе стороны как условие приёмки; порядок «от вывода вниз»; перечень разрывов для возврата в синтез
      потребляет: [PRB, TB, EFF, SRC, 'навык opp:solutions', 'методику (р.2, р.7, р.3, р.9)', инструкцию-промт, '@навык opp:solutions']
      зависит_от: [reg-facttables]
      где: spec/fact-tables/asis-traceability.md
