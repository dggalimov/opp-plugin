    - {имя: Владелец-исполнитель, вид: ссылка, обяз: нет, цель: ORG}
    - {имя: Вход шага, вид: текст, обяз: нет}
    - {имя: Действие, вид: текст, обяз: условно}
    - {имя: Выход шага, вид: текст, обяз: нет}
    - {имя: Система шага, вид: ссылка, обяз: нет, цель: SYS}
    - имя: Подтверждённость топологии
