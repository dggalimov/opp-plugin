      словарь: [1 Ценность, 2 Учётные модели, 3 Бизнес-правила, 4 НСИ / аналитики, 5 Процессы,
                6 Оргструктура, 7 Системы, 8 Доработки, 9 Интеграции, 10 Системные роли,
                11 Инфраструктура]  # унифицировано с HYP (гейт Ф1: int-словарь ловил агентов)
      смысл: 'обязателен для происхождений «белое пятно (пробел данных)» и «нестыковка уровней» — питает картину каркаса (спека 08 §1)'
    - {имя: строка каркаса, вид: ссылки, обяз: нет, цель: <по-уровню>}
    - {имя: источники расхождения, вид: ссылки, обяз: условно, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - {имя: связанная гипотеза, вид: ссылка, обяз: нет, цель: HYP}
    - {имя: 'что нужно, чтобы закрыть', вид: текст, обяз: нет}
    - имя: статус закрытия
      вид: перечисление
      обяз: да
      словарь: [открыт, в работе, закрыт ответом, закрыт допущением, снят (неактуален)]
    - {имя: резолюция, вид: текст, обяз: условно}
    - {имя: дата постановки, вид: дата, обяз: да}
    - {имя: дата закрытия, вид: дата, обяз: условно}
    - {имя: ответственный, вид: текст, обяз: нет}
    - {имя: стейкхолдер заказчика, вид: ссылка, обяз: нет, цель: STK}
    - имя: породившая проблема/гипотеза
      вид: ссылка
      обяз: нет
      цель: [PRB, HYP]
    рёбра:
    - {к: <по-уровню>, поле: строка каркаса, кардинальность: N-M, смысл: локализация пробела (полиморфная C4)}
    - {к: SRC, поле: источники расхождения, кардинальность: N-M, смысл: провенанс пробела (≥2 для расхождения)}
    - {к: HYP, поле: связанная гипотеза, кардинальность: N-1, смысл: проверяет/питает гипотезу}
    - {к: STK, поле: стейкхолдер заказчика, кардинальность: N-1, смысл: от кого ждём ответ}
    - к: [PRB, HYP]
      поле: породившая проблема/гипотеза
      кардинальность: N-1
      смысл: вопрос вырос из записи диагностики
    рецепт:
      ведущий_канал: нет своего; сквозной — наследует канал уровня, где замечен пробел; выход перекрёстной сверки (р.5)
      что_проблема: ['критичный вопрос открыт, а синтез идёт (нарушен гейт р.8)', 'расхождение замечено, но не заведено как вопрос (сглажено)', «закрыт допущением» без текста допущения в «Резолюции», вопрос-сирота без локализации и без источников
          расхождения]
      норма_глубины: '20/80: критичными помечаем только пробелы, без которых нельзя судить о подтверждённом/вероятном ущербе; мелочи — фоновые; глубоко добираем на каналах подтверждённого ущерба'
      опора: методика р.5 (расхождение → открытый вопрос), р.8 (гейт готовности), целостность Ур.5↔Ур.6; навыки opp:* (операционализация, C13)
    инструкция: {дефолт: 'Дихотомия перед заведением строки (одним правилом во всех навыках, спека 08 §5): незнание, ответить на которое может ТОЛЬКО ЗАКАЗЧИК → открытый вопрос (аппарат: ответственный, стейкхолдер, резолюция); утверждение, которое
        можем проверить сами по источникам → гипотеза (HYP), не открытый вопрос. Заводи открытый вопрос на каждое расхождение и белое пятно, которое не можешь закрыть сразу — не сглаживай и не пропускай молча. Сформулируй понятным языком, укажи
        происхождение, привяжи к месту («Уровень каркаса» 1–11 + строка; уровень ОБЯЗАТЕЛЕН для происхождений «белое пятно (пробел данных)» и «нестыковка уровней» — питает картину каркаса, спека 08 §1; у прочих происхождений — по возможности).
        Для «расхождения источников» сошлись на ≥2 источника. Честно оцени критичность: «критичный» — только если без ответа нельзя доказательно судить (блокирует синтез, р.8). Запиши, что нужно для закрытия и от кого ответ. Держи статус честным:
        открыт → в работе → закрыт ответом / закрыт допущением (с текстом допущения в «Резолюции») / снят с причиной — не удаляй. Не превращай вопрос в проблему: проблема — доказанный измеримый ущерб. Суди по методике kb-audit, р.5, р.8 (+ целостность
        Ур.5↔Ур.6), спека 08 §5.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; «Формулировка» непуста; «Дата постановки» непуста, '«Происхождение», «Критичность», «Статус закрытия» — из словарей', при «закрыт ответом»/«закрыт допущением»/«снят» — заполнены «Резолюция» и «Дата закрытия»;
        дата закрытия ≥ даты постановки, для «закрыт допущением» «Резолюция» = текст допущения, для «расхождения источников» — ≥2 ссылки в «Источниках расхождения», 'для происхождений «белое пятно (пробел данных)» и «нестыковка уровней» — «Уровень
        каркаса» обязателен (спека 08 §1, §5)', 'согласованность полиморфной ссылки (C4): при заданном «Уровне каркаса» ссылки
        «Строка каркаса» ведут в таблицу этого уровня', 'нет висячих ссылок (строка каркаса, SRC, HYP, PRB/HYP, STK — существуют, если заданы)', 'гейт готовности (р.8): при синтезе по уровню ни один привязанный критичный вопрос не остаётся «открыт»/«в
        работе»', вопрос не удаляется молча — снимается статусом «снят» с причиной, сквозные «источник»/«статус доказанности» у строки отсутствуют (C1)]
    жизненный_цикл:
      ось: закрытие
      статусы: [открыт, в работе, закрыт ответом, закрыт допущением, снят (неактуален)]
      доказательная_зрелость: нет
    проекция: [Отчёт об обследовании AS-IS (раздел «Открытые вопросы и допущения»), Доска (по статусу/критичности/ответственному), индикатор гейта готовности перед синтезом, Протокол аудита материалов, Протокол встречи, 'План встреч', Реестр открытых вопросов]
    стык:
      даёт: реестр незакрытого знания с критичностью и локализацией; управляющий сигнал гейта готовности; явные допущения как зоны доуточнения; источник задач на добор (TSK)
      потребляет: [расхождения и белые пятна каркасных таблиц (REP/AM/BR/NSI/PRC/PSK/ORG/SYS/CR/INT/SR/INF), SRC, HYP, STK, 'методика (р.5, р.8, целостность Ур.5↔Ур.6)', 'навыки opp:* (C13)', инструкция-промт]
      зависит_от: [reg-facttables]
      где: spec/fact-tables/OQ.md
  PRB:
    название: Проблемы (4 координаты + каскад + ОБЭ)
    группа: '3. Осмысление: диагностика AS-IS (ядро диагностики)'
    тип: первичная
    уровень: null
    покрытие_методикой: есть
    поля:
    - {имя: код проблемы, вид: текст, обяз: да, уникально: да}
    - {имя: формулировка, вид: текст, обяз: да}
    - имя: координата 1 — уровень (номер)
      вид: число
      обяз: да
      словарь: [1…11]
    - {имя: координата 1 — каркасная строка, вид: ссылка, обяз: да, цель: <по-уровню>}
    - {имя: координата 2 — диагноз, вид: текст, обяз: да, источник: 'framework.yaml: «дефекты» каркасной строки уровня'}
    - имя: 'координата 3 — ОБЭ: категория'
      вид: перечисление
      обяз: да
      словарь: [финансовый, экономический, рисковый, стратегический]
    - {имя: 'координата 3 — ОБЭ: в чём ущерб', вид: текст, обяз: да}
    - {имя: 'координата 3 — ОБЭ: сколько (ссылка на расчёт)', вид: ссылка, обяз: условно, цель: EFF}
    - имя: координата 4 — тип решения
      вид: перечисление
      обяз: да
      словарь: [методологическое (Ур.1–3), организационное (Ур.4–6), технологическое (Ур.7–11)]
    - имя: природа проблемы (в каскаде)
      вид: перечисление
      обяз: да
      словарь: [корневая, производная]
    - {имя: корневая проблема, вид: ссылка, обяз: условно, цель: PRB}
    - {имя: расхождение-источник, вид: ссылки, обяз: нет, цель: <по-уровню>}
    - {имя: 'дерево причин: отвергнутые ветви', вид: текст, обяз: нет}
    - имя: нижняя отсечка
      вид: перечисление
      обяз: да
      словарь: [существенно, ниже порога (особенность учёта)]
    - имя: приоритет
      вид: перечисление
      обяз: нет
      выводимое: да
      словарь: [высокий, средний, низкий]
    - {имя: требования-ответы, вид: ссылки, выводимое: да, источник: ['TB.покрывает проблемы (полностью)', 'TB.покрывает проблемы (частично)']}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника: страница/раздел (документ), регистр+отбор (база), таймкод/реплика (встреча) — точечная перепроверка факта (Р-2, ЗР-0020)'}
    - имя: статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс величины ущерба}
    - {к: <по-уровню>, поле: координата 1 — каркасная строка, кардинальность: N-1, смысл: локализация на каркасе (полиморфная ссылка по уровню)}
    - {к: EFF, поле: 'координата 3 — ОБЭ: сколько (ссылка на расчёт)', кардинальность: 1-N, смысл: расчёт ущерба «сколько»}
    - {к: TB, поле: требования-ответы, кардинальность: N-M, смысл: 'ответ на проблему (трассировка «требование ← проблема» через поля покрытия TB)'}
    - {к: HYP, поле: расхождение-источник, кардинальность: N-1, смысл: происхождение суждения (расхождение/гипотеза)}
    - {к: OQ, поле: расхождение-источник, кардинальность: N-1, смысл: происхождение суждения (открытый вопрос)}
    - {к: PRB, поле: корневая проблема, кардинальность: N-1, смысл: 'каскад: производная → корневая (рефлексивно)'}
    - {к: asis-levels, поле: null, кардинальность: 1-N, смысл: проекция в Картину по уровням (представление)}
    - {к: asis-traceability, поле: null, кардинальность: 1-N, смысл: средний узел трассировки требование←проблема←источник (представление)}
    рецепт:
      ведущий_канал: перекрёстная сверка (методика р.5); для величины ущерба — цифровой след (VP/EFF)
      что_проблема: ['расхождение без гейта ОБЭ (особенность учёта, не проблема)', «хотелка» без доказанного ущерба, величина без источника, производная без ссылки на корень / двойной счёт ущерба по цепи]
      норма_глубины: 20/80 — глубоко доводим до проблемы только источники подтверждённого ущерба; достаточность мерится правом сформулировать ОБЭ
      опора: методика р.6 (4 координаты, гейт ОБЭ, каскад, дерево причин — ведущая), р.1, р.5, р.7, р.8; каркас (поле «дефекты» уровня → диагноз; полоса/уровень → тип решения)
    инструкция: {дефолт: 'Заводи проблему только из зафиксированного расхождения или подтверждённой гипотезы. Собери из трёх частей: суть дефекта (одной фразой, без ИТ-сленга и тавтологии), локализация (уровень 1–11 + ссылка на строку каркасной
        таблицы этого уровня), отрицательный бизнес-эффект. Диагноз бери из «дефектов» того уровня. Проведи через гейт ОБЭ: в чём · сколько · откуда; отнеси к категории (финансовый/экономический/рисковый/стратегический). «Сколько» разложи на
        множители и заведи расчёт в EFF (своего числа не держи); величина без источника недействительна — поставь источник на цифру ущерба. Ниже порога — пометь «особенность учёта», в проблемы не проводи. Тип решения по уровню: Ур.1–3 методологическое,
        Ур.4–6 организационное, Ур.7–11 технологическое (фиксируй явно). Производную проблему сведи деревом причин к корню, отвергнутые ветви запиши текстом, ущерб по цепи не задваивай (сумма на корне). Статус веди честно: гипотеза → цифровой
        след → интервью → согласовано. Суди по методике kb-audit, р.6 (р.1, р.5, р.7, р.8).', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; формулировка непуста, уровень из диапазона 1–11; каркасная строка существует в таблице именно этого уровня (полиморфная проверка), диагноз — из «дефектов» того же уровня; тип решения согласован с уровнем
        (Ур.1–3→метод./Ур.4–6→орг./Ур.7–11→технол.), 'гейт ОБЭ: у «согласовано»/«цифровой след» обязательны категория, «в чём» и ссылка на EFF; величина без источника недействительна → не выше гипотезы', 'каскад без двойного счёта: «производная»
        имеет существующий корень; ущерб по цепи на корне; дерево причин ациклично', 'замкнутость к требованию: согласованная проблема с существенным ОБЭ стоит хотя бы в одном из списков покрытия TB (полностью/частично)', 'нет висячих ссылок (каркасная строка, EFF, корневая, источник)',
      нижняя отсечка «ниже порога» не проводится в требования и в отчёт]
    жизненный_цикл:
      ось: доказанность
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS, Картина по уровням, Концепция TO-BE и дорожная карта]
    стык:
      даёт: доказанные проблемы по 4 координатам (уровень · диагноз · ОБЭ · тип решения) с локализацией на каркасе; дерево причин (корень↔производные, ущерб не задваивается); тяжесть ОБЭ как основу приоритета; вход для TB (поля покрытия проблем)
        и для обоих представлений
      потребляет: [перекрёстные сверки каркасных таблиц всех уровней, HYP, OQ, EFF, VP, SRC, 'методика (р.6 — ядро; р.1, р.5, р.7, р.8)', каркас (поле «дефекты»; полоса → тип решения), инструкция-промт]
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables/PRB.md
  EFF:
