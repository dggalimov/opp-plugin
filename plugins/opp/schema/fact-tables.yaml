    - {имя: название, вид: текст, обяз: да}
    - имя: класс модели
      вид: перечисление
      обяз: да
      словарь: ['контур: бухгалтерский', 'контур: управленческий', 'контур: бюджетный', 'контур: налоговый', 'операционная: продажи', 'операционная: закупки', 'операционная: склад', 'операционная: производство', 'операционная: казначейство',
        иная (вне явного текста — операционализация)]
    - {имя: назначение модели, вид: текст, обяз: да}
    - {имя: ключевые измерения, вид: текст, обяз: да}
    - {имя: ключевые факты модели, вид: текст, обяз: да}
