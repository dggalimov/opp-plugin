      потребляет: ['график аудита и сценарий эксплуатации (этап 0, opp:new-project)', 'opp:analyze-meeting (обработка встречи)', справочник типов встреч (capabilities/extract/meeting-types.yaml), 'методика (р.8 — гейт, р.10 — ведущий канал)',
        STK, инструкция-промт]
      зависит_от: [reg-facttables]
      где: spec/fact-tables/MTG.md
