    инструкция: {дефолт: 'Заводи строку TS только когда в закрытии требования участвует продукт; чисто оргзакрытия — в SOL. На каждое согласованное требование (TB) собери маппинг: каким продуктом и какой типовой функцией оно закрывается; формулировку
        типовой бери из доменной БЗ через KBP, не из памяти, и сошлись на источник-эталон. Требование — бизнес-результат, не продукт. Один способ закрытия — одна строка; комбинацию — несколькими строками, сводку — в COV. Проставь степень покрытия
        типовой по единой шкале; если типовая закрывает не всё — опиши дельту-доработку как бизнес-результат и укажи класс дельты. Привяжи к GAP (если есть), к решению (SOL) и к системе (SYS). Дай грубый ориентир оценки дельты; числа — в VP,
        смету и волны — дорожной карте. Веди статус проработки: предложено → выбрано → согласовано (и отклонено, не удаляя). Замкнутость — по TS∪SOL; ни одна дельта — без требования. Суди по методике kb-audit, р.3, р.6, р.7.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; «Целевой продукт» и «Типовая функция» непусты, перечисления — из словарей, '«Бизнес-требование» обязательно, одиночная ссылка на существующую строку TB', '«Источник-эталон» обязателен и существует (мягко:
        предупреждать, если не привязан к KBP)', сквозные «источник»/«статус доказанности» не требуются (C1); проверяется заполненность «Статуса проработки», если степень покрытия ≠ «покрыто типовой» — «Дельта-доработка» и «Класс дельты» заполнены,
      'замкнутость требование→решение по TS∪SOL: каждое согласованное требование закрыто строкой TS или решением SOL без продукта', каждая дельта привязана к существующему требованию, 'версия эталона ↔ версия системы согласуются, если система
        указана (мягкая проверка, C12)', 'нет висячих ссылок (TB, SRC, GAP, SOL, SYS)', 'чисел не дублирует (C7): нет числовых полей объёма/частоты/ставки; «Оценка дельты» — текстовый ориентир', 'нет флага дефекта и поля «тип решения» (C5, C6)',
      'отклонённый вариант не удаляется молча, если на него ссылались']
    жизненный_цикл:
      ось: проработка решения
      статусы: [предложено, выбрано, согласовано, отклонено]
      доказательная_зрелость: нет
    проекция: [Концепция TO-BE и дорожная карта (несущий раздел), матрица покрытия COV, fit-gap варианта FIT и обоснование выбора DEC]
    стык:
