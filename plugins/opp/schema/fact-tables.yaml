      обяз: да
      словарь: [волна (очередь), работа/блок]
    - {имя: Волна (очередь), вид: ссылка, обяз: условно, цель: RM}
    - {имя: Реализуемые требования, вид: ссылки, обяз: да, цель: TB}
    - {имя: Реализуемые решения, вид: ссылки, обяз: нет, цель: SOL}
    - {имя: Снимаемые проблемы (эффект вехи), вид: ссылки, обяз: условно, выводимое: да, цель: PRB}
    - имя: Приоритет
      вид: перечисление
      обяз: условно
      выводимое: да
      словарь: [высокий, средний, низкий]
    - имя: Быстрая победа
      вид: перечисление
      обяз: нет
      словарь: [да, нет]
    - {имя: Зависит от (очерёдность), вид: ссылки, обяз: нет, цель: RM}
    - {имя: Оценка трудоёмкости, вид: число, обяз: нет}
    - имя: Единица оценки
      вид: перечисление
      обяз: нет
      словарь: [рабочие дни, человеко-часы]
    - {имя: Драйвер / Сложность, вид: текст, обяз: нет}
    - {имя: Целевой эффект (Δ ОБЭ), вид: текст, обяз: нет}
    - {имя: Привязка к варианту, вид: ссылка, обяз: нет, цель: AV}
    - {имя: Ссылка на смету (КРП), вид: ссылка, обяз: нет, цель: '@КРП'}
    - имя: Статус проработки
      вид: перечисление
      обяз: да
      словарь: [черновик, проработан, согласован, отклонён]
    - {имя: Примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: RM, поле: Волна (очередь), кардинальность: 1-N, смысл: иерархия волна ⊃ работы}
    - {к: TB, поле: Реализуемые требования, кардинальность: N-M, смысл: граница плана и замкнутость в обе стороны}
    - {к: SOL, поле: Реализуемые решения, кардинальность: N-M, смысл: что именно делаем}
    - {к: PRB, поле: Снимаемые проблемы (эффект вехи), кардинальность: N-M, смысл: 'карта эффектов: веха ↔ снятая проблема (через TB)'}
    - {к: RM, поле: Зависит от (очерёдность), кардинальность: N-M, смысл: обоснование последовательности (ацикличный граф)}
    - {к: AV, поле: Привязка к варианту, кардинальность: N-1, смысл: выбранный целевой ландшафт}
    рецепт:
      ведущий_канал: доказанная база осмысления (TB + EFF + SOL); RM — не факт уровня (сквозная)
      что_проблема: [работа/строка без основания (нет привязки к TB/SOL/PRB), разрыв замкнутости — проблема с существенным ОБЭ без вехи-решения, приоритет не согласован с тяжестью ОБЭ, цикл в зависимостях очерёдности, оценка без драйвера/обоснования]
      норма_глубины: прагматичная достаточность; детально планируем работы под подтверждённый существенный ущерб (20/80); декомпозиция не выходит за рамку аудита
      опора: методика р.7 (принцип приоритета и замкнутость), р.9 (детерминированная проекция); механика — навык opp:roadmap и БЗ kb-roadmap
    инструкция: {дефолт: 'Строй карту только поверх доказанной базы: согласованные требования (TB) с трассировкой до проблем (PRB) и ОБЭ (EFF) и закрывающие решения (SOL). Граница плана = реестр требований к TO-BE; работ без основания не заводи.
        Веди одну таблицу с двумя ролями строки (волна / работа-блок), работу привязывай к волне. Группируй в волны по принципу: приоритет = тяжесть ОБЭ × сложность/зависимости; рано сними быстрые победы и пометь; очерёдность обосновывай зависимостями.
        На каждую единицу укажи эффект вехи (обязательная связь веха ↔ снятая проблема); Δ ОБЭ — где EFF даёт число, иначе словами. Оценку, смету (КРП), календарь и фикс/вилку вручную не считай — это навык opp:roadmap: возьми объёмы из VP ссылкой,
        зафиксируй результат с обоснованием и ссылку на КРП. Помечай процессным статусом проработки. Замкни карту: ни одна согласованная проблема с существенным ОБЭ без вехи. Суди по методике kb-audit, р.7, р.9.', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; Название непусто, перечисления — из словаря, 'иерархия волн: работа/блок ссылается на существующую строку-волну; строка-волна это поле не заполняет', 'основание: у каждой единицы ≥1 ссылка на существующее
        TB; нет работы без основания', 'замкнутость в обе стороны: каждая проблема с существенным ОБЭ покрыта вехой (через TB→RM); каждая единица реализует ≥1 требование', согласованность приоритета с тяжестью ОБЭ (через TB/PRB), ацикличность
        зависимостей очерёдности; нет висячих ссылок, 'снимаемые проблемы непусты (≥1), выводятся из TB→PRB; Δ ОБЭ опционален', если задана оценка — заданы единица оценки и драйвер/сложность, 'накопление, не перезапись: отклонённая единица хранится
        с пометкой почему']
    жизненный_цикл:
