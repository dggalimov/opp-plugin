        фактов не даёт — только проекция (read-only)
      потребляет: [REP, AM, BR, NSI, PRC+PSK, ORG+RACI, SYS, CR+GAP, INT, SR, INF, HYP, OQ, PRB, EFF, framework.yaml (каркас), 'kb-audit (р.2, р.5, р.6, р.8, р.9, Часть II)']
      зависит_от: [reg-facttables, ft-REP, ft-AM, ft-BR, ft-NSI, ft-PRC, ft-PSK, ft-ORG, ft-RACI, ft-SYS, ft-CR, ft-GAP, ft-INT, ft-SR, ft-INF, ft-HYP, ft-OQ, ft-PRB, ft-EFF]
