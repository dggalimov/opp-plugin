    - {имя: 'подготовка участников', вид: текст, обяз: нет, значимость: полнота, смысл: 'что подготовить заказчику к встрече: демонстрация процесса/системы/конкретных файлов (раздел повестки «Пожелания к участникам», спека 08 §8); значимо у встреч в статусе «запланирована»; пишет навык планирования встреч'}
