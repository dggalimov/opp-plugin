        При закрытии проставь дату завершения. Крупную работу дроби через «Родительскую задачу», очерёдность — через «Зависит от задачи» (без циклов). Не удаляй — отменяй статусом. Не приписывай источник/статус доказанности, не вводи часы, не
        ссылайся напрямую на проблемы/требования. Методика kb-audit здесь не применяется (служебная таблица).', правка_пользователя: разрешена}
    целостность: [код уникален и непуст; название непусто; дата создания непуста, 'тип, статус, приоритет — из словарей', при статусе «выполнена»/«отменена» заполнена дата завершения; дата завершения ≥ даты создания, 'нет висячих ссылок: STK
        / MTG / OQ / родительская задача / задачи-зависимости существуют, если заданы', 'самоссылки корректны: задача не родитель сама себе; граф «Зависит от задачи» без циклов', задача не удаляется молча — закрывается статусом «отменена», сквозные
        «источник»/«статус доказанности» у строки отсутствуют (служебная по C1), 'прямой ссылки на PRB / TB у строки нет (граница служебного слоя, решение Р1)', 'полей учёта часов у строки нет (трудоёмкость — в RM/VP, решение Р3)']
    жизненный_цикл:
      ось: выполнение (процессная)
      статусы: [бэклог, запланирована, в работе, на проверке, выполнена, отменена]
      доказательная_зрелость: нет
    проекция: [Доска (задачи по статусу / исполнителю), рабочий план-график проекта для архитектора]
    стык:
      даёт: управляемость хода проекта — задачи со статусом, сроком, ответственным (текст) и привязками-провенанс; основа для представления «Доска»
      потребляет: [договорённости и решения по ходу проекта, OQ, MTG, STK, 'навыки opp:* (порождают задачи)', инструкция-промт]
      зависит_от: [reg-facttables]
      где: spec/fact-tables/TSK.md
