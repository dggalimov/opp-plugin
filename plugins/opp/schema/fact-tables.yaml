    - {к: TSK, поле: родительская задача, кардинальность: 1-N, смысл: декомпозиция на подзадачи}
    - {к: TSK, поле: зависит от задачи, кардинальность: N-M, смысл: очерёдность; граф зависимостей без циклов}
    рецепт:
      ведущий_канал: не применимо (служебная; опора — поток договорённостей и открытых вопросов, требующих действия)
      что_проблема: ['просроченная задача (срок прошёл, статус не «выполнена»/«отменена»)', «выполнена»/«отменена» без даты завершения, дата завершения раньше даты создания, циклическая зависимость задач, родитель сам себе, висячая привязка (несуществующие
          стейкхолдер / встреча / открытый вопрос / задача-зависимость)]
      норма_глубины: дробление до подзадач — по управленческой целесообразности (не методическое 20/80); не мельчить ниже единицы работы, которую можно «взять и сделать»
      опора: методика — не опора (молчит); общепроектная практика управления работами, навыки opp:* (порождают задачи), представление «Доска»
    инструкция: {дефолт: 'Заведи задачу на каждое действие, которое нужно довести до результата: код, краткое название, при необходимости описание. Укажи тип, приоритет, срок (если есть). Ответственный — свободный текст (архитектор / ИИ-ассистент),
