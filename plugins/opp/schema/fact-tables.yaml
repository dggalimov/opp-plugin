      словарь: [сущность-объект, справочник (НСИ), измерение (аналитика), факт/показатель, документ-операция, регистр, атрибут]
    - {имя: Назначение, вид: текст, обяз: да}
    - {имя: Ключевые атрибуты, вид: текст, обяз: да}
    - {имя: Целевой продукт, вид: ссылка, обяз: да, цель: TS}
    - {имя: Мастер-система, вид: ссылка, обяз: условно, цель: TS}
    - имя: Мастер-система определена
      вид: перечисление
      обяз: условно
      выводимое: да
