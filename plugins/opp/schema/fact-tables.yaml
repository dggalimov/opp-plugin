    стык:
      даёт: доказанный реестр системных ролей Ур.10 (профиль доступа в системе) с типом исполнителя, владельцем и объёмом прав; фактуру избыточных прав / «под админом» / теневой автоматизации / конфликта полномочий / отсутствия ограничения доступа
        (отметки + выводимые сводки; диагноз — в HYP/PRB); проекцию оргструктуры в ИТ полем «Исполнитель — человек» (RLS — поле SR «Сводка ограничения доступа»; связка ORG×SR — точка роста, не реализовано); привязку ролей к интеграциям (Ур.9), механизмам (Ур.8), ресурсу исполнения (Ур.11) и справочникам (Ур.4)
      потребляет: ['Источники (SRC, провенанс; эталон типовых ролей/RLS — через SRC-KB → KBP)', SYS, 'kb-audit (каркас Ур.10, Ч.II, р.4–6, целостность Ур.5 ↔ Ур.6)', 'Оргструктура (ORG, полем «Исполнитель — человек»)', PRC, NSI, DEC, INT, INF, 'сырьё (матрица
