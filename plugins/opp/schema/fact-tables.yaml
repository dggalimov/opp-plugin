      ведущий_канал: 'интервью ИТ + паспорта систем + инвентаризация платформы (акцент: Документы, Люди)'
      что_проблема: [не держит объёмы (производительность), нет резервирования, устаревшая платформа (за датой окончания поддержки), нет администратора, узел без несомой системы]
      норма_глубины: короткая; гигиена — все узлы с системами инвентаризованы и три сигнала; глубоко — только узлы-источники подтверждённого ущерба (20/80)
