    инструкция: {дефолт: 'Заполняй заключение только после сборки и сравнения вариантов архитектуры (VAR) и подсчёта их покрытия требований (FIT/COV) — выбор без сравнения недействителен. Заведи строку на каждое решение выбора: предмет выбора
