        «Сводка ограничения доступа (RLS)»; отдельная связка ORG×SR — точка роста, не реализовано; сверь
        с оргструктурой и разделением полномочий; расхождение «кто действовал ≠ кто назначен» отметь в «Заявлено ≠ фактически», диагноз — в HYP/PRB. Для не-человека найди владельца и механизм (Ур.8 + ресурс Ур.11) или поток обмена (Ур.9); нечеловеческий
        исполнитель без владельца/назначения — фактура теневой автоматизации. Зафиксируй объём прав (текстом), сверь «права ⊆ функции», проверь ограничение доступа (RLS) и какие справочники (Ур.4) роль вправе менять. Каждый факт — со ссылкой
        на источник; числа — в VP; флаги дефекта и тип решения в строку не пиши. Суди по методике kb-audit, Ч.II (паспорт Ур.10), р.4–6, целостность Ур.5 ↔ Ур.6.', правка_пользователя: разрешена}
    целостность: [код роли уникален и непуст, название и объём прав непусты, система задана и существует, перечисления — из словаря, у каждой роли есть источник; факт без источника недействителен, статус ≥ «цифровой след» — только при источнике
        природы «данные системы» (конфигурация/журнал), «Владелец» обязателен; человек → ожидается ≥1 ссылка в «Исполнитель — человек» (ORG), 'не-человек без владельца или без назначения → отметка «исполнитель не-человек, владелец не определён» + связанная запись
        в HYP/PRB', интеграция и автомат должны иметь свою роль; «под админом» — фактура + кандидат в проблему, права шире исполняемых шагов → сводка «шире функции (избыточные)» + кандидат в проблему, расхождение исполнителя (номинальное
