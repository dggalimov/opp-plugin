    - {имя: обеспечиваемое решение, вид: ссылка, обяз: условно, цель: REP}
    - имя: горизонт решения
      вид: перечисление
      обяз: условно
      словарь: [оперативный, тактический, стратегический]
    - {имя: пользователь (роль), вид: ссылка, обяз: да, цель: ORG, значимость: полнота}
    - {имя: факты в основе, вид: текст, обяз: условно}
    - {имя: процесс рождения факта, вид: ссылка, обяз: нет, цель: PRC}
    - {имя: считается моделью, вид: ссылка, обяз: нет, цель: AM}
    - {имя: считается правилом, вид: ссылка, обяз: нет, цель: BR}
    - {имя: система формирования, вид: ссылка, обяз: нет, цель: SYS}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - имя: статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс факта}
    - {к: ORG, поле: пользователь (роль), кардинальность: N-1, смысл: пользователь в оргструктуре (Ур.6)}
    - {к: PRC, поле: процесс рождения факта, кардинальность: N-1, смысл: факт рождается в процессе (Ур.5)}
    - {к: AM, поле: считается моделью, кардинальность: N-1, смысл: метрика ↔ модель (Ур.2)}
    - {к: BR, поле: считается правилом, кардинальность: N-1, смысл: правило + горизонт (Ур.3)}
    - {к: SYS, поле: система формирования, кардинальность: N-1, смысл: место отчёта (Ур.7)}
    - {к: REP, поле: обеспечиваемое решение, кардинальность: N-1, смысл: связка решение ↔ метрика (рефлексивная)}
    - {к: INT, поле: система формирования, кардинальность: 1-N, смысл: 'отчёт и модель в разных системах → транзакционная интеграция (направленно, Ур.9)'}
    рецепт:
      ведущий_канал: действующая отчётность + интервью руководства (что реально лежит у ЛПР и по чему он решает)
      что_проблема: [решение без метрики (решают вслепую), метрика без решения (считают не то), отчёт без пользователя, 'требуемый разрез, которого нет в НСИ', 'пользователь, которого нет в оргструктуре', '«по словам решаем по отчёту X», а отчёта
          X в системе нет']
      норма_глубины: до решения и его метрики; глубоко — только цепочки решений с существенным ущербом (20/80), без идеализации отчётности
      опора: каркас Ур.1 (что выясняем, дефекты, сверки); методика Часть II Ур.1 (ведущий канал, специфика, норма глубины); методика р.6 (координаты проблемы)
    инструкция: {дефолт: 'Иди от решения: зафиксируй управленческие решения (вид «решение») — что решают, кто (роль Ур.6), на каком горизонте (оперативный/тактический/стратегический). На каждое решение заведи обеспечивающий отчёт/метрику со ссылкой
        «Обеспечиваемое решение»; для отчёта — пользователя, факты в основе, систему (Ур.7); разрезы отдельной связкой «отчёт ↔ разрез» не фиксируются — точка роста, не реализовано (пиши текстом в «Факты в основе»); для метрики — модель (Ур.2), правило (Ур.3), процесс рождения факта
        (Ур.5). Не сглаживай расхождения, но диагноз не ставь здесь: фиксируй фактуру и ставь отметку «заявлено ≠ фактически», дефект-кандидат заводи в «Проблемах» со ссылкой на строку REP. Каждый элемент — со ссылкой на источник; без источника
        запись недействительна. Количества — в «Объёмные параметры» ссылками. Суди по методике kb-audit, каркас Ур.1 + Часть II Ур.1, р.6.', правка_пользователя: разрешена}
    целостность: [код элемента уникален и непуст; название непусто, «вид элемента» и «статус доказанности» — из словарей, каждый элемент несёт источник; запись без источника недействительна, 'нет висячих ссылок (источник, пользователь, процесс,
        модель, правило, система, обеспечиваемое решение)', «обеспечиваемое решение» ссылается на строку REP вида «решение»; рефлексивная ссылка ацикличная, «горизонт решения» заполнен только у вида «решение» и взят из словаря, замкнутость связки
        «решение ↔ отчёт/метрика» сверяется как факт; разрыв уходит кандидатом в Проблемы, 'связка «отчёт ↔ разрез» (REP×AN) — точка роста, не реализовано: разрезы не проверяются структурно, только текстом в «Факты в основе»', в REP нет полей-флагов дефекта и поля «тип решения» (structural-гарантия),
      'двусторонность с источником: источник существует и перечисляет этот факт']
    жизненный_цикл:
      ось: доказанность
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел картины ценности Ур.1), Концепция TO-BE и дорожная карта, Протокол встречи]
    стык:
