      словарь: [нет расхождения, модель без метрики (мягкая отметка), политика ≠ база, 'контур заявлен, не ведётся']
    - {имя: методолог / владелец, вид: ссылка, обяз: нет, цель: ORG, значимость: полнота}
    - {имя: где живёт (система), вид: ссылка, обяз: нет, цель: SYS, значимость: полнота}
    - {имя: порождаемые метрики, вид: ссылки, обяз: нет, цель: REP}
    - {имя: питает модель, вид: ссылки, обяз: нет, цель: AM}
    - {имя: объёмы модели, вид: ссылки, обяз: нет, цель: VP}
    - {имя: 'процессы, где регистрируется', вид: ссылки, выводимое: да, цель: PRC, источник: 'PRC.Регистрирует в модели'}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - имя: статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс (сквозное)}
    - {к: REP, поле: порождаемые метрики, кардинальность: N-M, смысл: модель → метрики Ур.1}
    - {к: AM, поле: питает модель, кардинальность: N-M, смысл: промежуточная модель питает другую (рефлексивно)}
    - {к: AM, поле: null, кардинальность: N-M, смысл: 'внутренняя связка несхождений контуров (рефлексивно) — «точка роста», структурного поля нет (ЗР-0024 п.5)'}
    - {к: SYS, поле: где живёт (система), кардинальность: N-1, смысл: где живёт модель}
    - {к: ORG, поле: методолог / владелец, кардинальность: N-1, смысл: владелец-роль}
    - {к: VP, поле: объёмы модели, кардинальность: 1-N, смысл: числа объёмов/частот (C7)}
    - {к: PRC, поле: 'процессы, где регистрируется', кардинальность: N-M, смысл: 'обратная связь Ур.2 ↔ Ур.5 (выводимая из PRC.Регистрирует в модели)'}
    рецепт:
      ведущий_канал: учётная политика + проводки/регистры в базе (методика Ч.II Ур.2)
      что_проблема: [контуры не сходятся (упр ≠ бух ≠ бюджет), синтетика не стыкуется с операционкой, модель без метрики на выходе (избыточна), нужного контура нет]
      норма_глубины: до контура и его стыковки; глубоко — только модели, чьё несхождение даёт подтверждённый ущерб (20/80)
      опора: каркас Ур.2; методика Ч.II Ур.2; раздел 5 (сверка); раздел 10 (ведущий канал → потолок статуса)
    инструкция: {дефолт: 'Перечисли учётные модели заказчика: контуры учёта (бух, упр, бюджет, налог) и операционные модели (продажи, закупки, склад, производство, казначейство). На каждую зафиксируй класс, назначение, ключевые измерения (ярлыком),
        ключевые факты, методолога/владельца и систему. Ведущий канал — учётная политика плюс проводки/регистры в базе: бери из политики, проверяй по регистрам; расхождение помечай «политика ≠ база» и заводи кандидата в HYP/PRB. Измерения — только
        ярлыком (справочники в НСИ); алгоритмы — в BR (Ур.3); числа объёмов — в VP. Главное — проверить, сходятся ли контуры: каждое несхождение заведи строкой во внутренней связке «Стыки контуров» (пара + в чём расходятся + источники сторон
        + статус). Свяжи модель с метриками Ур.1; модель без метрики — кандидат в проблему «избыточна» (снимается полем «Питает модель»). Каждая запись — со ссылкой на источник. Суди по методике kb-audit, каркас Ур.2, Ч.II Ур.2, разделы 5 и 10.',
      правка_пользователя: разрешена}
    целостность: [код модели уникален и непуст, 'класс, статус доказанности, «Заявлено ≠ фактически» — из словарей; назначение, измерения, факты непусты', у каждой модели есть источник; наблюдение без источника недействительно (C1), 'нет висячих
        ссылок: SRC, SYS, ORG, REP, AM, VP существуют, если заданы', 'модель класса «контур» без связи к REP и без «Питает модель» — кандидат в проблему (мягко, не ERROR)', 'в AM нет полей-флагов дефекта и «тип решения» (C5, C6)', 'двусторонность
        с SRC: модель ↔ источник перечисляют друг друга', 'связка «Стыки контуров»: A и B существуют и различны (A ≠ B); есть источник и статус; расхождение — выводимое', числа объёмов в AM отсутствуют; только ссылки в VP (C7), полиморфная входящая
        ссылка HYP/PRB → AM проверяется по уровню = 2 → существование строки (C4)]
    жизненный_цикл:
      ось: зрелость факта
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел «Учётные модели / контуры»), Концепция TO-BE и дорожная карта (исходная точка единой модели данных), Протокол встречи]
    стык:
      даёт: перечень учётных моделей и контуров Ур.2 с измерениями/фактами (ярлыком); расхождения контуров как фактура (связка «Стыки контуров» + мягкие отметки); связи модель → метрика/система/владелец/объёмы/модель
      потребляет: ['Источники (SRC, в т. ч. «эталон» SRC-KB → KBP)', учётная политика и регистры/проводки базы, 'методика (каркас Ур.2, Ч.II Ур.2, разделы 5 и 10)', доменная БЗ структуры конфигурации, Объёмные параметры (VP), инструкция-промт]
      зависит_от: [reg-facttables, reg-framework]
      где: spec/fact-tables/AM.md
