    инструкция: {дефолт: 'Это выводимое представление — не заполняй руками, оно пересобирается из реестров. Пройди по всем 11 уровням каркаса (Бизнес Ур.1-6, ИТ Ур.7-11): для каждого возьми из framework.yaml что_выясняем и перекрёстные_сверки
        и сопоставь с каркасной таблицей уровня — сколько фактов и в каком статусе зрелости (гипотеза → цифровой след → интервью → согласовано), пройден ли ведущий канал, какие OQ/HYP висят, какие расхождения (HYP/PRB) и какие доросли до доказанных
        проблем (PRB с гейтом ОБЭ) и какого ущерба (EFF). Адресуй факты полиморфной ссылкой: номер уровня + код строки таблицы уровня. Читай картину как гейт готовности разведки: «готов к синтезу» только если выполнены ВСЕ условия гейта (покрытие
        без пропусков и двойного счёта, ведущий канал пройден, критичные вопросы закрыты/зафиксированы, обязательные сверки замкнуты или заведены как проблема). Долю дозревших фактов в статус не зашивай. Дыру добирай на нижнем уровне, а не дописывай
        строку в картину. Не углубляйся ровным слоем — 20/80. Дефект не заводи в картине (он в HYP/PRB), ОБЭ не считай (числа в VP, расчёт в EFF — здесь только ссылки). Главный вывод подавай от вывода вниз. Способ свёртки статуса и визуализация
        — вне методики (делегировано навыку), помечай и не выдумывай правило. Суди по методике kb-audit, р.2, р.5, р.6, р.8, р.9, Часть II.', правка_пользователя: разрешена}
    целостность: ['только чтение: каждое поле выводимо, нет записи без правила вывода', 'полнота сетки: ровно 11 строк (1-11), без пропусков и дублей; полоса соответствует каркасу', 'полиморфная ссылка валидна: номер уровня + код строки ведут
