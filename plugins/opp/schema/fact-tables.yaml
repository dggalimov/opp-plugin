    - {к: KBP, поле: null, кардинальность: N-1, смысл: 'доменная БЗ через KBP, контракт «эталон» на стороне SRC (C10)'}
    - {к: INT, поле: null, кардинальность: N-M, смысл: 'межсистемные переходы → кандидаты в интеграции (Ур.9, направленно, C12)'}
    рецепт:
      ведущий_канал: регламенты и должностные инструкции (ранняя разведка, носитель ещё не опрошен); зрелый канал Ур.5 — углублённые интервью + журналы
      что_проблема: [разрыв конвейера, двойной ввод, теневые операции, шаг без владельца, шаг без системы, цепочка без финала, процесс без роли]
      норма_глубины: гигиенический минимум по контуру (функции, процессы, границы цепочек); до шагов — только процессы с ранней гипотезой существенного ущерба (20/80)
      опора: framework Ур.5; методика раздел «Целостность процессов и оргструктуры»; методика Часть II Ур.5; методика р.8 (ранняя гипотеза, гейт готовности); методика р.4 (лестница статусов)
    инструкция: {дефолт: 'Собери скелет процесса — раннюю картину, как факты рождаются и движутся, ещё до углублённого интервью. Иди по эталону декомпозиции сверху вниз: функция → процесс → подпроцесс → шаг, у каждой строки укажи «Уровень декомпозиции»
        и «Родителя». У процесса/подпроцесса зафиксируй стартовое событие и финальный результат. Шаги выстрой линейной цепочкой через «Предшественника»: один шаг — один предыдущий, без ветвлений. Видна развилка из бумаг — не рисуй точку решения:
        поставь мягкую отметку «возможно ветвление» в «Заявлено ≠ фактически» и заведи открытый вопрос. На шаге заполни обязательные атрибуты: владелец · вход · действие · выход · система; чего нет — не выдумывай, пустой владелец/система — белое
        пятно как гипотеза/открытый вопрос. Карточку-измерители шага не заводи (режим PRO); количества веди в VP. Каждой строке проставь «Подтверждённость топологии» = «топология не подтверждена» и источник; запись без источника недействительна.
        «Готовность к созреванию» не трогай — её считает verify. Статус доказанности держи честным: реконструкция по регламенту — «гипотеза», подтверждённое журналом — «цифровой след». Где регламент ≠ журнал — отметь «регламент ≠ фактический
        ход» и заведи кандидата в проблему. Глубину держи по 20/80. Подтвердил носитель поток — поставь «подтверждена носителем», строка созреет в режим «Процессы» (PRO). Суди по методике kb-audit, раздел «Целостность процессов и оргструктуры»,
        Часть II Ур.5, разделы 4 и 8.', правка_пользователя: разрешена}
    целостность: [код элемента уникален и непуст; название непусто; у «шаг» заполнено «Действие», перечисления — из словарей, источник обязателен и существует — факт без источника недействителен (C1), 'иерархия замкнута: у всего, кроме «функция»,
        задан «Родитель», он существует и стоит на уровень выше; цикла нет (ацикличность)', 'линейность скелета: «Предшественник» (если задан) — строка вида «шаг» того же процесса/подпроцесса; цикла нет; не более одного предшественника; точек
        решения нет', 'нет висячих ссылок (владелец, система, предшественник, родитель, источник)', 'белые пятна не молчат: шаг без владельца/системы, процесс без финала, обрыв цепочки → связанная запись в диагностике (C4)', '«Готовность к созреванию»
        — выводимое, только чтение: согласовано с правилом (топология «подтверждена носителем» И статус ≥ «интервью»)', 'метка зрелости: «подтверждена носителем» допустима только при статусе доказанности ≥ «интервью»', 'без дубля с PRO: строка
        «перенесён в PRO» не несёт активной скелетной фактуры зрелого режима', 'накопление: новый канал дополняет строку, прежняя гипотеза не затирается']
    жизненный_цикл:
      ось: статус доказанности (+ ось зрелости топологии)
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: ['Отчёт об обследовании AS-IS (раздел картины процессов Ур.5, ранняя стадия)', 'Концепция TO-BE и дорожная карта (косвенно, через зрелый режим PRO)']
    стык:
      даёт: ранняя реконструированная картина процессов AS-IS (иерархия функция→процесс→подпроцесс→шаг, линейные цепочки с границами); каркас для углублённого интервью; белые пятна и обрывы как фактуру + мягкая отметка «заявлено ≠ фактически»
        (C5); заготовка под созревание в зрелый режим «Процессы» (PRO)
      потребляет: [SRC, 'методика (framework Ур.5, Часть II Ур.5, разделы 4 и 8)', KBP, 'сырьё (регламенты, должностные инструкции, наблюдения, журналы)', ORG, SYS, VP, INT, НСИ (Ур.4), инструкция-промт]
      зависит_от: [reg-facttables, cap-ingest]
      где: spec/fact-tables/PSK.md
