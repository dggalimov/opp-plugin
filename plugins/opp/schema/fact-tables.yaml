      обяз: да
      словарь: [топология не подтверждена, подтверждена носителем]
    - имя: Готовность к созреванию
      вид: перечисление
      выводимое: да
      словарь: [скелет, готов к созреванию, перенесён в PRO]
    - имя: Заявлено ≠ фактически
      вид: перечисление
      обяз: нет
      словарь: [нет расхождения, регламент ≠ фактический ход (мягкая отметка), возможно ветвление (из бумаг видна развилка)]
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - имя: Статус доказанности (сквозное)
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс (двусторонняя связь факт↔источник)}
    - {к: PSK, поле: Родитель, кардинальность: N-1, смысл: иерархия декомпозиции шаг→подпроцесс→процесс→функция}
    - {к: PSK, поле: Предшественник, кардинальность: N-1, смысл: линейная цепочка без ветвлений}
