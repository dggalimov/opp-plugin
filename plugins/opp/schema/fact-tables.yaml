    - {к: PRB, поле: Проблема, кардинальность: N-M, смысл: доказанный дефект}
    - {к: EFF, поле: ОБЭ (тяжесть), кардинальность: N-1, смысл: тяжесть ущерба → существенность}
    - {к: SRC, поле: Источники проблемы, кардинальность: N-M, смысл: провенанс (через PRB)}
