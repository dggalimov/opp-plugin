    инструкция: {дефолт: 'Заведи строку на каждый профиль доступа (набор прав) в конкретной системе. Привяжи роль к системе (Ур.7), определи тип исполнителя (человек / не-человек) — от него зависят обязательные привязки. Ведущий канал — матрица
