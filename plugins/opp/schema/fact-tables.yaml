    - {имя: эталон, вид: ссылка, обяз: условно, цель: SRC, смысл: 'условно (гейт Ф1): эталонный документ может отсутствовать в материалах — CR-лист ссылался на пункты БФ, самого БФ в корпусе нет; текст отсылки — в GAP.«эталон (типовая функция)»'}
    - {имя: владелец / автор, вид: ссылка, обяз: нет, цель: ORG}
    - {имя: объёмы доработки, вид: ссылки, обяз: нет, цель: VP}
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - имя: статус доказанности
      вид: перечисление
      обяз: да
      словарь: [гипотеза, цифровой след, интервью, согласовано]
    - {имя: примечание, вид: текст, обяз: нет}
    рёбра:
    - {к: SRC, поле: источник, кардинальность: N-1, смысл: провенанс (сквозное)}
    - {к: SRC, поле: эталон, кардинальность: N-1, смысл: 'мерило зазора, источник природы «эталон» (SRC-KB → KBP)'}
    - {к: GAP, поле: закрываемый дефицит, кардинальность: N-M, смысл: зачем — закрываемый функциональный дефицит}
    - {к: BR, поле: реализуемое правило, кардинальность: N-M, смысл: зачем — реализуемое правило Ур.3 (двусторонняя)}
    - {к: TB, поле: реализуемое требование, кардинальность: N-M, смысл: зачем — реализуемое требование (трассировка)}
    - {к: SR, поле: реализует системную роль, кардинальность: N-M, смысл: механизм автоматической роли Ур.10}
    - {к: SYS, поле: система / версия, кардинальность: N-1, смысл: привязка к ландшафту Ур.7}
    - {к: ORG, поле: владелец / автор, кардинальность: N-1, смысл: владелец/автор доработки (роль)}
    - {к: VP, поле: объёмы доработки, кардинальность: N-M, смысл: числа объёмов — в VP (C7)}
    рецепт:
      ведущий_канал: конфигурация — метаданные и сравнение с типовой (Ур.8; акцент «База данных»)
      что_проблема: [доработка без правила/дефицита (костыль), доработка дублирует типовой функционал, глубокая переработка блокирует обновления, недокументированные изменения, дефицит закрыт обходным решением/теневым ИТ мимо системы, заявлено
          ≠ фактически (правило без реализации)]
      норма_глубины: до доработки и закрываемого дефицита; гигиена — полный перечень дельты против типовой; глубоко — только доработки с подтверждённым ущербом (20/80)
      опора: методика р.6 (дефицит = зазор к эталону), р.3 (эталон как источник), Часть II Ур.8, р.5 (сверка), р.10 (канал → потолок статуса); каркас Ур.8
    инструкция: {дефолт: 'Сравни рабочую конфигурацию с типовой того же релиза. Эталон бери через KBP (роль доменная-структура) и зафиксируй источником природы «эталон» в SRC со ссылкой на KBP; в доработке заполни поле «Эталон» этой ссылкой —
        не описывай типовую функцию текстом. На каждое отличие заведи доработку: тип объекта, характер изменения, способ реализации, глубину разрыва (настройка → расширение → локальная правка → глубокая переработка). Опирайся приоритетно на цифровой
        след (отчёт сравнения конфигураций, список снятых с поддержки); назначение уточняй интервью ИТ. На каждую ответь «зачем»: привяжи к дефициту (GAP) и/или правилу (BR) / требованию (TB) — привязка мягкая, но доработку без обоснования помечай
        и заводи кандидата в HYP/PRB. Зеркально «заявлено, а в конфигурации нет» → отметка «Заявлено ≠ фактически» + кандидат «правило без реализации». Механизм автоматической роли свяжи с SR (Ур.10); привяжи к системе/версии (SYS, Ур.7). Числа
        не пиши значениями — заводи в VP и ссылайся; ущерб — в PRB/Эффекты. Каждая запись — со ссылкой на источник; факт без источника недействителен. Суди по методике kb-audit, р.3, р.5, р.6, р.10, Часть II Ур.8.', правка_пользователя: разрешена}
    целостность: [код доработки уникален и непуст; название непусто, перечисления — из словаря (для «способа реализации» — из словаря или явное «прочее»), у каждой доработки есть источник; факт без источника недействителен, «Система / версия»
        задана и указывает на существующую строку SYS, '«Эталон» задан, указывает на источник природы «эталон» с обязательной ссылкой на KBP', 'привязка «зачем» мягкая: нет ни GAP, ни BR, ни TB → не ERROR, а кандидат в проблему «доработка без
        обоснования»', в CR нет полей-флагов дефекта и «тип решения»; расхождение — фактурой (отметка «Заявлено ≠ фактически»), числовых объёмов в CR нет — только ссылки в VP (если заданы — существуют), 'нет висячих ссылок: SRC, SYS, GAP, BR,
        TB, SR, ORG, VP существуют, если заданы', 'двусторонность с SRC: источник существует и перечисляет эту доработку', 'двусторонность Ур.3 ↔ Ур.8: правило BR «реализовано доработкой» → доработка ссылается обратно; рассогласование = кандидат',
      полиморфная входящая ссылка HYP/PRB → CR проверяется по уровню = 8 на стороне источника ссылки, 'выводимые кандидаты («дублирует типовое», «без обоснования») не хранятся полем, а вычисляются сверкой', 'накопление: подтверждённый факт не
        перезаписывается; при конфликте перевешивает более надёжное (цифровой след > устное)']
    жизненный_цикл:
      ось: зрелость факта
      статусы: [гипотеза, цифровой след, интервью, согласовано]
      доказательная_зрелость: да
    проекция: [Отчёт об обследовании AS-IS (раздел Ур.8), Концепция TO-BE и дорожная карта (вход для оценки дельты), Протокол встречи]
    стык:
      даёт: перечень доработок против типовой с зазором к эталону; ссылку на закрываемый дефицит (GAP); привязку доработка ↔ правило (BR) / требование (TB); привязку к системе/версии (SYS), системным ролям (SR), владельцу (ORG); ссылки на объёмы
        (VP); фактуру дельты для кандидатов в проблемы (HYP/PRB) и для подбора целевых продуктов
      потребляет: ['SRC (провенанс + эталон, SRC-KB → KBP)', 'KBP (доменная БЗ структуры, роль доменная-структура)', 'kb-audit (логика р.3, р.5, р.6, р.10, Часть II Ур.8)', каркас Ур.8, VP, GAP, BR, TB, SR, SYS, ORG]
      зависит_от: [reg-facttables, reg-framework]
      где: spec/fact-tables/CR.md
  GAP:
    название: Функциональный дефицит
    группа: Факты по каркасу (AS-IS) → полоса ИТ, Уровень 8 (Объектная архитектура и доработки)
    тип: первичная
    уровень: 8
    покрытие_методикой: есть
    поля:
    - {имя: код дефицита, вид: текст, обяз: да, уникально: да}
    - {имя: нужная функция, вид: текст, обяз: да}
    - {имя: система, вид: ссылка, обяз: да, цель: SYS}
    - {имя: эталон (типовая функция), вид: текст, обяз: да}
    - {имя: источник-эталон, вид: ссылка, обяз: да, цель: SRC}
    - {имя: локатор в источнике, вид: текст, обяз: нет, смысл: 'фрагмент внутри источника (лист/раздел/строка/таймкод) — расширение Р-2 по фактам гейта Ф1: канал 1.1 пишет локатор во все таблицы с источником'}
    - имя: степень покрытия
      вид: перечисление
      обяз: да
      словарь: [покрыто типовой, покрыто частично, покрыто иначе (не подходит), не покрыто]
    - {имя: описание зазора, вид: текст, обяз: условно}
    - имя: чем закрыт сейчас
      вид: перечисление
      обяз: да
      словарь: [доработкой, обходным решением / теневым ИТ, не закрыт (функция отсутствует)]
    - {имя: закрывающая доработка, вид: ссылка, обяз: условно, цель: CR}
    - {имя: реализуемое правило/требование, вид: ссылка, обяз: нет, цель: BR}
    - {имя: происхождение потребности — уровень, вид: число, обяз: нет}
    - {имя: происхождение потребности — строка, вид: ссылка, обяз: нет, цель: <по-уровню>}
    - имя: влияние на обновляемость
      вид: перечисление
      обяз: нет
      словарь: [не мешает, усложняет обновление, блокирует обновление]
    - {имя: источник, вид: ссылка, обяз: да, цель: SRC}
    - имя: статус доказанности
      вид: перечисление
