# Типы источников (бронза). Архитектура зафиксирована; обработка — следующие шаги сборки.
# На каждый тип: канал · инструменты · инструкция (фокус для данных / сборка для встреч).

типы:
  - код: SRC-MAT
    название: "Документ заказчика"
    канал: "Документы"
    инструменты: "конвертеры форматов (см. адаптеры)"
    инструкция: "Полный текст в markdown + фокус-указатели по уровням каркаса. Контент не теряем."

  - код: SRC-REC
    название: "Запись встречи (видео/аудио)"
    канал: "Интервью"
    инструменты: "БИТ Ньютон (транскрибация: diarize, запасной движок v3), извлечение кадров (условно)"
    инструкция: "Транскрибировать → определить тип встречи → если демо систем, предложить извлечь кадры."

  - код: SRC-CFG
    название: "Срез конфигурации"
    канал: "База данных"
    инструменты: "парсер XML-выгрузки; вторично mcp-1c (метаданные)"
    инструкция: "Основной путь — XML-выгрузка (виден весь код → доработки). Разбор → инвентарь объектов."

  - код: SRC-DAT
    название: "Срез данных"
    канал: "База данных"
    инструменты: "1С-обработки выгрузки (основной путь); mcp-1c (если доступ разрешён)"
    инструкция: "По профилю сбора конфигурации → целевые агрегаты (справочники, документы, регистры, объёмы, доп. обработки/отчёты)."

  - код: SRC-LOG
    название: "Выписка журнала регистрации"
    канал: "База данных"
    инструменты: "экспорт журнала; mcp-1c get_event_log"
    инструкция: "Агрегаты: реальные активные пользователи, реально используемые объекты, активность по времени."

  - код: SRC-COM
    название: "Карточка компании (публичные источники)"
    канал: "Публичные"
    инструменты: "веб-поиск/ресёрч"
    инструкция: "По паспорту+материалам собрать публичные факты (юрлица, обороты, активы, холдинги, собственники, топ-менеджмент). Статус — гипотеза, провенанс — публичные данные."

  - код: SRC-WEB
    название: "Содержимое по ссылке (сайт / интернет-БЗ)"
    канал: "Ссылки"
    инструменты: "фетч страниц / выкачка"
    инструкция: "Содержимое ссылки → markdown; провенанс = ссылка; своя надёжность."
