# Адаптеры форматов → markdown. Принцип: готовые проверенные инструменты, контент не теряем.
# Тяжёлые — точечно (подключаются, когда такой формат появился).

группы:
  - { группа: "Офис-текст",   форматы: "docx, doc",                  инструмент: "конвертер документов" }
  - { группа: "Таблицы",      форматы: "xlsx, xls, xlsb, xlsm, mxl", инструмент: "конвертер таблиц (mxl — 1С-формат, особый)" }
  - { группа: "Презентации",  форматы: "pptx, ppt",                  инструмент: "конвертер презентаций" }
  - { группа: "Проект",       форматы: "mpp",                        инструмент: "навык mpp (MS Project)" }
  - { группа: "Диаграммы",    форматы: "vsdx, drawio",               инструмент: "парсер диаграмм (текст + структура)" }
  - { группа: "Данные",       форматы: "xml, json, dbf",             инструмент: "прямой разбор → таблицы/текст" }
  - { группа: "PDF",          форматы: "pdf (вкл. сканы)",           инструмент: "извлечение текста + OCR" }
  - { группа: "Изображения",  форматы: "jpeg, png и др.",            инструмент: "OCR + описание" }
