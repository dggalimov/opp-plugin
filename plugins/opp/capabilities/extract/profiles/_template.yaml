# Шаблон профиля сбора данных. Копируется на конфигурацию; правится в проекте.
конфигурация: "<название>"
база_знаний: "<kb-...-str>"     # привязка к доменной БЗ структуры
фокус: "<на чём акцент при сборе>"
собрать:
  справочники: "состав и число элементов ключевых; заполненность; сигналы дублей"
  документы: "типы и количество по периодам; проведённые/непроведённые"
  регистры_бухгалтерии: "обороты, число записей, используемые счета/субконто"
  регистры_накопления: "число записей, используемые измерения"
  регистры_сведений: "ключевые: курсы, настройки, связки"
  объёмы: "размер базы, число записей, период данных"
  доп_обработки_отчёты: true
