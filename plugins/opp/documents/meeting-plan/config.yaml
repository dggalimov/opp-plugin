# Конфиг проекции «План встреч» (doc-meeting-plan, спека 06-f-user-flow: полный план/факт встреч,
# пересборка секций из doc-meeting-plan спеки 06-e).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет как «План встреч» (проверяет sections_within_projection, тест test_render.py,
# 12-й блок ./opp verify). Одна таблица памяти = одна секция (правило спеки, симметрия render/split).
#
# Без параметра рендера: ./opp render meeting-plan --into <ws> [--docx]. Документ — полный
# план/факт встреч проекта (спека 06-f, фаза 3 «plan-meetings»): запланированные + проведённые +
# отменённые встречи, повестки к ним, открытые вопросы, которые предстоит закрыть. Навык
# планирования — skills/plan-meetings.
#
# Номера секций — «авто»: «Отменённые» скрывается целиком, когда отменённых встреч нет
# (обычный случай проекта) — фиксированная нумерация оставила бы дыру (3 → сразу 5.).
#
# Клиентский документ (спека 08 §8): без колонок «Код» — ссылки-колонки со смыслом для читателя
# («Встреча», «Участники», «Источники из встречи», «Из открытого вопроса») резолвятся в
# человеческое имя («резолв: да»), а не в код памяти.

документ:
  id: meeting-plan
  название: "План встреч"
  проекция: "План встреч"   # должна совпадать со строкой в проекции контракта
  титул: нет
  имя_файла: "План встреч"   # клиентское имя docx (спека 08 §8); статичное — документ без якоря

паспорт:
  заголовок: "План встреч"
  счётчики:
    - { таблица: MTG, подпись: "встреч в реестре" }
    - { таблица: OQ, подпись: "открытых вопросов" }

секции:
  - номер: авто
    заголовок: "Запланированные встречи"
    таблица: MTG
    ключ: "код встречи"
    сортировка: "дата планируемая"
    фильтр: { поле: "статус", значения: ["запланирована"] }
    колонки:
      - { поле: "тема", заголовок: "Тема" }
      - { поле: "тип встречи", заголовок: "Тип" }
      - { поле: "дата планируемая", заголовок: "Дата планируемая" }
      - { поле: "участники со стороны заказчика", заголовок: "Участники", резолв: да }
      - { поле: "способ проведения", заголовок: "Способ проведения" }
      - { поле: "вводные", заголовок: "Вводные" }

  - номер: авто
    заголовок: "Проведённые встречи"
    таблица: MTG
    ключ: "код встречи"
    сортировка: "дата фактическая"
    фильтр: { поле: "статус", значения: ["проведена"] }
    колонки:
      - { поле: "тема", заголовок: "Тема" }
      - { поле: "тип встречи", заголовок: "Тип" }
      - { поле: "дата фактическая", заголовок: "Дата фактическая" }
      - { поле: "участники со стороны заказчика", заголовок: "Участники", резолв: да }
      - { поле: "источники из встречи", заголовок: "Источники из встречи", резолв: да }

  - номер: авто
    заголовок: "Отменённые встречи"
    таблица: MTG
    ключ: "код встречи"
    сортировка: "дата планируемая"
    "скрывать пустую": да
    фильтр: { поле: "статус", значения: ["отменена"] }
    колонки:
      - { поле: "тема", заголовок: "Тема" }
      - { поле: "дата планируемая", заголовок: "Дата планируемая" }
      - { поле: "причина отмены", заголовок: "Причина отмены" }

  - номер: авто
    заголовок: "Повестки"
    таблица: AGD
    ключ: "код пункта"
    сортировка: "встреча"
    "скрывать пустую": да
    колонки:
      - { поле: "встреча", заголовок: "Встреча", резолв: да }
      - { поле: "порядок", заголовок: "№" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "происхождение-вопрос", заголовок: "Из открытого вопроса", резолв: да }

  - номер: авто
    заголовок: "Открытые вопросы к закрытию"
    таблица: OQ
    ключ: "код вопроса"
    сортировка: "дата постановки"
    "скрывать пустую": да
    фильтр: { поле: "статус закрытия", значения: ["открыт"] }
    колонки:
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "критичность", заголовок: "Критичность" }
      - { поле: "что нужно, чтобы закрыть", заголовок: "Что нужно, чтобы закрыть" }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через ./opp split."
