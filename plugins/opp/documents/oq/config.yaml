# Конфиг проекции «Реестр открытых вопросов» (doc-oq, спека 06-f-user-flow, фаза 5 «synthesis»,
# новый документ).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет как «Реестр открытых вопросов» (проверяет sections_within_projection, тест
# test_render.py, 12-й блок ./opp verify). Одна таблица памяти = одна секция (правило спеки,
# симметрия render/split).
#
# Без параметра рендера: ./opp render oq --into <ws> [--docx]. Документ — рабочий (не клиентский,
# спека 06-f «Граница») полный реестр открытых вопросов проекта: что ещё не закрыто и что уже
# закрыто с какой резолюцией. Рендерится вместе с ./opp export (фаза 5, синтез).
#
# «Открытые» = статус закрытия «открыт»/«в работе» (вопрос ещё не имеет ответа); «Закрытые» —
# обратный набор («закрыт ответом»/«закрыт допущением»/«снят (неактуален)») — обычно пуста на
# ранних фазах проекта, поэтому скрывается целиком, если строк нет.
#
# Клиентский рендер (спека 08 §8): без титульного листа («документ.титул: нет») и без колонок
# «Код» — сортировка секций переведена с кода на «дата постановки»/«дата закрытия».

документ:
  id: oq
  название: "Открытые вопросы"
  титул: нет
  имя_файла: "Открытые вопросы"   # клиентское имя docx (спека 08 §8); статичное — без якоря
  проекция: "Реестр открытых вопросов"   # должна совпадать со строкой в проекции контракта

паспорт:
  заголовок: "Открытые вопросы"
  счётчики:
    - { таблица: OQ, подпись: "вопросов в реестре" }

секции:
  - номер: авто
    заголовок: "Открытые"
    таблица: OQ
    ключ: "код вопроса"
    сортировка: "дата постановки"
    фильтр: { поле: "статус закрытия", значения: ["открыт", "в работе"] }
    колонки:
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "критичность", заголовок: "Критичность" }
      - { поле: "ответственный", заголовок: "Ответственный" }
      - { поле: "что нужно, чтобы закрыть", заголовок: "Что нужно, чтобы закрыть" }

  - номер: авто
    заголовок: "Закрытые"
    таблица: OQ
    ключ: "код вопроса"
    сортировка: "дата закрытия"
    "скрывать пустую": да
    фильтр: { поле: "статус закрытия", значения: ["закрыт ответом", "закрыт допущением", "снят (неактуален)"] }
    колонки:
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "резолюция", заголовок: "Резолюция" }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через ./opp split."
