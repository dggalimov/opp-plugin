# Конфиг проекции «Протокол аудита материалов» (doc-materials, спека 05-a-render).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет как «Протокол аудита материалов» (проверяет check-05, тест test_render.py).
# Одна таблица памяти = одна секция (правило спеки, симметрия render/split).

документ:
  id: materials
  название: "Протокол аудита материалов"
  проекция: "Протокол аудита материалов"   # должна совпадать со строкой в проекции контракта
  имя_файла: "Протокол аудита материалов"   # клиентское имя docx (спека 08 §8); статичное — без якоря

паспорт:
  заголовок: "Протокол аудита материалов"
  счётчики:               # выводимые счётчики по таблицам памяти (в шапку документа)
    - { таблица: SRC, подпись: "источников" }
    - { таблица: MAT, подпись: "материалов" }
    - { таблица: VP, подпись: "объёмных параметров" }
    - { таблица: OQ, подпись: "открытых вопросов" }

секции:
  - номер: "1"
    заголовок: "Перечень источников"
    таблица: SRC
    ключ: "код источника"
    сортировка: "код источника"
    колонки:
      - { поле: "код источника", заголовок: "Код" }
      - { поле: "название", заголовок: "Название" }
      - { поле: "тип канала", заголовок: "Тип канала" }
      - { поле: "дата", заголовок: "Дата" }
      - { поле: "способ получения", заголовок: "Способ получения" }
      - { поле: "природа доказательства", заголовок: "Природа доказательства" }
      - { поле: "надёжность", заголовок: "Надёжность", редактируемо: да }
      - { поле: "статус обработки", заголовок: "Статус" }

  - номер: "2"
    заголовок: "Материалы и статус разбора"
    таблица: MAT
    ключ: "код материала"
    сортировка: "код материала"
    колонки:
      - { поле: "код материала", заголовок: "Код" }
      - { поле: "название", заголовок: "Название" }
      - { поле: "тип материала", заголовок: "Тип" }
      - { поле: "формат", заголовок: "Формат" }
      - { поле: "канал поступления", заголовок: "Канал поступления" }
      - { поле: "статус разбора", заголовок: "Статус разбора", редактируемо: да }
      - { поле: "примечание", заголовок: "Примечание", редактируемо: да }

  - номер: "3"
    заголовок: "Количества (что материал утверждает числом)"
    таблица: VP
    ключ: "Код параметра"
    сортировка: "Код параметра"
    колонки:
      - { поле: "Код параметра", заголовок: "Код" }
      - { поле: "Показатель", заголовок: "Показатель" }
      - { поле: "Значение", заголовок: "Значение" }
      - { поле: "Единица", заголовок: "Единица" }
      - { поле: "источник", заголовок: "Источник + локатор" }
      - { поле: "локатор в источнике", заголовок: "Локатор" }

  - номер: "4"
    заголовок: "Белые пятна и запросы заказчику"
    таблица: OQ
    ключ: "код вопроса"
    сортировка: "код вопроса"
    колонки:
      - { поле: "код вопроса", заголовок: "Код" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "происхождение", заголовок: "Происхождение" }
      - { поле: "критичность", заголовок: "Критичность" }
      - { поле: "уровень каркаса", заголовок: "Уровень каркаса" }
      - { поле: "статус закрытия", заголовок: "Статус закрытия", редактируемо: да }
      - { поле: "резолюция", заголовок: "Резолюция", редактируемо: да }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через ./opp split."
