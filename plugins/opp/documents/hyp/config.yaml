# Конфиг проекции «Реестр гипотез» (doc-hyp, спека 06-f-user-flow, фаза 5 «synthesis», новый документ).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет как «Реестр гипотез» (проверяет sections_within_projection, тест test_render.py,
# 12-й блок ./opp verify). Одна таблица памяти = одна секция (правило спеки, симметрия render/split).
#
# Без параметра рендера: ./opp render hyp --into <ws> [--docx]. Документ — рабочий (не клиентский,
# спека 06-f «Граница») полный реестр гипотез проекта: что ещё перепроверяется и что уже решено
# (подтверждено/опровергнуто). Рендерится вместе с ./opp export (фаза 5, синтез).
#
# «Гипотезы в работе» = статус проверки «открыта»/«перепроверяется» (доказательная зрелость ещё
# не установлена); «Решённые» — обратный набор («подтверждена»/«опровергнута») — обычно пуста на
# ранних фазах проекта, поэтому скрывается целиком, если строк нет.

документ:
  id: hyp
  название: "Гипотезы"
  проекция: "Реестр гипотез"   # должна совпадать со строкой в проекции контракта

паспорт:
  заголовок: "Гипотезы"
  счётчики:
    - { таблица: HYP, подпись: "гипотез в реестре" }

секции:
  - номер: авто
    заголовок: "Гипотезы в работе"
    таблица: HYP
    ключ: "код гипотезы"
    сортировка: "код гипотезы"
    фильтр: { поле: "статус проверки", значения: ["открыта", "перепроверяется"] }
    колонки:
      - { поле: "код гипотезы", заголовок: "Код" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "статус проверки", заголовок: "Статус проверки" }
      - { поле: "подтверждающие источники", заголовок: "Подтверждающие источники" }

  - номер: авто
    заголовок: "Решённые"
    таблица: HYP
    ключ: "код гипотезы"
    сортировка: "код гипотезы"
    "скрывать пустую": да
    фильтр: { поле: "статус проверки", значения: ["подтверждена", "опровергнута"] }
    колонки:
      - { поле: "код гипотезы", заголовок: "Код" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "статус проверки", заголовок: "Статус проверки" }
      - { поле: "подтверждающие источники", заголовок: "Подтверждающие источники" }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через ./opp split."
