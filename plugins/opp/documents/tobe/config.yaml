# Конфиг проекции «Концепция TO-BE и дорожная карта» (doc-tobe, спека 06-d-solutions-tobe).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет для этой проекции (проверяет sections_within_projection, тест test_render.py, 12-й
# блок ./opp verify). У SOL/DEC/RM/COV контракт объявляет проекцию с уточнением в скобках
# («Концепция TO-BE и дорожная карта (раздел решений)» и т. п.) — это смысл раздела, не другой
# документ (см. engine._projection_matches: префикс-совпадение по "<проекция> (").
#
# Последний содержательный такт конвейера (методика р.9, спека 06-d): требования (TB) → решения
# (SOL) → целевая архитектура по уровням → дорожная карта (RM) → документ. Несущая структура —
# от решений вниз: паспорт → обоснование платформы → решения по уровням (целевая картина читается
# по уровню устранения) → дорожная карта волнами → матрица покрытия/белые пятна → провенанс.
# Никаких редактируемых колонок (как и у doc-asis) — правки идут через навыки/скилы, не ./opp split.

документ:
  id: tobe
  название: "Концепция TO-BE и дорожная карта"
  проекция: "Концепция TO-BE и дорожная карта"   # должна совпадать (точно или с «(...)») со строкой в проекции контракта

паспорт:
  заголовок: "Концепция TO-BE и дорожная карта"
  счётчики:
    - { таблица: SOL, подпись: "решений" }
    - { таблица: DEC, подпись: "заключений о выборе" }
    - { таблица: RM, подпись: "элементов дорожной карты" }
    - { таблица: TB, подпись: "бизнес-требований (для контекста)" }

секции:
  - номер: авто
    заголовок: "Обоснование выбора платформы"
    таблица: DEC
    ключ: "код заключения"
    сортировка: "код заключения"
    "скрывать пустую": да
    колонки:
      - { поле: "код заключения", заголовок: "Код" }
      - { поле: "предмет выбора", заголовок: "Предмет выбора" }
      - { поле: "область применения", заголовок: "Область применения" }
      - { поле: "обоснование", заголовок: "Обоснование" }
      - { поле: "компромиссы / цена выбора", заголовок: "Компромиссы / цена выбора" }
      - { поле: "отклонённые варианты — почему", заголовок: "Отклонённые варианты — почему" }
      - { поле: "статус решения", заголовок: "Статус" }

  - номер: авто
    заголовок: "Решения и целевая архитектура по уровням"
    таблица: SOL
    ключ: "код решения"
    сортировка: "уровень устранения"
    колонки:
      - { поле: "код решения", заголовок: "Код" }
      - { поле: "тип решения", заголовок: "Тип решения" }
      - { поле: "уровень устранения", заголовок: "Уровень устранения" }
      - { поле: "формулировка", заголовок: "Формулировка / описание образа" }
      - { поле: "целевой продукт", заголовок: "Продукт / способ" }
      - { поле: "закрываемое требование", заголовок: "Закрываемое требование" }
      - { поле: "устраняемая проблема", заголовок: "Устраняемая проблема" }

  - номер: авто
    заголовок: "Дорожная карта"
    таблица: RM
    ключ: "Код элемента карты"
    сортировка: "Волна (очередь)"
    колонки:
      - { поле: "Код элемента карты", заголовок: "Код" }
      - { поле: "Волна (очередь)", заголовок: "Волна" }
      - { поле: "Название", заголовок: "Название / содержание" }
      - { поле: "Реализуемые требования", заголовок: "Реализуемые требования" }
      - { поле: "Реализуемые решения", заголовок: "Реализуемые решения" }
      - { поле: "Зависит от (очерёдность)", заголовок: "Зависимости" }

  - номер: авто
    заголовок: "Матрица покрытия"
    таблица: COV
    ключ: "Код покрытия"
    сортировка: "Код покрытия"
    "скрывать пустую": да
    колонки:
      - { поле: "Код покрытия", заголовок: "Код" }
      - { поле: "Требование", заголовок: "Требование" }
      - { поле: "Сторона покрытия", заголовок: "Сторона покрытия" }
      - { поле: "Решение / продукт", заголовок: "Решение / продукт" }
      - { поле: "Способ покрытия", заголовок: "Способ покрытия" }
      - { поле: "Степень покрытия", заголовок: "Степень покрытия" }
      - { поле: "Обоснование покрытия", заголовок: "Обоснование" }
      - { поле: "Статус покрытия", заголовок: "Статус" }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через навыки solutions/target-architecture/roadmap (не ./opp split)."
