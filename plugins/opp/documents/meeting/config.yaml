# Конфиг проекции «Протокол встречи» (doc-meeting, спека 06-e-meetings-loop, пересборка).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет как «Протокол встречи» (проверяет sections_within_projection, тест test_render.py,
# 12-й блок ./opp verify). Одна таблица памяти = одна секция (правило спеки, симметрия render/split).
#
# Параметр рендера обязателен: ./opp render meeting --into <ws> --источник <SRC-код встречи>
# [--кадры <относительный/путь>] [--docx]. Плейсхолдер «{источник}» в значениях фильтров подставляется
# этим параметром; «{кадры}» в пути секции кадров — параметром --кадры (не задан → секция скрыта).
#
# Фильтр по источнику работает и на списочном значении поля строки: канал встреч кладёт вторые
# источники к уже известным фактам, write_rows сливает их в список (методика р.3, спека 06-b,
# п.3 «Второй источник — тем же кодом») — совпадение = «источник встречи ∈ список источников строки».
#
# Протокол типизирован по «тип встречи» (спека 06-e): секции с «когда» показываются только у своего
# типа встречи; общие секции — у всех. Тип берётся из ЯКОРНОЙ строки MTG, найденной движком по
# параметру «источник» (документ.якорь ниже) — деградация без якоря: условные секции скрыты, общие
# рендерятся как обычно (протокол не падает, а упрощается). Секция «Повестка и темы обсуждения»
# (AGD) не может отфильтроваться напрямую параметром «источник» (AGD ссылается на MTG кодом встречи,
# не кодом источника) — фильтр использует плейсхолдер «{якорь:код встречи}»: значение поля якорной
# строки MTG, а не параметра рендера (движок, спека 06-e п.2).
#
# Клиентский документ (спека 08 §8): без колонок «Код» — КРОМЕ секций 01/02/15/16, где колонка
# «Код» несёт редактируемые ячейки («Статус», «Участники», «Итог обсуждения», «Резолюция» и т. п.):
# split.py сопоставляет правленую строку с памятью по значению КЛЮЧЕВОЙ колонки, прочитанному из
# самой отрендеренной таблицы (`capabilities/render/split.py::split_document`, позиция колонки по
# «ключ» секции) — без видимого кода это сопоставление ломается (щель round-trip, не в этой правке:
# split.py не в объёме задачи). Секции 03–06/09–14 (справочные, без правок) — колонка «Код» убрана,
# сортировка переведена с кода на смысловое поле (название/показатель). Нумерация — двузначная
# (спека 08 §5).

документ:
  id: meeting
  название: "Протокол встречи"
  проекция: "Протокол встречи"   # должна совпадать со строкой в проекции контракта
  якорь: { таблица: MTG, поле: "источники из встречи" }   # условные секции «когда:» опираются на тип этой строки
  имя_файла: "Протокол встречи № {номер} — {якорь:тема}"   # клиентское имя docx (спека 08 §8)

паспорт:
  заголовок: "Протокол встречи"
  счётчики:
    - { таблица: MTG, подпись: "встреч" }
    - { таблица: OQ, подпись: "открытых вопросов и поручений" }
    - { таблица: HYP, подпись: "гипотез" }

секции:
  # --- общие секции (у всех типов встреч) --------------------------------------
  - номер: "01"
    заголовок: "Встреча"
    таблица: MTG
    ключ: "код встречи"
    сортировка: "код встречи"
    фильтр: { поле: "источники из встречи", значения: ["{источник}"] }
    колонки:
      - { поле: "код встречи", заголовок: "Код" }
      - { поле: "тема", заголовок: "Тема" }
      - { поле: "тип встречи", заголовок: "Тип" }
      - { поле: "статус", заголовок: "Статус", редактируемо: да }
      - { поле: "дата фактическая", заголовок: "Фактическая дата" }
      - { поле: "участники со стороны заказчика", заголовок: "Участники", редактируемо: да }
      - { поле: "способ проведения", заголовок: "Способ проведения" }
      - { поле: "вводные", заголовок: "Вводные" }

  - номер: "02"
    заголовок: "Повестка и темы обсуждения"
    таблица: AGD
    ключ: "код пункта"
    сортировка: "порядок"
    "скрывать пустую": да
    фильтр: { поле: "встреча", значения: ["{якорь:код встречи}"] }
    колонки:
      - { поле: "порядок", заголовок: "№" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "статус", заголовок: "Статус", редактируемо: да }
      - { поле: "итог обсуждения", заголовок: "Итог обсуждения", редактируемо: да }

  # --- когда: демо-систем -------------------------------------------------------
  - номер: "03"
    заголовок: "Система на встрече"
    таблица: SYS
    когда: { поле: "тип встречи", значения: ["демо-систем"] }
    ключ: "код системы"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Название" }
      - { поле: "назначение", заголовок: "Назначение" }
      - { поле: "версия платформы", заголовок: "Версия платформы" }
      - { поле: "релиз конфигурации", заголовок: "Релиз конфигурации" }
      - { поле: "владелец (бизнес)", заголовок: "Владелец" }
      - { поле: "статус эксплуатации", заголовок: "Статус" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "04"
    заголовок: "Доработки"
    таблица: CR
    когда: { поле: "тип встречи", значения: ["демо-систем"] }
    ключ: "код доработки"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "05"
    заголовок: "Функциональный дефицит"
    таблица: GAP
    когда: { поле: "тип встречи", значения: ["демо-систем"] }
    ключ: "код дефицита"
    сортировка: "нужная функция"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "нужная функция", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "06"
    заголовок: "Интеграции"
    таблица: INT
    когда: { поле: "тип встречи", значения: ["демо-систем"] }
    ключ: "код потока"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "07"
    заголовок: "Кадры демонстрации"
    тип: кадры
    когда: { поле: "тип встречи", значения: ["демо-систем"] }
    путь: "{кадры}"

  # --- когда: процессы-asis ------------------------------------------------------
  - номер: "08"
    заголовок: "Процессы"
    тип: процессы
    таблица: PRC
    когда: { поле: "тип встречи", значения: ["процессы-asis"] }
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }

  - номер: "09"
    заголовок: "Бизнес-правила"
    таблица: BR
    когда: { поле: "тип встречи", значения: ["процессы-asis"] }
    ключ: "код правила"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "10"
    заголовок: "Учётные модели"
    таблица: AM
    когда: { поле: "тип встречи", значения: ["процессы-asis"] }
    ключ: "код модели"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "11"
    заголовок: "НСИ и аналитики"
    таблица: NSI
    когда: { поле: "тип встречи", значения: ["процессы-asis"] }
    ключ: "Код НСИ"
    сортировка: "Название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "Название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "12"
    заголовок: "Количества"
    таблица: VP
    когда: { поле: "тип встречи", значения: ["процессы-asis"] }
    ключ: "Код параметра"
    сортировка: "Показатель"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "Показатель", заголовок: "Показатель" }
      - { поле: "Значение", заголовок: "Значение" }
      - { поле: "Единица", заголовок: "Единица" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  # --- когда: стейкхолдеры --------------------------------------------------------
  - номер: "13"
    заголовок: "Ценность (отчёты, метрики, решения)"
    таблица: REP
    когда: { поле: "тип встречи", значения: ["стейкхолдеры"] }
    ключ: "код элемента ценности"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  - номер: "14"
    заголовок: "Оргструктура"
    таблица: ORG
    когда: { поле: "тип встречи", значения: ["стейкхолдеры"] }
    ключ: "код орг.элемента"
    сортировка: "название"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "название", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }

  # --- общие секции (в конце, у всех типов) -----------------------------------
  - номер: "15"
    заголовок: "Расхождения и гипотезы"
    таблица: HYP
    ключ: "код гипотезы"
    сортировка: "код гипотезы"
    "скрывать пустую": да
    фильтр: { поле: "источник", значения: ["{источник}"] }
    колонки:
      - { поле: "код гипотезы", заголовок: "Код" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "локатор в источнике", заголовок: "Локатор в источнике" }
      - { поле: "статус проверки", заголовок: "Статус", редактируемо: да }

  - номер: "16"
    заголовок: "Открытые вопросы и поручения"
    таблица: OQ
    ключ: "код вопроса"
    сортировка: "код вопроса"
    "скрывать пустую": да
    фильтр: { поле: "источники расхождения", значения: ["{источник}"] }
    колонки:
      - { поле: "код вопроса", заголовок: "Код" }
      - { поле: "формулировка", заголовок: "Формулировка" }
      - { поле: "статус закрытия", заголовок: "Статус закрытия", редактируемо: да }
      - { поле: "резолюция", заголовок: "Резолюция", редактируемо: да }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через ./opp split."
