# Конфиг проекции «Повестка встречи» (doc-agenda, спека 06-e-meetings-loop, новый документ).
#
# Карта секций — производная от контракта таблиц фактов (`проекция:` в schema/fact-tables.yaml —
# единый источник); состав секций и колонок здесь обязан быть подмножеством того, что контракт
# объявляет как «Повестка встречи» (проверяет sections_within_projection, тест test_render.py,
# 12-й блок ./opp verify). Одна таблица памяти = одна секция (правило спеки, симметрия render/split).
#
# Параметр рендера обязателен: ./opp render agenda --into <ws> --встреча <код MTG> [--docx].
# Плейсхолдер «{встреча}» в значениях фильтров подставляется этим параметром. Документ — заказчику
# до встречи (встреча ещё не проведена, источника SRC у неё нет — фильтр по коду MTG напрямую,
# не через «источник», в отличие от протокола).

документ:
  id: agenda
  название: "Повестка встречи"
  проекция: "Повестка встречи"   # должна совпадать со строкой в проекции контракта

паспорт:
  заголовок: "Повестка встречи"

секции:
  - номер: "1"
    заголовок: "Встреча"
    таблица: MTG
    ключ: "код встречи"
    сортировка: "код встречи"
    фильтр: { поле: "код встречи", значения: ["{встреча}"] }
    колонки:
      - { поле: "код встречи", заголовок: "Код" }
      - { поле: "тема", заголовок: "Тема" }
      - { поле: "тип встречи", заголовок: "Тип" }
      - { поле: "дата планируемая", заголовок: "Дата планируемая" }
      - { поле: "участники со стороны заказчика", заголовок: "Участники" }
      - { поле: "способ проведения", заголовок: "Способ проведения" }
      - { поле: "вводные", заголовок: "Вводные" }

  - номер: "2"
    заголовок: "Пункты повестки"
    таблица: AGD
    ключ: "код пункта"
    сортировка: "порядок"
    фильтр: { поле: "встреча", значения: ["{встреча}"] }
    колонки:
      - { поле: "порядок", заголовок: "№" }
      - { поле: "формулировка", заголовок: "Формулировка" }

подпись: "Собрано из памяти проекта; строк: {N}; правки — через ./opp split."
