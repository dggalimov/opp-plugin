# Конфиг проекции «Отчёт об обследовании AS-IS» — версия 6 (профессиональная пересборка,
# замечание владельца 06.07: документ уровня большой четвёрки, пирамида «вывод → детали»).
# ТЕЛО (укрупнённо, читается топ-менеджером) + ПРИЛОЖЕНИЯ (детальные реестры для команды).
# Договорное содержание: процессы · учётные модели · системы+интеграции · оргструктура ·
# проблемы · решения · требования — всё раскрыто, но перекомпоновано по altitude.

документ:
  id: asis
  название: "Отчёт об обследовании AS-IS"
  проекция: "Отчёт об обследовании AS-IS"
  имя_файла: "Отчёт об обследовании AS-IS"   # клиентское имя docx (спека 08 §8); статичное — без якоря

паспорт:
  заголовок: "Отчёт об обследовании AS-IS"

секции:
  # --- ТЕЛО ---
  - { номер: авто, заголовок: "Управленческое резюме", тип: текст, файл: "нарратив/asis/v6-01-резюме.md" }
  - { номер: авто, заголовок: "О проекте и подходе к обследованию", тип: текст, файл: "нарратив/asis/v6-02-о-проекте.md" }
  - { номер: авто, заголовок: "Учётная модель предприятия (AS-IS)", тип: текст, файл: "нарратив/asis/v6-03-учёт.md" }
  - { номер: авто, заголовок: "Бизнес-процессы (AS-IS)", тип: текст, файл: "нарратив/asis/v6-04-процессы.md" }
  - { номер: авто, заголовок: "Системный ландшафт и интеграции (AS-IS)", тип: текст, файл: "нарратив/asis/v6-05-системы.md" }
  - { номер: авто, заголовок: "Организационная структура (AS-IS)", тип: текст, файл: "нарратив/asis/v6-06-организация.md" }
  - { номер: авто, заголовок: "Выявленные проблемы и их бизнес-эффект", тип: текст, файл: "нарратив/asis/v5-04-проблемы.md" }
  - { номер: авто, заголовок: "Целевые решения", тип: текст, файл: "нарратив/asis/v6-08-решения.md" }
  - { номер: авто, заголовок: "Бизнес-требования", тип: текст, файл: "нарратив/asis/v6-09-требования.md" }
  # --- ПРИЛОЖЕНИЯ (без сквозной цифры; заголовок несёт литеру) ---
  - { заголовок: "Приложение А. Паспорта учётных моделей", тип: текст, файл: "нарратив/asis/v5-01-учётные-модели.md" }
  - { заголовок: "Приложение Б. Детальная карта процессов и операций", тип: текст, файл: "нарратив/asis/v5-02-процессы.md" }
  - { заголовок: "Приложение В. Реестры систем, интеграционных потоков и оргструктуры", тип: текст, файл: "нарратив/asis/v5-03-организация-системы-потоки.md" }
  - { заголовок: "Приложение Г. Источники и методология обследования", тип: текст, файл: "нарратив/asis/v6-13-источники.md" }

подпись: "Отчёт подготовлен по результатам обследования; детерминированная проекция зафиксированных фактов. Приложения содержат полные реестры и трассировку."
