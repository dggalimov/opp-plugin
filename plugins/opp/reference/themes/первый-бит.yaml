# Тема оформления по умолчанию — «Первый Бит».
# Стиль как данные: используется и для документов, и для оформления окна.
# Можно править прямо в окне (раздел «Оформление») или скопировать и сделать тему под заказчика.

id: первый-бит
название: "Первый Бит"

палитра:
  акцент: "E4007E"        # ярко-розовый / маджента — заголовки-акценты, подзаголовки, активные элементы
  вторичный: "12A5A5"     # бирюзовый (для таблиц); точного кода в стиле нет — близкий
  текст: "1A1A1A"         # чёрный — основной текст
  фон: "FFFFFF"           # белый — основной фон
  фон_блока: "F4F4F4"     # светло-серый — разделение блоков

типографика:
  шрифт: "Arial, Helvetica, sans-serif"   # беззасечный современный
  заголовок: { цвет: "1A1A1A", жирный: true }
  подзаголовок: { цвет: "E4007E" }

страница:
  ориентация: "альбомная"
  размер: "A4"
  поля_мм: { лево: 15, право: 15, верх: 14, низ: 14 }

бренд:
  организация: "Первый Бит"
  слоган: "первыми — делают люди!"
  сайт: "1bit.ru"
  логотип: null
