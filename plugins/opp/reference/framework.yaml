# Каркас OPP — 11 уровней (общая «линза»).
# Это источник истины. Человекочитаемое описание framework.md генерируется из этого файла —
# руками framework.md не правят, правят этот файл.

оси:
  уровень_каркаса:
    диапазон: [1, 11]
    смысл: "на каком слое находится факт"
  глубина_процесса:
    диапазон: [1, 4]
    смысл: "функция → процесс → подпроцесс → операция; только внутри уровня 5 (Процессы)"

полосы:
  - { код: "Бизнес", уровни: [1, 2, 3, 4, 5, 6] }
  - { код: "ИТ", уровни: [7, 8, 9, 10, 11] }

уровни:
  - номер: 1
    полоса: "Бизнес"
    название: "Ценность"
    что_в_нём: "В основе отчёты, за ними метрики и факты, по которым принимают решения. Метрика оправдана, только если за ней стоит решение (или она нужна для расчёта другой метрики). У каждого отчёта/метрики есть пользователь. Здесь фиксируется горизонт принятия решений (≠ горизонт планирования Ур.3)."
    что_выясняем: "Какие решения и какими отчётами/метриками обеспечены; кто пользователь и отражён ли он в оргструктуре; какие факты в основе и в каком процессе рождаются; какой моделью (Ур.2) и правилом (Ур.3) считается; в какой системе формируется отчёт."
    дефекты: "Метрика без решения; решение без метрики (решают вслепую); отчёт без пользователя; считаем не то; пользователь не отражён в оргструктуре."
    перекрёстные_сверки: "Ур.2 метрика↔модель; Ур.3 правило+горизонт; Ур.4 разрезы есть в НСИ; Ур.5 факт рождается в процессе; Ур.6 пользователь есть в оргструктуре; Ур.7 место отчёта; Ур.9 отчёт и модель в разных системах → транзакционная интеграция."
    акцент_источника: ["Люди", "Документы"]

  - номер: 2
    полоса: "Бизнес"
    название: "Учётные модели"
    что_в_нём: "Контуры учёта (бухгалтерский, управленческий, бюджетный) и операционные модели (продажи, закупки, склад, производство) с измерениями и фактами. Модели порождают метрики Ур.1; есть методолог/владелец. Без метрики на выходе модель избыточна."
    что_выясняем: "Какие контуры и модели есть, их измерения и факты; как стыкуются (синтетика↔операционка, контуры между собой); какие метрики порождают; где живут (Ур.7)."
    дефекты: "Нет нужного контура; синтетика ≠ операционка; контуры не сходятся (упр≠бух≠бюджет); модель есть, а метрики нет."
    перекрёстные_сверки: "Ур.1 покрывает метрики; Ур.3 алгоритмы соответствуют модели; Ур.4 измерения обеспечены справочниками; Ур.7 где живёт (иначе интеграция Ур.9)."
    акцент_источника: ["Документы", "База данных"]

  - номер: 3
    полоса: "Бизнес"
    название: "Бизнес-правила"
    что_в_нём: "Алгоритмы работы моделей: распределения, элиминации, методы оценки, учётные политики, горизонт и периодичность планирования (≠ горизонт решений Ур.1). Есть владелец-методолог. Правило, не влияющее на метрику, не нужно."
    что_выясняем: "По каким алгоритмам считают; горизонт планирования и покрывает ли горизонт решений; зафиксированы ли политики и совпадают ли с реальным расчётом системы (типовая логика и доработки); кто владелец."
    дефекты: "Неверные алгоритмы; политика не зафиксирована; политика ≠ фактический расчёт в системе; горизонт планирования не покрывает горизонт решений."
    перекрёстные_сверки: "Ур.2 правило соответствует модели; Ур.1 даёт нужную метрику+горизонт; Ур.7 политика vs типовая логика; Ур.8 если в доработке — отражено в архитектуре."
    акцент_источника: ["Документы", "База данных"]

  - номер: 4
    полоса: "Бизнес"
    название: "НСИ / аналитики"
    что_в_нём: "Справочники и разрезы (план счетов, статьи, номенклатура, контрагенты, ЦФО). Разрез нужен, только если требует отчёт Ур.1; у справочника есть владелец и мастер-система (источник истины, вход на Ур.9). Теневое ИТ — обобщающее название (Excel/Word/заметки/почта/мессенджеры) вне системного контура."
    что_выясняем: "Какие справочники/разрезы и кто владелец; что мастер-система каждого; нормализована/гармонизирована ли НСИ между системами; в каком процессе ведётся и не в теневом ли ИТ."
    дефекты: "Грязь/дубли; нет владельца; нет нужного разреза или есть лишний; нет нормализации/гармонизации НСИ между системами; ведение НСИ в теневом ИТ."
    перекрёстные_сверки: "Ур.1 у разреза есть отчёт-потребитель; Ур.2 измерения покрыты; Ур.5 есть процесс ведения; Ур.6 владелец есть как роль; Ур.7 мастер-система в ландшафте; Ур.9 мастер-система НСИ отдельно → интеграция НСИ; Ур.10 какая системная роль вправе менять справочник (неавторизованное/автоматическое изменение = проблема)."
    акцент_источника: ["База данных", "Документы"]

  - номер: 5
    полоса: "Бизнес"
    название: "Процессы"
    что_в_нём: "Как факты рождаются и движутся. Строим сверху вниз в периметре (паспорт): функция (гл.1; владельцы — департаменты/отделы) → процесс (гл.2; отделы/группы) → подпроцесс (гл.3) → операция (гл.4). На аудите видим бизнес-процессы целостно, не только системные; проверяем на комплексность."
    что_выясняем: "Полную декомпозицию функция→процесс→подпроцесс→операция, на каждом уровне — обязательные атрибуты (владелец · вход · действие · выход · система); симметричного владельца каждого уровня процесса в оргструктуре (Ур.6); где факты рождаются и движутся; в какой системе каждая операция (гл.4); сквозную целостность (от начала до конца); нестыковки → открытые вопросы и гипотезы."
    дефекты: "Описан скудно/не проверен на комплексность; дублирование функций; отсутствие функции в процессе; конвейер рвётся; нет контроля; трудоёмкость; поздняя фиксация факта."
    перекрёстные_сверки: "Ур.6 все роли/владельцы шагов есть в оргструктуре (смотрим совместно); Ур.7 система каждой операции в ландшафте; Ур.9 межсистемные действия → интеграция; Ур.4 ведёт/потребляет заявленную НСИ; Ур.1 обеспечивает факты для метрик."
    акцент_источника: ["Люди", "Документы", "База данных"]

  - номер: 6
    полоса: "Бизнес"
    название: "Оргструктура"
    что_в_нём: "Кто исполняет и владеет: направления/департаменты/роли, ЦФО, матрица ответственности, разделение полномочий. Смотреть совместно с процессами — отражает все роли/владельцев из Ур.5 и всех пользователей отчётов Ур.1. Роль без процесса/решения не нужна."
    что_выясняем: "Направления/отделы/роли, ЦФО, матрицу ответственности; кто владелец процесса и результата; все ли роли из процессов и пользователи отчётов отражены; зеркало админструктуры и финструктуры (каждая орг.единица привязана к ЦФО — ЦИ/ЦП/ЦМД/ЦЗ); разделение полномочий по ролям инициатор/контролёр/согласующий/владелец."
    дефекты: "Размыта ответственность; нет владельца; конфликт полномочий (нарушено разделение); незаменимый сотрудник; расход без ответственного ЦФО; админструктура не совпадает с финансовой."
    перекрёстные_сверки: "Ур.5 роли/владельцы из процессов есть здесь (общие проблемы); Ур.1 пользователи отчётов есть здесь; Ур.4 владелец справочника есть как роль; Ур.10 человеческие системные роли ↔ оргструктура и разделение полномочий (в т.ч. ограничение на уровне строк — RLS)."
    акцент_источника: ["Документы", "Люди"]

  - номер: 7
    полоса: "ИТ"
    название: "Системы"
    что_в_нём: "ПО и учётные ядра ландшафта, версии/релизы, объёмы данных. За системой назначение — где формируются отчёты, живут модели и НСИ, выполняются операции. Объёмы — вход в Ур.11. Система без бизнес-нагрузки не нужна."
    что_выясняем: "Какое ПО и ядра, версии/релизы, объёмы; где формируется каждый отчёт; где живёт каждая модель и НСИ; в каких системах операции процессов (гл.4)."
    дефекты: "Зоопарк систем; нет единого учётного ядра; устаревшие версии; система без бизнес-нагрузки."
    перекрёстные_сверки: "Ур.1 место отчётов; Ур.2 где живут модели; Ур.3 типовая логика vs учётная политика; Ур.4 мастер-системы НСИ; Ур.5 системы операций гл.4; Ур.8 доработки привязаны к системе/версии; Ур.11 стоит на инфраструктуре, мощность под объёмы."
    акцент_источника: ["База данных", "Люди"]

  - номер: 8
    полоса: "ИТ"
    название: "Объектная архитектура и доработки"
    что_в_нём: "Что изменено против типовой конфигурации: отчёты, регистры, документы, обработки, регламентные задания. Сравнение с типовой выявляет доработки (что добавлено/изменено) и функциональный дефицит — нехватку функций типовой под потребности бизнеса, которую закрывают доработками или обходными решениями. За доработкой стоит правило/требование (зачем) и владелец/автор. Регламентные задания/обработки часто — механизм исполнения системных ролей Ур.10."
    что_выясняем: "Что изменено против типовой и какой функциональный дефицит это закрывает; какое правило Ур.3/требование реализует доработка; какие задания/обработки реализуют системные роли Ур.10; документированы ли изменения; кто владелец."
    дефекты: "Костыли; глубокий разрыв с типовой (блокирует обновления); доработки дублируют типовой функционал; недокументированные изменения; функциональный дефицит закрыт обходным решением/теневым ИТ вместо системы."
    перекрёстные_сверки: "Ур.3 доработка реализует заявленное правило (правило без реализации или доработка без правила = проблема); Ур.1 доработанные отчёты ↔ метрики; Ур.7 привязаны к системе/версии; Ур.10 механизм автоматической роли (регламентное задание/обработка/робот) — объект архитектуры."
    акцент_источника: ["База данных"]

  - номер: 9
    полоса: "ИТ"
    название: "Интеграции"
    что_в_нём: "Потоки источник→приёмник: способ, регулярность, состав. Делятся на интеграцию НСИ и интеграцию транзакционной информации. За интеграцией — связать разнесённые по системам модели/НСИ/отчёты; есть владелец, и обмен идёт под своей системной ролью/учётной записью. Проверяется на комплексность."
    что_выясняем: "Какие потоки (способ/регулярность/состав); деление на НСИ и транзакционную; где нужна по комплексности (межсистемные действия; модель и отчёт в разных системах; мастер-система НСИ отдельно); сходятся ли данные; под какой ролью идёт обмен; обеспечены ли каналы (Ур.11)."
    дефекты: "Данные не сходятся; ручной перенос; нет нужного обмена (межсистемный разрыв без интеграции); ненадёжный обмен; обмен «под админом» / без своей роли."
    перекрёстные_сверки: "Ур.5 межсистемные действия процесса; Ур.2+Ур.1 модель и отчёт в разных системах → транзакционная интеграция; Ур.4 мастер-система НСИ отдельно → интеграция НСИ; Ур.7 концы — реальные системы; Ур.10 у интеграции своя системная роль/учётная запись; Ур.11 канал обеспечен сетью/надёжностью."
    акцент_источника: ["Люди", "База данных", "Документы"]

  - номер: 10
    полоса: "ИТ"
    название: "Системные роли"
    что_в_нём: "Роль (учётная запись) в системе с правами, под которой выполняются действия. Исполнитель — человек (пользователь) или не-человек (автоматический алгоритм/регламентное задание, интеграция, программный робот (RPA), ИИ-сервис). За ролью стоит функция/шаг процесса и владелец; права соответствуют функции и ограничены (вплоть до уровня строк — RLS). Роль без назначения и владельца — теневой доступ."
    что_выясняем: "Какие роли есть в системах и какие у них права; кто/что действует под каждой (человек или автомат); какой шаг процесса (Ур.5) и какие объекты НСИ (Ур.4) затрагивает; соответствуют ли права функции; ограничен ли доступ оргструктурой/функцией (в т.ч. на уровне строк); есть ли владелец; для автоматических — есть ли механизм-исполнитель в архитектуре (Ур.8) и ресурс исполнения (Ур.11)."
    дефекты: "Действие под общей/чужой/избыточной ролью; права шире функции; интеграция или робот работают «под админом» / без своей роли; человеческая роль не соответствует оргструктуре (конфликт полномочий); теневая автоматизация без владельца; нет ограничения доступа при заявленном требовании; роль без назначения."
    перекрёстные_сверки: "Ур.6 человеческие роли ↔ оргструктура и разделение полномочий; Ур.5 права ↔ операции, которые роль исполняет; Ур.4 кто вправе менять справочники; Ур.9 у каждой интеграции своя роль/учётная запись; Ур.8 механизм автоматической роли — объект архитектуры; Ур.11 ресурс исполнения."
    акцент_источника: ["База данных", "Люди"]

  - номер: 11
    полоса: "ИТ"
    название: "Инфраструктура"
    что_в_нём: "Платформа (ОС, СУБД, кластер 1С, серверы), железо, сеть, резервирование. За инфраструктурой — производительность и непрерывность систем; у узла есть владелец-администратор. Инфраструктура без систем избыточна."
    что_выясняем: "Платформа (ОС, СУБД, кластер 1С, серверы), железо, сеть, каналы; схема резервирования/восстановления; достаточность мощности под объёмы (Ур.7); обеспеченность каналов (Ур.9); ресурс исполнения ролей (Ур.10); кто администрирует."
    дефекты: "Нет производительности (не держит объёмы); нет резервирования (риск потери данных/простоя); устаревшая платформа."
    перекрёстные_сверки: "Ур.7 несёт системы, мощность под объёмы; Ур.9 каналы обеспечены сетью/надёжностью; Ур.10 ресурс исполнения ролей."
    акцент_источника: ["Документы", "Люди"]
