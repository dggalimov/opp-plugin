# Глоссарий принятых терминов OPP. Держим эти формулировки по всему продукту.
# Генерируется в описание каркаса и показывается в окне.

термины:
  - термин: "Функциональный дефицит"
    определение: "Нехватка функций типовой конфигурации под потребности бизнеса; порождает доработки, обходные решения и теневое ИТ. Диагностический выход уровня 8."
  - термин: "Теневое ИТ"
    определение: "Обобщающее название прикладных инструментов вне системного контура: Excel, Word, заметки, почта, мессенджеры."
  - термин: "Мастер-система"
    определение: "Система, признанная источником истины для конкретного справочника НСИ."
  - термин: "Системная роль"
    определение: "Роль (учётная запись) внутри системы с набором прав, под которой выполняются действия. Исполнитель — человек (пользователь) или не-человек (автоматический алгоритм, регламентное задание, интеграция, программный робот, ИИ-сервис)."
  - термин: "Теневая автоматизация"
    определение: "Автоматическая системная роль (робот/скрипт/задание), работающая без владельца и контроля или с избыточными правами."
  - термин: "Ограничение доступа на уровне строк (RLS)"
    определение: "Сужение прав роли до части данных по оргструктуре/функции (например аналитик видит только свой ЦФО)."
  - термин: "Программный робот (RPA)"
    определение: "Автоматический исполнитель действий в системах вместо человека; разновидность системной роли."
  - термин: "ЦФО"
    определение: "Центр финансовой ответственности — единица оргструктуры, отвечающая за свои финансовые показатели."
  - термин: "Перекрёстная сверка"
    определение: "Проверка стыковки уровня каркаса с другими уровнями; расхождение = проблема / гипотеза / открытый вопрос."
  - термин: "Уровень каркаса (1–11)"
    определение: "На каком слое находится факт. Не путать с глубиной процесса."
  - термин: "Глубина процесса (1–4)"
    определение: "Детализация внутри уровня 5 (Процессы): функция → процесс → подпроцесс → операция."
