# Способы сборки баз знаний по типам: инструмент · инструкция (что дать/сказать/попросить) · артефакт.
# Используется навыком «собрать базу знаний». Тяжёлые бэкенды (индексная/семантическая) обслуживает
# MCP opp-knowledge (разрабатывается параллельно).

типы:
  - тип: индексная
    инструмент: "Парсер XML-выгрузки + метаданных (бэкенд MCP opp-knowledge)"
    инструкция: "Дать XML-выгрузку типовой конфигурации 1С (Configuration.xml + метаданные), указать продукт и релиз. OPP построит индекс объектов для точного поиска и сравнения с конфигурацией заказчика."
    артефакт: "knowledge/bases/<id>/ — индекс объектов"

  - тип: семантическая
    инструмент: "Извлечение текста → разбиение → индекс (бэкенд MCP opp-knowledge)"
    инструкция: "Дать тексты файлами или ссылкой (выгрузка ИТС, публичные доки, методички, архив). OPP разобьёт и проиндексирует для смыслового поиска."
    артефакт: "knowledge/bases/<id>/ — индекс пассажей"

  - тип: плоская
    инструмент: "Прямое чтение markdown"
    инструкция: "Набор *.md, держится в контексте ЦЕЛИКОМ (мягкий потолок ~25–30 КБ; больше — пересмотреть тип на семантическую). Два режима: (1) дан готовый текст — положить в базу; (2) канон-методика (роль «методическая») — авторская сборка: скелет → бенчмарк практик → наполнение по разделам → построчное ревью владельцем → статус «готова»."
    артефакт: "knowledge/bases/<id>/*.md (склейка по именам)"

  - тип: шаблоны
    инструмент: "Реестр образцов"
    инструкция: "Дать файлы-эталоны (ДС, СМ, отчёты, отраслевые каркасы). OPP сложит их как образцы для сборки."
    артефакт: "knowledge/bases/<id>/ — файлы-образцы"

  - тип: навигатор
    инструмент: "Каталог описаний"
    инструкция: "Дать верхнеуровневые описания продуктов (что/для кого/блоки/уровни). OPP соберёт каталог для идентификации продукта заказчика."
    артефакт: "knowledge/bases/<id>/*.md"
