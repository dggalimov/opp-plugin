# kb-bf-met — дескриптор источника (машинный). Формат — по контракту маршрутизации T-03-69
# (согласовано OPP 00, 30.06): плоские поля «бэкенд/endpoint/collection/token_env», которые читает
# внешний-RAG бэкенд MCP (opp-knowledge: backends/source_config.py + external_rag.py).
# Локального корпуса (chunks.jsonl) НЕТ: база отвечает через внешний RAG, репозиторий не пухнет.
# Подключение проверено вживую 02.07.2026 (аудит): эндпоинт отвечает, схема ответа подтверждена.

бэкенд: external-rag           # словарь контракта: external-rag | local-bm25
домен: "БИТ.Финанс"

endpoint: "https://rag.1bitai.ru"                       # база URL; бэкенд строит /api/v1/collections/{collection}/query
collection: "c5029ab6-c5dc-4de2-8462-7406ad5d4e81"      # руководство пользователя БИТ.Финанс (1677 чанков — живой прогон 02.07.2026)
token_env: "OPP_RAG_1BITAI_TOKEN"                       # имя env-переменной; бэкенд подтягивает и из ~/.config/opp/secrets.env

# Токен доступа. Владелец объявил данные подключения несекретными (02.07.2026) и разрешил хранить в репо.
# Приоритет у бэкенда: os.environ[token_env] (уже заведён в secrets.env); это поле — справочная копия.
токен: "8633ab21-9e84-4582-bec7-bb1a47e5fb46"

запрос:                        # формат тела POST (по тикету БП-Корп + живой прогон)
  обязательные: { query: "<текст запроса>" }
  опциональные: { top_k: 5, temperature: 0.1, reranker: { name: litellm, params: { top_n: 5 } } }

ответ:                         # схема подтверждена живым прогоном 02.07.2026
  пассажи_из: "context_docs"          # массив; поле result = null (это РЕТРИВЕР, генерации нет)
  маппинг_пассажа:                     # context_docs[i] → пассаж kb_query
    текст: "content"
    файл: "metadata.original_filename" # фактически «result_json.txt» (техимя выгрузки) — для провенанса НЕ информативно
    чанк: "metadata.chunk_index"
    оценка: "metadata.score"          # ВНИМАНИЕ: score в metadata, НЕ на верхнем уровне пассажа
  генерация: нет                       # kb_query отдаёт пассажи, НЕ сгенерированный ответ
  пусто_значит: "ошибка-данные «не найдено» (НЕ выдумывать)"

провенанс_наружу: "руководство пользователя БИТ.Финанс (PDF) · чанк <N>"
