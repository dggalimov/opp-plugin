# kb-bf-met — тест-вопросы для приёмки базы (БИТ.Финанс — методика, внешний RAG).
# Назначение: прогнать после подъёма внешнего-RAG бэкенда MCP (OPP 02) → kb_query("kb-bf-met", вопрос).
# Зелёный = вернулись пассажи с ожидаемыми маркерами и провенансом (файл · чанк), без выдумок.
# Колонка «проверено_на_rag» — прямой прогон на rag.1bitai.ru (01.07.2026, top_k=3, ретривер; result=null).

набор:
  - id: BF-Q1
    тема: бюджетирование
    вопрос: "Как в БИТ.Финанс устроено бюджетирование: статьи оборотов и сценарии?"
    ожидаемые_маркеры: ["статьи оборотов", "сценари", "регламентированн"]
    проверено_на_rag: "OK — «Соответствие статей оборотов и статей регл. учёта» (чанк 239), «Планирование зависимых статей оборотов» (чанк 206), score ~0.5"

  - id: BF-Q2
    тема: казначейство
    вопрос: "Документ «Заявка на расходование денежных средств» — назначение и заполнение"
    ожидаемые_маркеры: ["Заявка на расходование", "планировани", "списани"]
    проверено_на_rag: "OK — «Документ «Заявка на расходование денежных средств»» (чанк 311), score 1.0"

  - id: BF-Q3
    тема: казначейство
    вопрос: "Отчёт «Платёжный календарь»: график поступлений и платежей"
    ожидаемые_маркеры: ["Платежный календарь", "график", "поступлени", "платеж"]
    проверено_на_rag: "OK (контрольная проверка 02.07, через kb_query с порогом 0.5) — чанк 347, score 1.0.
      Вопрос переформулирован по правилам query-mapping (точное название + якорь): старая формулировка
      «что показывает и как формируется» стала стабильно давать score ≤0.5 (утром 01.07 было 0.75 —
      скоры внешнего ретривера плавают между днями) и отсекалась порогом → ложное «не найдено»."

  - id: BF-Q4
    тема: управленческий-учёт-МСФО
    вопрос: "Механизм трансляции и параллельный учёт по МСФО в БИТ.Финанс"
    ожидаемые_маркеры: ["трансляц", "параллельн", "МСФО"]
    проверено_на_rag: "OK (аудит 02.07.2026, top_k=3) — маркеры 3/3, top score 0.67, чанк 49"

  - id: BF-Q5
    тема: управление-договорами
    вопрос: "Контроль суммы договора и дополнительные условия по договору"
    ожидаемые_маркеры: ["Дополнительные условия по договору", "сумм", "договор"]
    проверено_на_rag: "OK (попутно в BF-Q2) — «Превышение общей суммы договора доп. условиями» (чанк 360)"

  - id: BF-Q6
    тема: консолидация
    вопрос: "Сверка внутригрупповых оборотов при консолидации"
    ожидаемые_маркеры: ["внутригрупп", "консолидац", "сверк"]
    проверено_на_rag: "OK (аудит 02.07.2026, top_k=3) — маркеры 3/3, top score 0.83, чанк 205"

негативный_тест:
  - id: BF-N1
    вопрос: "Расчёт зарплаты и кадровый учёт"   # НЕ домен БИТ.Финанс (это ЗУП)
    ожидание: "мало/нерелевантно → ошибка-данные «не найдено», НЕ выдумывать (доказуемость)"
    проверено_на_rag: "аудит 02.07.2026: ретривер ВСЕГДА отдаёт top_k пассажей (здесь scores 0.33–0.5, косвенно
      связанные) — «не найдено» само не случится; бэкенду нужен порог по score (решение за OPP 02, стык T-03-69)"
