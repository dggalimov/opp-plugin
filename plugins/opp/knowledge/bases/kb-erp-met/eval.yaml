# kb-erp-met — эталон для пилота векторного поиска (T-03-72, cap-vec-pilot).
# Назначение: сравнение архитектур поиска (BM25 · гибрид с эмбеддингами · перечанковка · внешний RAG)
# на одном наборе вопросов. Метрики: Recall@5 и MRR@5 — попадание любой допустимой статьи в топ-5 выдачи.
#
# Типы вопросов:
#   перефраз — обычными словами, лексика НЕ совпадает с формулировками ИТС (здесь должна выигрывать семантика);
#   термин   — терминологичная формулировка (сильная сторона BM25; проверка «не сломали то, что работало»).
#
# «эталон» — канонические id статей ИТС (<NNNNN> из поля «источник» чанка). Копии-дубли статьи
# (дефект корпуса: оглавление ссылается якорями в одни страницы, содержимое совпадает)
# приравниваются к канону через карту дублей при замере.
# Каждая пара проверена по тексту чанков корпуса 12.07.2026 (статья действительно отвечает на вопрос).

набор:
