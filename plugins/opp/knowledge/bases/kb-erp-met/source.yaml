# kb-erp-met — дескриптор источника (машинный). Формат — по контракту маршрутизации T-03-69/T-03-73:
# «бэкенд: external-rag | local-bm25 | local-vec». Файл отслеживается git; корпус и векторный индекс
# в git НЕ входят (.gitignore) и живут рядом на диске — в чистом чекауте папка существует, verify не падает.
# Пересборка 13.07.2026 (Фаза 2б: спека 03-a-vec-backend, ЗР-0028).

бэкенд: local-vec
модель: "intfloat/multilingual-e5-large"
порог_score: 0.82                    # ниже топ-1 → честный фолбэк на BM25 (помечается в ответе).
                                     # Калибровка 13.07 по эталону: честные вопросы ≥ 0.85, мусор ≤ 0.81 (e5 сжимает косинусы)
макс_пассажей_одной_статьи: 2        # диверсификация выдачи (находка пилота T-03-72)
домен: "1С:ERP 2.5 — методика (ИТС, erp25doc)"

корпус:
  файл: chunks.jsonl                 # {id, текст, источник}; источник = "<NNNNN>.md · <заголовок> · <URL ИТС>"
  собран: "2026-07-13, краул v2: its.1c.ru/db/erp25doc, контент-фрейм w_metadata_doc_frame, дедуп по странице"
  статей: 411
  чанков: 21673
  чанкинг: "build_met: окно 600 симв, overlap 100, каждый чанк с префиксом-заголовком статьи"

индекс:
  векторы: vectors.npy               # нормированные float16; мета vectors-meta.json; манифест vectors-manifest.json
  builder: "python -m opp_knowledge.build_vectors kb-erp-met (репозиторий opp-knowledge)"

пересборка:
  конвейер: "python -m opp_knowledge.build_met kb-erp-met --articles <articles.jsonl> --url-map <map.json> --vectors"
  краул: "in-browser в авторизованной сессии владельца (память its-crawl): TOC → оболочки → уникальные страницы"

эталон:
  файл: eval.yaml                    # 24 пары; прогон стендом bench/vec_pilot; регресс метрик = блокер приёмки

# Поставка (ЗР-0028): сотрудник получает chunks.jsonl + vectors.npy готовыми, локально не индексирует;
# модель эмбеддингов скачивается в кэш разово при первом запросе.
поставка: "чанки + векторный индекс поставляются готовыми (в git не входят)"
