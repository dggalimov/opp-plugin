# kb-erp-met — дескриптор источника (машинный). Формат — по контракту маршрутизации T-03-69:
# «бэкенд: external-rag | local-bm25». Этот файл отслеживается git; сам корпус (chunks.jsonl,
# 679 МБ) в git НЕ входит (.gitignore) и живёт рядом на диске — без него папка существует
# в чистом чекауте и verify не падает (аудит 02.07.2026).

бэкенд: local-bm25
домен: "1С:ERP 2.5 — методика (ИТС, erp25doc)"

корпус:
  файл: chunks.jsonl               # {id, текст, источник} — по строке на чанк
  чанков: 431872                   # проверено построчно 02.07.2026: JSON валиден, id уникальны 0..431871,
                                   # поля «текст»/«источник» заполнены везде
  формат_источника: "<NNNNN>.md · <заголовок статьи ИТС>"

пересборка:                        # корпус воспроизводим; отдельный бэкап не ведётся
  краул: "its.1c.ru/db/erp25doc (техника — its-crawl: in-browser fetch, cp1251, iframe, локальный чанкинг)"
  builder: "opp_knowledge.build_semantic (репозиторий opp-knowledge)"

# Поставка (решение владельца 02.07.2026): корпус НЕ распространяется с плагином и не бэкапится
# централизованно — каждый пользователь собирает его себе сам по этому рецепту.
поставка: "собирается у пользователя"
